// END-OF-DAY SUMMARY
// ══════════════════════════════════════════════════════
function renderDaySummary() {
  const today = state.currentDate;
  const v = state.venue || DEFAULT_VENUE;

  // Today's sessions
  const todaySessions = state.sessions.filter(s => s.date === today);

  // Today's bookings (excl. cancelled)
  const todayBookings = state.bookings.filter(b => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    return s && s.date === today && b.status !== 'cancelled';
  });

  // Today's queue entries (match session date)
  const todayQueue = state.queue.filter(q => {
    const s = state.sessions.find(sess => sess.id === q.sessionId);
    return s && s.date === today;
  });

  // ── Total Revenue (₱) from checked-in bookings ──
  // Prefer transaction records if available; fall back to session price × groupSize
  let totalRevenue = 0;
  const checkedInBookings = todayBookings.filter(b => b.status === 'checked_in');
  if (state.transactions && state.transactions.length > 0) {
    const todayTxns = state.transactions.filter(t => {
      if (t.status !== 'paid') return false;
      // Match by bookingId → session date, or by createdAt date
      if (t.bookingId) {
        const bk = state.bookings.find(b => b.id === t.bookingId);
        if (bk) {
          const s = state.sessions.find(sess => sess.id === bk.sessionId);
          return s && s.date === today;
        }
      }
      return t.createdAt && t.createdAt.split('T')[0] === today;
    });
    totalRevenue = todayTxns.reduce((sum, t) => sum + (t.total || 0), 0);
    // If no transactions matched today, fall back to checked-in bookings
    if (totalRevenue === 0 && checkedInBookings.length > 0) {
      totalRevenue = checkedInBookings.reduce((sum, b) => {
        const s = state.sessions.find(sess => sess.id === b.sessionId);
        return sum + (s ? getSessionPrice(s) * (b.groupSize || 1) : 0);
      }, 0);
    }
  } else {
    totalRevenue = checkedInBookings.reduce((sum, b) => {
      const s = state.sessions.find(sess => sess.id === b.sessionId);
      return sum + (s ? getSessionPrice(s) * (b.groupSize || 1) : 0);
    }, 0);
  }

  // ── No-Show Count ──
  const noShowCount = todayBookings.filter(b => b.status === 'no_show').length;

  // ── Waitlist-to-Paid Conversions ──
  // Queue entries that were 'served' or 'claimed' → became confirmed/checked_in bookings
  const waitlistConversions = todayQueue.filter(q => {
    if (q.status !== 'served' && q.status !== 'claimed') return false;
    // Check if a booking exists for this player+session
    return todayBookings.some(b =>
      b.sessionId === q.sessionId &&
      b.playerName === q.playerName &&
      (b.status === 'confirmed' || b.status === 'checked_in')
    );
  }).length;

  // ── Sessions Completed ──
  const now = new Date();
  const curMin = now.getHours() * 60 + now.getMinutes();
  const sessionsCompleted = todaySessions.filter(s => {
    const [eh, em] = s.endTime.split(':').map(Number);
    return curMin >= eh * 60 + em;
  }).length;

  // ── Unique Players ──
  const playerNames = new Set();
  todayBookings.forEach(b => playerNames.add(b.playerName));
  todayQueue.forEach(q => playerNames.add(q.playerName));
  const uniquePlayers = playerNames.size;

  // ── Court Utilization % ──
  const availableHours = v.closeHour - v.openHour;
  const totalCourtHours = state.courts.length * availableHours;
  // Deduplicate overlapping slots per court
  const usedMinutes = {};
  state.courts.forEach(c => { usedMinutes[c.id] = new Set(); });
  todaySessions.forEach(s => {
    if (!usedMinutes[s.courtId]) return;
    const [sh, sm] = s.startTime.split(':').map(Number);
    const [eh, em] = s.endTime.split(':').map(Number);
    for (let m = sh * 60 + sm; m < eh * 60 + em; m++) {
      usedMinutes[s.courtId].add(m);
    }
  });
  const totalUsedMinutes = Object.values(usedMinutes).reduce((sum, set) => sum + set.size, 0);
  const utilization = totalCourtHours > 0 ? Math.round((totalUsedMinutes / (totalCourtHours * 60)) * 100) : 0;

  // ── Build Modal ──
  const dateLabel = new Date(today + 'T12:00:00').toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  const modalHTML = `
    <div style="max-width:500px;width:92vw;background:var(--bg-elevated);border-radius:var(--radius-lg,16px);border:1px solid var(--border);overflow:hidden;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px;">
        <div style="font-size:18px;font-weight:800;">📋 End-of-Day Summary</div>
        <button onclick="closeModal()" style="background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px 8px;">✕</button>
      </div>
      <div style="padding:0 20px 6px;font-size:12px;color:var(--text-secondary);">${dateLabel}</div>
      <div style="padding:0 20px 20px;">

        <!-- Revenue Banner -->
        <div style="background:rgba(20,184,166,0.12);border:1px solid rgba(20,184,166,0.3);border-radius:var(--radius-md,12px);padding:20px;text-align:center;margin-bottom:16px;">
          <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--teal);margin-bottom:6px;">Total Revenue</div>
          <div style="font-size:36px;font-weight:900;color:var(--green);">₱${totalRevenue.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">from ${checkedInBookings.length} checked-in booking${checkedInBookings.length !== 1 ? 's' : ''}</div>
        </div>

        <!-- Stats Grid -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">

          <!-- Sessions -->
          <div style="background:var(--bg-surface,#1a1f2e);border:1px solid var(--border);border-radius:var(--radius-md,12px);padding:14px;">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-bottom:6px;">Sessions</div>
            <div style="font-size:28px;font-weight:800;">${sessionsCompleted}<span style="font-size:14px;font-weight:600;color:var(--text-secondary);">/${todaySessions.length}</span></div>
            <div style="font-size:11px;color:var(--text-secondary);">completed</div>
          </div>

          <!-- Unique Players -->
          <div style="background:var(--bg-surface,#1a1f2e);border:1px solid var(--border);border-radius:var(--radius-md,12px);padding:14px;">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-bottom:6px;">Unique Players</div>
            <div style="font-size:28px;font-weight:800;">${uniquePlayers}</div>
            <div style="font-size:11px;color:var(--text-secondary);">players today</div>
          </div>

          <!-- No-Shows -->
          <div style="background:var(--bg-surface,#1a1f2e);border:1px solid var(--border);border-radius:var(--radius-md,12px);padding:14px;">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-bottom:6px;">No-Shows</div>
            <div style="font-size:28px;font-weight:800;color:${noShowCount > 0 ? 'var(--red)' : 'var(--text-primary)'};">${noShowCount}</div>
            <div style="font-size:11px;color:var(--text-secondary);">did not arrive</div>
          </div>

          <!-- Waitlist Conversions -->
          <div style="background:var(--bg-surface,#1a1f2e);border:1px solid var(--border);border-radius:var(--radius-md,12px);padding:14px;">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin-bottom:6px;">Waitlist → Paid</div>
            <div style="font-size:28px;font-weight:800;color:var(--teal);">${waitlistConversions}</div>
            <div style="font-size:11px;color:var(--text-secondary);">conversion${waitlistConversions !== 1 ? 's' : ''}</div>
          </div>

        </div>

        <!-- Court Utilization -->
        <div style="background:var(--bg-surface,#1a1f2e);border:1px solid var(--border);border-radius:var(--radius-md,12px);padding:16px;margin-top:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);">Court Utilization</div>
            <div style="font-size:20px;font-weight:800;color:var(--teal);">${utilization}%</div>
          </div>
          <div style="background:var(--bg-base,#0d1117);border-radius:99px;height:8px;overflow:hidden;">
            <div style="background:linear-gradient(90deg,var(--teal),var(--green));height:100%;width:${Math.min(utilization, 100)}%;border-radius:99px;transition:width 0.5s;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--text-secondary);">
            ${state.courts.map(c => {
              const courtSessions = todaySessions.filter(s => s.courtId === c.id);
              const courtMins = usedMinutes[c.id] ? usedMinutes[c.id].size : 0;
              const courtPct = availableHours > 0 ? Math.round((courtMins / (availableHours * 60)) * 100) : 0;
              return '<span>' + escHtml(c.name) + ': ' + courtPct + '%</span>';
            }).join('')}
          </div>
        </div>

      </div>
      <div style="padding:0 20px 20px;">
        <button onclick="closeModal()" style="width:100%;padding:12px;background:var(--teal,#14B8A6);color:#fff;border:none;border-radius:var(--radius-md,12px);font-size:14px;font-weight:700;cursor:pointer;">Close</button>
      </div>
    </div>
  `;

  const overlay = document.getElementById('modalOverlay');
  // Remove existing custom modals
  const sdm = overlay.querySelector('.session-detail-modal');
  if (sdm) sdm.remove();
  const existing = overlay.querySelector('.day-summary-modal');
  if (existing) existing.remove();
  const standardModal = overlay.querySelector('.modal');
  if (standardModal) standardModal.style.display = 'none';

  const wrapper = document.createElement('div');
  wrapper.className = 'day-summary-modal';
  wrapper.style.cssText = 'display:flex;align-items:center;justify-content:center;width:100%;';
  wrapper.innerHTML = modalHTML;
  overlay.appendChild(wrapper);
  overlay.classList.add('open');
}

    return s && s.date === today && b.status !== 'cancelled';
  });

  // Stats
  const totalRevenue = (state.transactions && state.transactions.length > 0)
    ? state.transactions.filter(t => t.status === 'paid').reduce((sum, t) => sum + t.total, 0)
    : todayBookings.reduce((sum, b) => {
        const s = state.sessions.find(sess => sess.id === b.sessionId);
        return sum + (s ? getSessionPrice(s) * b.groupSize : 0);
      }, 0);
  const activeSessions = todaySessions.filter(s => isSessionLive(s)).length;
  const uniquePlayers = new Set(todayBookings.map(b => b.playerName)).size;
  const v = state.venue || DEFAULT_VENUE;
  const totalCourtHours = state.courts.length * (v.closeHour - v.openHour);

    const [sh, sm] = s.startTime.split(':').map(Number);
    const [eh, em] = s.endTime.split(':').map(Number);
    return sum + (eh * 60 + em - sh * 60 - sm) / 60;
  }, 0);

      <div class="dash-upcoming">${upcomingHTML}</div>
      ${courtsLink}
    </div>

    ${(() => {
      const expiringPlayers = getPackageExpiringPlayers();
      if (expiringPlayers.length === 0) return '';
      return `<div class="dash-section">
        <div class="dash-section-title">⚠️ Packages Expiring Soon</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${expiringPlayers.map(ep => {
            const def = PACKAGE_DEFS[ep.package.type];
            return `<div style="display:flex;align-items:center;gap:10px;background:var(--bg-elevated);border:1px solid ${ep.daysLeft <= 3 ? 'var(--red)' : 'var(--amber)'};border-radius:var(--radius-md);padding:10px;">
              <img src="${avatarUrl(ep.name, 48)}" style="width:28px;height:28px;border-radius:50%;" alt="">
              <div style="flex:1;">
                <div style="font-size:12px;font-weight:600;">${escHtml(ep.name)}</div>
                <div style="font-size:10px;color:var(--text-muted);">${def?.label || ep.package.type} · ${ep.package.sessionsRemaining >= 0 ? ep.package.sessionsRemaining + ' sessions' : 'Unlimited'}</div>
              </div>
              <span style="font-size:11px;font-weight:700;color:${ep.daysLeft <= 3 ? 'var(--red)' : 'var(--amber)'};">${ep.daysLeft}d left</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    })()}
  </div>`;
}

function callNextPlayer() {
  // Find first open session with a queue
  const today = state.currentDate;
  const todaySessions = state.sessions.filter(s => s.date === today && s.type === 'open');
  for (const s of todaySessions) {
    const queue = sessQueue(s.id);
    if (queue.length > 0) {
      const next = queue[0];
      // Move from queue to bookings
      state.queue = state.queue.filter(q => q.id !== next.id);
      state.bookings.push({
        id: genId(),
        sessionId: s.id,
        playerName: next.playerName,
        groupSize: next.groupSize,
        status: 'confirmed',
        bookedAt: new Date().toISOString(),
        rating: next.rating
      });
      save();
      showToast(`${next.playerName} called from queue for ${s.name}`);
      renderDashboardView();
      return;
    }
  }
  showToast('No players in queue', 'info');
}

// ══════════════════════════════════════════════════════
// CALENDAR VIEW
// ══════════════════════════════════════════════════════
function renderCalendarView() {
  const container = document.getElementById('view-calendar');
  const v = state.venue || DEFAULT_VENUE;
  const openH = v.openHour || 7;
  const closeH = v.closeHour || 21;

  // Navigation title
  let navTitle = '';
  if (calendarMode === 'week') {
    const ws = getWeekStart(calendarDate);
    const we = new Date(ws);
    we.setDate(we.getDate() + 6);
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    if (ws.getMonth() === we.getMonth()) {
      navTitle = `${months[ws.getMonth()]} ${ws.getDate()} – ${we.getDate()}, ${ws.getFullYear()}`;
    } else {
      navTitle = `${months[ws.getMonth()]} ${ws.getDate()} – ${months[we.getMonth()]} ${we.getDate()}, ${we.getFullYear()}`;
    }
  } else {
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    navTitle = `${months[calendarDate.getMonth()]} ${calendarDate.getFullYear()}`;
  }

  const todayStr = new Date().toISOString().split('T')[0];

  let gridHTML = '';
  if (calendarMode === 'week') {
    gridHTML = renderWeekGrid(openH, closeH, todayStr);
  } else {
    gridHTML = renderMonthGrid(todayStr);
  }

  container.innerHTML = `
  <div class="calendar-view">
    <div class="calendar-header">
      <div class="calendar-nav">
        <button onclick="calNav(-1)">‹</button>
        <span class="calendar-title">${navTitle}</span>
        <button onclick="calNav(1)">›</button>
        <button onclick="calToday()" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;">Today</button>
      </div>
      <div class="calendar-view-toggle">
        <button class="${calendarMode === 'week' ? 'active' : ''}" onclick="calendarMode='week';renderCalendarView();">Week</button>
        <button class="${calendarMode === 'month' ? 'active' : ''}" onclick="calendarMode='month';renderCalendarView();">Month</button>
      </div>
    </div>
    ${gridHTML}
  </div>`;
}

function renderWeekGrid(openH, closeH, todayStr) {
  const ws = getWeekStart(calendarDate);
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const dayDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    dayDates.push(d);
  }

  // Header row
  let headerHTML = '<div class="week-header" style="background:var(--bg-surface);"></div>';
  dayDates.forEach((d, i) => {
    const ds = formatDateStr(d);
    const isToday = ds === todayStr;
    headerHTML += `<div class="week-header ${isToday ? 'today' : ''}">${days[i]}<br><span style="font-size:16px;font-weight:800;${isToday ? 'color:var(--teal);' : ''}">${d.getDate()}</span></div>`;
  });

  // Time rows
  let rowsHTML = '';
  for (let h = openH; h < closeH; h++) {
    const label = timeFormat === '24h' ? `${String(h).padStart(2,'0')}:00` : `${h > 12 ? h - 12 : h}${h < 12 ? 'a' : 'p'}`;
    rowsHTML += `<div class="week-time-label">${label}</div>`;
    dayDates.forEach(d => {
      const ds = formatDateStr(d);
      const cellSessions = state.sessions.filter(s => s.date === ds && parseInt(s.startTime) === h);
      let sessionBlocks = cellSessions.map(s => {
        const [sh, sm] = s.startTime.split(':').map(Number);
        const [eh, em] = s.endTime.split(':').map(Number);
        const heightPx = ((eh * 60 + em - sh * 60 - sm) / 60) * 48;
        const pCount = totalPlayers(s.id);
        return `<div class="week-session ${s.type}" style="height:${heightPx - 4}px;top:2px;" onclick="state.selectedSessionId='${s.id}';switchView('schedule');" title="${escHtml(s.name)}">${escHtml(s.name)} (${pCount}p)</div>`;
      }).join('');
      rowsHTML += `<div class="week-cell" onclick="openModal('session');">${sessionBlocks}</div>`;
    });
  }

  return `<div class="week-grid">${headerHTML}${rowsHTML}</div>`;
}

function renderMonthGrid(todayStr) {
  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  let startOffset = firstDay.getDay() - 1; // Monday start
  if (startOffset < 0) startOffset = 6;

  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  let headerHTML = days.map(d => `<div class="month-day-header">${d}</div>`).join('');

  let cellsHTML = '';
  const totalCells = Math.ceil((startOffset + lastDay.getDate()) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startOffset + 1;
    const d = new Date(year, month, dayNum);
    const ds = formatDateStr(d);
    const isCurrentMonth = dayNum >= 1 && dayNum <= lastDay.getDate();
    const isToday = ds === todayStr;
    const daySessions = state.sessions.filter(s => s.date === ds);
    const totalP = daySessions.reduce((sum, s) => sum + totalPlayers(s.id), 0);

    const dotsHTML = daySessions.slice(0, 5).map(s => {
      const color = SESSION_COLORS[s.type]?.hex || '#64748B';
      return `<span class="dot" style="background:${color}"></span>`;
    }).join('');

    cellsHTML += `<div class="month-day ${isToday ? 'today' : ''} ${!isCurrentMonth ? 'other-month' : ''}" onclick="calendarDate=new Date('${ds}T12:00:00');calendarMode='week';renderCalendarView();">
      <div class="month-day-num">${d.getDate()}</div>
      ${daySessions.length > 0 ? `<div class="month-day-sessions">${daySessions.length} sessions · ${totalP} players</div>` : ''}
      <div class="month-day-dots">${dotsHTML}</div>
    </div>`;
  }

  return `<div class="month-grid">${headerHTML}${cellsHTML}</div>`;
}

function calNav(dir) {
  if (calendarMode === 'week') {
    calendarDate.setDate(calendarDate.getDate() + dir * 7);
  } else {
    calendarDate.setMonth(calendarDate.getMonth() + dir);
  }
  renderCalendarView();
}

function calToday() {
  calendarDate = new Date();
  renderCalendarView();
}

// KIOSK VIEW
// ══════════════════════════════════════════════════════
function renderKioskView() {
  const container = document.getElementById('view-kiosk');
  const today = state.currentDate;
  const todaySessions = state.sessions.filter(s => s.date === today);

  if (kioskWalkinMode) {
    renderKioskWalkin(container, todaySessions);
    return;
  }

  if (!kioskSessionId) {
    // Session selection grid
    const sessionCards = todaySessions.map(s => {
      const court = state.courts.find(c => c.id === s.courtId);
      const pCount = totalPlayers(s.id);
      const maxP = getSessionMaxPlayers(s);
      const bookedCount = sessBookings(s.id).length;
      return `<div class="kiosk-session-card" onclick="kioskSessionId='${s.id}';renderKioskView();">
        <div class="kiosk-session-name">${escHtml(s.name)}</div>
        <div class="kiosk-session-time">${fmtRange(s.startTime, s.endTime)}</div>
        <div class="kiosk-session-court">${court ? escHtml(court.name) : 'TBD'}</div>
        <div class="kiosk-session-players">${bookedCount} booked · ${pCount}/${maxP} players</div>
      </div>`;
    }).join('');

    container.innerHTML = `
    <div class="kiosk-view">
      <div class="kiosk-title">🏓 Check-In Kiosk</div>
      <div class="kiosk-session-grid">${sessionCards || '<div style="text-align:center;color:var(--text-muted);padding:40px;">No sessions today</div>'}</div>
      <button class="kiosk-walkin-btn" onclick="kioskWalkinMode=true;renderKioskView();">＋ Walk-In Player</button>
      <div style="text-align:center;margin-top:16px;">
        <span class="kiosk-back" onclick="switchView('dashboard');">← Back to Dashboard</span>
      </div>
    </div>`;
  } else {
    // Player check-in for selected session
    const session = state.sessions.find(s => s.id === kioskSessionId);
    if (!session) { kioskSessionId = null; renderKioskView(); return; }
    const court = state.courts.find(c => c.id === session.courtId);
    const bookings = sessBookings(session.id);

    const playerCards = bookings.map(b => {
      const isCI = b.status === 'checked_in';
      return `<div class="kiosk-player-card ${isCI ? 'checked-in' : ''}" onclick="kioskCheckIn('${b.id}', this);">
        <img class="kiosk-player-avatar" src="${avatarUrl(b.playerName, 96)}" alt="">
        <div>
          <div class="kiosk-player-name">${escHtml(b.playerName)}</div>
          <div class="kiosk-player-status ${isCI ? 'checked-in' : 'confirmed'}">${isCI ? '✅ Checked In' : '⏳ Confirmed'}</div>
        </div>
      </div>`;
    }).join('');

    const allCheckedIn = bookings.length > 0 && bookings.every(b => b.status === 'checked_in');

    container.innerHTML = `
    <div class="kiosk-view">
      <span class="kiosk-back" onclick="kioskSessionId=null;renderKioskView();">← Back to Sessions</span>
      <div class="kiosk-title">${escHtml(session.name)}</div>
      <div style="text-align:center;color:var(--text-secondary);margin-bottom:20px;font-size:14px;">
        ${fmtRange(session.startTime, session.endTime)} · ${court ? escHtml(court.name) : 'TBD'}
      </div>
      <div class="kiosk-player-list">${playerCards || '<div style="text-align:center;color:var(--text-muted);padding:40px;">No bookings yet</div>'}</div>
      ${allCheckedIn ? `<button class="kiosk-checkin-btn done" onclick="kioskSessionId=null;renderKioskView();">✅ All Players Checked In — Tap to Finish</button>` : ''}
      <button class="kiosk-walkin-btn" onclick="kioskWalkinMode=true;renderKioskView();">＋ Add Walk-In</button>
    </div>`;
  }
}

function kioskCheckIn(bookingId, el) {
  const booking = state.bookings.find(b => b.id === bookingId);
  if (!booking) return;
  if (booking.status === 'checked_in') {
    showToast(`${booking.playerName} is already checked in`, 'info');
    return;
  }
  booking.status = 'checked_in';
  save();
  // Animate
  if (el) {
    el.classList.add('checked-in', 'kiosk-checkin-animation');
    const statusEl = el.querySelector('.kiosk-player-status');
    if (statusEl) {
      statusEl.className = 'kiosk-player-status checked-in';
      statusEl.textContent = '✅ Checked In';
    }
  }
  showToast(`${booking.playerName} checked in! ✅`);
  // Re-render after animation
  setTimeout(() => renderKioskView(), 600);
}

function renderKioskWalkin(container, todaySessions) {
  const availableSessions = todaySessions.filter(s => {
    const pCount = totalPlayers(s.id);
    const maxP = getSessionMaxPlayers(s);
    return pCount < maxP;
  });

  const sessionOptions = availableSessions.map(s => {
    const court = state.courts.find(c => c.id === s.courtId);
    const pCount = totalPlayers(s.id);
    const maxP = getSessionMaxPlayers(s);
    return `<div class="kiosk-session-card" onclick="kioskSelectWalkinSession('${s.id}');" id="kioskWalkin-${s.id}">
      <div class="kiosk-session-name">${escHtml(s.name)}</div>
      <div class="kiosk-session-time">${fmtRange(s.startTime, s.endTime)}</div>
      <div class="kiosk-session-court">${court ? escHtml(court.name) : 'TBD'}</div>
      <div class="kiosk-session-players">${maxP - pCount} spots left</div>
    </div>`;
  }).join('');

  container.innerHTML = `
  <div class="kiosk-view">
    <span class="kiosk-back" onclick="kioskWalkinMode=false;kioskSessionId=null;renderKioskView();">← Back</span>
    <div class="kiosk-title">＋ Walk-In Player</div>
    <div style="text-align:center;color:var(--text-secondary);margin-bottom:20px;font-size:14px;">Select a session, then enter the player's name</div>
    <div class="kiosk-session-grid">${sessionOptions || '<div style="text-align:center;color:var(--text-muted);padding:40px;">No sessions with available spots</div>'}</div>
    <div id="kioskWalkinForm" style="display:none;max-width:400px;margin:0 auto;">
      <input type="text" id="kioskWalkinName" placeholder="Player Name" style="width:100%;padding:16px;font-size:18px;background:var(--bg-input);border:2px solid var(--border);border-radius:var(--radius-lg);color:var(--text-primary);font-family:inherit;margin-bottom:12px;">
      <button class="kiosk-checkin-btn ready" onclick="kioskSubmitWalkin();">Book + Check In</button>
    </div>
  </div>`;
}

let kioskWalkinSessionId = null;

function kioskSelectWalkinSession(sid) {
  kioskWalkinSessionId = sid;
  // Highlight selected
  document.querySelectorAll('.kiosk-session-card').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('kioskWalkin-' + sid);
  if (el) el.classList.add('active');
  const form = document.getElementById('kioskWalkinForm');
  if (form) {
    form.style.display = 'block';
    document.getElementById('kioskWalkinName').focus();
  }
}

function kioskSubmitWalkin() {
  const nameInput = document.getElementById('kioskWalkinName');
  const name = nameInput ? nameInput.value.trim() : '';
  if (!name) { showToast('Enter a player name', 'error'); return; }
  if (!kioskWalkinSessionId) { showToast('Select a session first', 'error'); return; }

  const session = state.sessions.find(s => s.id === kioskWalkinSessionId);
  if (!session) return;

  // Create booking + check-in
  state.bookings.push({
    id: genId(),
    sessionId: session.id,
    playerName: name,
    groupSize: 1,
    status: 'checked_in',
    bookedAt: new Date().toISOString(),
    rating: 3.0
  });
  save();
  showToast(`${name} booked and checked in for ${session.name}! ✅`);
  kioskWalkinMode = false;
  kioskWalkinSessionId = null;
  kioskSessionId = null;
  renderKioskView();
}

// TV DISPLAY MODE
// ══════════════════════════════════════════════════════
let tvModeInterval = null;

function openTVMode() {
  // Create TV overlay if not exists
  let overlay = document.getElementById('tvModeOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'tvModeOverlay';
    document.body.appendChild(overlay);
  }
  renderTVMode();
  tvModeInterval = setInterval(renderTVMode, 30000); // Update every 30s
}

function closeTVMode() {
  const overlay = document.getElementById('tvModeOverlay');
  if (overlay) overlay.remove();
  if (tvModeInterval) { clearInterval(tvModeInterval); tvModeInterval = null; }
}

function renderTVMode() {
  const overlay = document.getElementById('tvModeOverlay');
  if (!overlay) return;
  const v = state.venue || DEFAULT_VENUE;
  const today = state.currentDate;
  const todaySessions = state.sessions.filter(s => s.date === today);

  // Time
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: timeFormat !== '24h' });

  // Court cards
  const courtCards = state.courts.map(court => {
    const courtSessions = todaySessions.filter(s => s.courtId === court.id);
    const liveSession = courtSessions.find(s => isSessionLive(s));
    const bookings = liveSession ? state.bookings.filter(b => b.sessionId === liveSession.id && b.status !== 'cancelled') : [];
    const queue = liveSession ? state.queue.filter(q => q.sessionId === liveSession.id && q.status === 'waiting') : [];

    // Next session
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const nextSession = courtSessions
      .filter(s => {
        const [sh, sm] = s.startTime.split(':').map(Number);
        return sh * 60 + sm > nowMin;
      })
      .sort((a, b) => a.startTime.localeCompare(b.startTime))[0];

    if (liveSession) {
      const typeInfo = SESSION_COLORS[liveSession.type] || {};
      const pNames = bookings.map(b => b.playerName);
      // Show players in 2-column layout
      const playersHTML = pNames.slice(0, 4).map(name =>
        `<div class="tv-player"><img src="${avatarUrl(name, 64)}" alt="">${escHtml(name)}</div>`
      ).join('');

      // Score from matchup data
      const matchup = liveSession._matchup;
      let scoreHTML = '';
      if (matchup && matchup.score) {
        scoreHTML = `<div class="tv-score"><span class="team-a">${matchup.score.a || 0}</span><span class="vs">–</span><span class="team-b">${matchup.score.b || 0}</span></div>`;
      }

      const nextHTML = nextSession ? `<div class="tv-next-session">Next: ${escHtml(nextSession.name)} at ${fmtTimeDisplay(...nextSession.startTime.split(':').map(Number))}</div>` : '';

      return `<div class="tv-court-card live">
        <div class="tv-court-header">
          <span class="tv-court-name">${escHtml(court.name)}</span>
          <span class="tv-court-status live">● LIVE</span>
        </div>
        <div class="tv-session-type-pill" style="background:${typeInfo.hex || '#64748B'}22;color:${typeInfo.hex || '#64748B'};">${typeInfo.label || liveSession.type}</div>
        <div class="tv-session-name">${escHtml(liveSession.name)}</div>
        <div class="tv-session-time">${fmtRange(liveSession.startTime, liveSession.endTime)}</div>
        ${scoreHTML}
        <div class="tv-players">${playersHTML}</div>
        ${queue.length > 0 ? `<div class="tv-queue-info">⚡ ${queue.length} waiting in queue</div>` : ''}
        ${nextHTML}
      </div>`;
    } else {
      // No live session
      const nextHTML = nextSession ? `<div class="tv-next-session">Next: ${escHtml(nextSession.name)} at ${fmtTimeDisplay(...nextSession.startTime.split(':').map(Number))}</div>` : '';
      return `<div class="tv-court-card">
        <div class="tv-court-header">
          <span class="tv-court-name">${escHtml(court.name)}</span>
          <span class="tv-court-status available">Available</span>
        </div>
        <div class="tv-court-available-msg">No active session</div>
        ${nextHTML}
      </div>`;
    }
  }).join('');

  // Ticker
  const allQueue = state.queue.filter(q => q.status === 'waiting');
  const tickerItems = allQueue.map(q => {
    const s = state.sessions.find(sess => sess.id === q.sessionId);
    return `${q.playerName} waiting for ${s ? s.name : 'session'}`;
  });
  // Also add upcoming sessions
  const nowMin2 = now.getHours() * 60 + now.getMinutes();
  const upcoming = todaySessions
    .filter(s => {
      const [sh, sm] = s.startTime.split(':').map(Number);
      return sh * 60 + sm > nowMin2;
    })
    .sort((a, b) => a.startTime.localeCompare(b.startTime))
    .slice(0, 3)
    .map(s => `Coming up: ${s.name} at ${fmtTimeDisplay(...s.startTime.split(':').map(Number))}`);

  const tickerText = [...tickerItems, ...upcoming].join('  •  ') || 'All courts running smoothly';

  overlay.innerHTML = `
  <div class="tv-mode">
    <div class="tv-exit"><button onclick="closeTVMode()">✕ Exit TV Mode</button></div>
    <div class="tv-header">
      <div class="tv-venue-name">${escHtml(v.name)}</div>
      <div style="display:flex;align-items:center;gap:24px;">
        <div class="tv-live"><span class="dot"></span> LIVE</div>
        <div class="tv-time">${timeStr}</div>
      </div>
    </div>
    <div class="tv-courts">${courtCards}</div>
    <div class="tv-ticker">
      <div class="tv-ticker-content">${escHtml(tickerText)}</div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
// PLAYER PROFILE
// ══════════════════════════════════════════════════════
function openPlayerProfile(playerName) {
  const dir = state.playerDirectory || {};
  const p = dir[playerName];
  if (!p) { showToast('Player not found', 'error'); return; }

  // Gather bookings for this player
  const playerBookings = state.bookings
    .filter(b => b.playerName === playerName)
    .sort((a, b) => new Date(b.bookedAt) - new Date(a.bookedAt));

  const upcoming = playerBookings.filter(b => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    return s && s.date >= state.currentDate && b.status !== 'cancelled';
  }).slice(0, 5);

  const recent = playerBookings.slice(0, 10);

  // Stats
  const totalPlayed = p.sessionsPlayed || 0;
  const wins = p.wins || 0;
  const losses = p.losses || 0;
  const winRate = totalPlayed > 0 ? Math.round((wins / (wins + losses || 1)) * 100) : 0;
  const avgRating = p.rating ? parseFloat(p.rating).toFixed(1) : 'N/A';

  // Recent activity HTML
  let activityHTML = '';
  recent.forEach(b => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    const court = state.courts.find(c => c.id === s?.courtId);
    const statusColors = {

function processPayment(bookingId, playerName, subtotal, tax, total, receiptId, sessionId) {
  const btn = document.getElementById('payBtn');
  if (!btn) return;
  btn.classList.add('processing');
  btn.textContent = 'Processing...';
  btn.disabled = true;

  const refNum = document.getElementById('payRefNum')?.value.trim() || '';

  setTimeout(() => {
    // Record transaction
    const txn = {
      id: genId(),
      bookingId,
      playerName,
      sessionId,
      amount: subtotal,
      tax,
      total,
      method: paymentMethod,
      refNumber: refNum,
      status: 'paid',
      createdAt: new Date().toISOString(),
      receiptId
    };
    if (!state.transactions) state.transactions = [];
    state.transactions.push(txn);

    // Update booking with payment info
    const booking = state.bookings.find(b => b.id === bookingId);
    if (booking) {
      booking.payment = {
        method: paymentMethod,
        refNumber: refNum,
        amount: subtotal,
        tax,
        total,
        status: 'paid',
        paidAt: new Date().toISOString(),
        receiptId
      };
    }
    save();

    // Show success
    const session = state.sessions.find(s => s.id === sessionId);
    showPaymentSuccess(txn, session, playerName);
  }, 1500);
}

function createRecurringRule(template, frequency, startDate, endDate, daysOfWeek) {
  const rule = {
    id: genId(),
    sessionTemplate: template,
    frequency,
    startDate,
    endDate: endDate || null,
    daysOfWeek: daysOfWeek || [],
    lastGenerated: startDate
  };
  if (!state.recurringRules) state.recurringRules = [];
  state.recurringRules.push(rule);
  save();
  return rule;
}

function generateRecurringSessions() {
  if (!state.recurringRules || state.recurringRules.length === 0) return;
  const today = state.currentDate;
  const v = state.venue || DEFAULT_VENUE;

  state.recurringRules.forEach(rule => {
    if (!rule.startDate || !rule.sessionTemplate) return;
    const endDate = rule.endDate || '2099-12-31';
    let cursor = rule.lastGenerated || rule.startDate;

    // Generate up to 14 days ahead
    const maxDate = new Date();
    maxDate.setDate(maxDate.getDate() + 14);
    const maxDateStr = maxDate.toISOString().split('T')[0];

    let d = new Date(cursor + 'T12:00:00');
    d.setDate(d.getDate() + 1); // start from day after lastGenerated

    while (formatDateStr(d) <= endDate && formatDateStr(d) <= maxDateStr) {
      const dateStr = formatDateStr(d);
      const dayOfWeek = d.getDay();

      let shouldGenerate = false;
      if (rule.frequency === 'daily') {
        shouldGenerate = true;
      } else if (rule.frequency === 'weekly' || rule.frequency === 'biweekly') {
        if (rule.daysOfWeek && rule.daysOfWeek.includes(dayOfWeek)) {
          if (rule.frequency === 'biweekly') {
            const startD = new Date(rule.startDate + 'T12:00:00');
            const weeksDiff = Math.floor((d - startD) / (7 * 86400000));
            shouldGenerate = weeksDiff % 2 === 0;
          } else {
            shouldGenerate = true;
          }
        }
      }

      if (shouldGenerate) {
        // Check if session already exists for this rule+date
        const exists = state.sessions.some(s =>
          s.date === dateStr &&
          s.courtId === rule.sessionTemplate.courtId &&
          s.startTime === rule.sessionTemplate.startTime &&
          s.name === rule.sessionTemplate.name
        );
        if (!exists) {
          state.sessions.push({
            ...rule.sessionTemplate,
            id: genId(),
            date: dateStr,
            recurring: rule.frequency
          });
        }
      }
      d.setDate(d.getDate() + 1);
    }
    rule.lastGenerated = formatDateStr(new Date(maxDate.getTime() - 86400000));
  });
  save();
}

function deleteRecurringRule(ruleId) {
  if (!confirm('Delete this recurring rule?')) return;
  state.recurringRules = (state.recurringRules || []).filter(r => r.id !== ruleId);
  save();
  renderSettingsView();
  showToast('Recurring rule deleted', 'warning');
}

function generateBalancedPairing(players) {
  // For 4 players: 2v2 pairing
  // For 8 players: 4v4 pairing
  // General: split into two equal teams with minimum DUPR difference
  const half = Math.floor(players.length / 2);
  const sorted = [...players].sort((a, b) => b.rating - a.rating);

  // Try multiple strategies and pick the best
  let bestA = [], bestB = [], bestDiff = Infinity;

  // Strategy 1: Alternating (high-low pairing)
  let a1 = [], b1 = [];
  sorted.forEach((p, i) => { if (i % 2 === 0) a1.push(p); else b1.push(p); });
  const diff1 = Math.abs(aAvg(a1) - aAvg(b1));
  if (diff1 < bestDiff) { bestA = a1; bestB = b1; bestDiff = diff1; }

  // Strategy 2: Top half vs bottom half, then cross-swap
  let a2 = sorted.slice(0, half);
  let b2 = sorted.slice(half);
  const diff2 = Math.abs(aAvg(a2) - aAvg(b2));
  if (diff2 < bestDiff) { bestA = a2; bestB = b2; bestDiff = diff2; }

  // Strategy 3: Snake draft (1,4,5,8 vs 2,3,6,7)
  let a3 = [], b3 = [];
  sorted.forEach((p, i) => {
    const round = Math.floor(i / 2);
    if (round % 2 === 0) { if (i % 2 === 0) a3.push(p); else b3.push(p); }
    else { if (i % 2 === 0) b3.push(p); else a3.push(p); }
  });
  const diff3 = Math.abs(aAvg(a3) - aAvg(b3));
  if (diff3 < bestDiff) { bestA = a3; bestB = b3; bestDiff = diff3; }

  // Strategy 4: Greedy — assign each player to the team with lower total
  let a4 = [], b4 = [];
  let sumA4 = 0, sumB4 = 0;
  sorted.forEach(p => {
    if (a4.length < half && (sumA4 <= sumB4 || b4.length >= half)) {
      a4.push(p); sumA4 += p.rating;
    } else {
      b4.push(p); sumB4 += p.rating;
    }
  });
  const diff4 = Math.abs(aAvg(a4) - aAvg(b4));
  if (diff4 < bestDiff) { bestA = a4; bestB = b4; bestDiff = diff4; }

  // Add slight randomization: swap one pair if diff is already small
  if (Math.random() < 0.3 && bestA.length >= 1 && bestB.length >= 1) {
    const iA = Math.floor(Math.random() * bestA.length);
    const iB = Math.floor(Math.random() * bestB.length);
    const trialA = [...bestA], trialB = [...bestB];
    [trialA[iA], trialB[iB]] = [trialB[iB], trialA[iA]];
    const trialDiff = Math.abs(aAvg(trialA) - aAvg(trialB));
    if (trialDiff <= bestDiff + 0.1) { bestA = trialA; bestB = trialB; }
  }

  return {
    teamA: bestA,
    teamB: bestB,
    teamAAvg: aAvg(bestA),
    teamBAvg: aAvg(bestB)
  };
}

function aAvg(team) {
  return team.length ? team.reduce((s, p) => s + p.rating, 0) / team.length : 0;
}

function acceptAutoPair(sessionId, teamA, teamB) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s) return;
  seedSessionMatchup(s);
  const dir = state.playerDirectory || {};

  // Assign on-court players
  s.players = [];
  teamA.forEach((name, i) => {
    const existing = s.players.find(p => p.name === name);
    if (existing) { existing.team = 'A'; existing.position = i === 0 ? 'Left' : 'Right'; existing.onCourt = true; }
    else { s.players.push({ name, rating: dir[name]?.rating || 3.0, position: i === 0 ? 'Left' : 'Right', onCourt: true, team: 'A' }); }
  });
  teamB.forEach((name, i) => {
    const existing = s.players.find(p => p.name === name);
    if (existing) { existing.team = 'B'; existing.position = i === 0 ? 'Left' : 'Right'; existing.onCourt = true; }
    else { s.players.push({ name, rating: dir[name]?.rating || 3.0, position: i === 0 ? 'Left' : 'Right', onCourt: true, team: 'B' }); }
  });

  // Move any remaining players to waiting room
  const assigned = new Set([...teamA, ...teamB]);
  const allSessionPlayers = s.players.filter(p => !assigned.has(p.name));
  s.waitingRoom = [...(s.waitingRoom || []), ...allSessionPlayers.filter(p => !p.onCourt)];

  save();
  showToast('Teams assigned! ⚖️', 'success');
  openModal('sessionDetail', sessionId);
}

function acceptAutoPairFromResult() {
  if (!_lastAutoPairResult || !_lastAutoPairSessionId) { showToast('No pairing result', 'error'); return; }
  const teamANames = _lastAutoPairResult.teamA.map(p => p.name);
  const teamBNames = _lastAutoPairResult.teamB.map(p => p.name);
  acceptAutoPair(_lastAutoPairSessionId, teamANames, teamBNames);
}

function getTeamAvgDupr(leagueId, teamId) {
  const league = getLeagueById(leagueId);
  if (!league) return 3.0;
  const team = league.teams.find(t => t.id === teamId);
  if (!team || !team.players.length) return 3.0;
  const dir = state.playerDirectory || {};
  let total = 0, count = 0;
  team.players.forEach(name => {
    const p = dir[name];
    if (p && p.dupr) { total += p.dupr; count++; }
  });
  return count > 0 ? (total / count) : 3.0;
}

// ─── Bracket Generation ─────────────────────────────

function generateBracket(leagueId) {
  const league = getLeagueById(leagueId);
  if (!league) return;
  league.matches = [];
  const teams = [...league.teams].sort((a, b) => (a.seed || 99) - (b.seed || 99));

  if (league.format === 'single_elim') {
    generateSingleElimBracket(league, teams);
  } else if (league.format === 'double_elim') {
    generateDoubleElimBracket(league, teams);
  } else if (league.format === 'round_robin') {
    generateRoundRobinBracket(league, teams);
  } else if (league.format === 'swiss') {
    generateSwissBracket(league, teams);
  }
  save();
}

function generateSingleElimBracket(league, teams) {
  const n = teams.length;
  const rounds = Math.ceil(Math.log2(n));
  const actualSize = Math.pow(2, rounds);
  // Pad teams with byes
  const padded = [...teams];
  while (padded.length < actualSize) padded.push(null);

  let matchNum = 1;
  let prevRoundMatches = [];

  for (let r = 0; r < rounds; r++) {
    const roundMatches = [];
    const numMatches = Math.pow(2, rounds - r - 1);
    const isFinal = r === rounds - 1;

    for (let m = 0; m < numMatches; m++) {
      const t1 = r === 0 ? padded[m * 2] : (prevRoundMatches[m * 2] ? prevRoundMatches[m * 2].winnerId : null);
      const t2 = r === 0 ? padded[m * 2 + 1] : (prevRoundMatches[m * 2 + 1] ? prevRoundMatches[m * 2 + 1].winnerId : null);
      const match = {
        id: genMatchId(),
        round: r + 1,
        matchNumber: matchNum++,
        team1Id: t1 ? t1.id : null,
        team2Id: t2 ? t2.id : null,
        team1Name: t1 ? t1.name : 'BYE',
        team2Name: t2 ? t2.name : 'BYE',
        score1: null,
        score2: null,
        winnerId: null,
        status: (!t1 || !t2) ? 'bye' : 'pending',
        court: null,
        scheduledTime: null
      };
      if (match.status === 'bye') {
        match.winnerId = t1 ? t1.id : t2 ? t2.id : null;
        match.status = 'completed';
      }
      roundMatches.push(match);
      league.matches.push(match);
    }
    prevRoundMatches = roundMatches;
  }
}

function generateDoubleElimBracket(league, teams) {
  // Winners bracket (single elim)
  generateSingleElimBracket(league, teams);
  // Mark first set as winners bracket
  league.matches.forEach(m => { m.bracket = 'winners'; });

  const n = teams.length;
  const rounds = Math.ceil(Math.log2(n));
  const actualSize = Math.pow(2, rounds);
  const padded = [...teams];
  while (padded.length < actualSize) padded.push(null);

  // Losers bracket
  let matchNum = 1;
  for (let r = 0; r < rounds - 1; r++) {
    const numMatches = Math.pow(2, rounds - r - 2);
    for (let m = 0; m < numMatches; m++) {
      league.matches.push({
        id: genMatchId(),
        round: r + 1,
        matchNumber: 100 + matchNum++,
        team1Id: null, team2Id: null,
        team1Name: 'TBD', team2Name: 'TBD',
        score1: null, score2: null,
        winnerId: null,
        status: 'pending',
        bracket: 'losers',
        court: null,
        scheduledTime: null
      });
    }
  }

  // Grand final
  league.matches.push({
    id: genMatchId(),
    round: rounds,
    matchNumber: 200,
    team1Id: null, team2Id: null,
    team1Name: 'Winners Bracket Winner', team2Name: 'Losers Bracket Winner',
    score1: null, score2: null,
    winnerId: null,
    status: 'pending',
    bracket: 'final',
    court: null,
    scheduledTime: null
  });
}

function generateRoundRobinBracket(league, teams) {
  const n = teams.length;
  let matchNum = 1;
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      league.matches.push({
        id: genMatchId(),
        round: 1,
        matchNumber: matchNum++,
        team1Id: teams[i] ? teams[i].id : null,
        team2Id: teams[j] ? teams[j].id : null,
        team1Name: teams[i] ? teams[i].name : 'TBD',
        team2Name: teams[j] ? teams[j].name : 'TBD',
        score1: null, score2: null,
        winnerId: null,
        status: 'pending',
        bracket: 'round_robin',
        court: null,
        scheduledTime: null
      });
    }
  }
}

function generateSwissBracket(league, teams) {
  const numRounds = Math.min(Math.ceil(Math.log2(teams.length)) + 1, 5);
  // Round 1: random pairings
  const shuffled = [...teams].sort(() => Math.random() - 0.5);
  let matchNum = 1;
  for (let i = 0; i < Math.floor(shuffled.length / 2); i++) {
    league.matches.push({
      id: genMatchId(),
      round: 1,
      matchNumber: matchNum++,
      team1Id: shuffled[i*2] ? shuffled[i*2].id : null,
      team2Id: shuffled[i*2+1] ? shuffled[i*2+1].id : null,
      team1Name: shuffled[i*2] ? shuffled[i*2].name : 'BYE',
      team2Name: shuffled[i*2+1] ? shuffled[i*2+1].name : 'BYE',
      score1: null, score2: null,
      winnerId: null,
      status: 'pending',
      bracket: 'swiss',
      court: null,
      scheduledTime: null
    });
  }
  // Future rounds: placeholders (filled after each round)
  for (let r = 2; r <= numRounds; r++) {
    for (let m = 0; m < Math.floor(teams.length / 2); m++) {
      league.matches.push({
        id: genMatchId(),
        round: r,
        matchNumber: matchNum++,
        team1Id: null, team2Id: null,
        team1Name: 'TBD', team2Name: 'TBD',
        score1: null, score2: null,
        winnerId: null,
        status: 'pending',
        bracket: 'swiss',
        court: null,
        scheduledTime: null
      });
    }
  }
}

// ─── Match Results + DUPR ────────────────────────────

function submitMatchResult(leagueId, matchId, score1, score2, winnerId, court) {
  const league = getLeagueById(leagueId);
  if (!league) return;
  const match = league.matches.find(m => m.id === matchId);
  if (!match || match.status === 'completed') return;

  match.score1 = score1;
  match.score2 = score2;
  match.winnerId = winnerId;
  match.status = 'completed';
  match.court = court || null;

  // Update team names from live data
  const t1 = league.teams.find(t => t.id === match.team1Id);
  const t2 = league.teams.find(t => t.id === match.team2Id);
  if (t1) match.team1Name = t1.name;
  if (t2) match.team2Name = t2.name;

  // Calculate DUPR changes
  if (league.format !== 'swiss' || match.round === league.matches.filter(m => m.bracket === 'swiss').length) {
    const winner = league.teams.find(t => t.id === winnerId);
    const loser = league.teams.find(t => t.id !== winnerId && (t.id === match.team1Id || t.id === match.team2Id));
    if (winner && loser) {
      updateDuprFromMatch(winner.players, loser.players, score1 > score2 ? 1 : 0, league.settings.gamesPerMatch || 3);
    }
  }

  // For single/double elim: seed winner into next round
  if (league.format === 'single_elim' || league.format === 'double_elim') {
    advanceSingleElimWinner(league, match);
  }

  // Check if league is complete
  const allDone = league.matches.every(m => m.status === 'completed' || m.status === 'bye');
  const finalMatch = league.matches.find(m => m.round === Math.max(...league.matches.map(x => x.round)) && (!m.bracket || m.bracket === 'single_elim' || m.bracket === 'winners'));
  if (allDone && finalMatch && finalMatch.status === 'completed') {
    league.status = 'completed';
    league.championId = finalMatch.winnerId;
  }

  save();
  return match;
}

function advanceSingleElimWinner(league, completedMatch) {
  const nextRoundMatches = league.matches.filter(m =>
    m.round === completedMatch.round + 1 &&
    (!m.bracket || m.bracket === 'winners' || m.bracket === 'single_elim') &&
    m.status !== 'bye'
  );
  if (nextRoundMatches.length === 0) return;

  // Figure out which slot (first or second) this winner goes into
  const currentRoundMatches = league.matches.filter(m =>
    m.round === completedMatch.round &&
    (!m.bracket || m.bracket === 'winners' || m.bracket === 'single_elim')
  );
  const posInRound = currentRoundMatches.findIndex(m => m.id === completedMatch.id);
  const slotInNext = Math.floor(posInRound / 2);

  if (nextRoundMatches[slotInNext]) {
    const next = nextRoundMatches[slotInNext];
    const winner = league.teams.find(t => t.id === completedMatch.winnerId);
    if (posInRound % 2 === 0) {
      next.team1Id = completedMatch.winnerId;
      next.team1Name = winner ? winner.name : 'Winner';
    } else {
      next.team2Id = completedMatch.winnerId;
      next.team2Name = winner ? winner.name : 'Winner';
    }
    if (next.team1Id && next.team2Id) next.status = 'pending';
  }
}

function updateDuprFromMatch(winnerPlayers, loserPlayers, gamesWon, gamesLost) {
  const dir = state.playerDirectory || {};
  const K = 20; // DUPR K-factor

  [...winnerPlayers, ...loserPlayers].forEach(name => {
    const player = dir[name];
    if (!player) return;
    const currentDupr = player.dupr || 3.0;
    const isWinner = winnerPlayers.includes(name);
    const teamRating = isWinner ? currentDupr : currentDupr;
    const opponentRating = isWinner
      ? (loserPlayers.map(p => dir[p]?.dupr || 3.0).reduce((a,b) => a+b, 0) / Math.max(1, loserPlayers.length))
      : (winnerPlayers.map(p => dir[p]?.dupr || 3.0).reduce((a,b) => a+b, 0) / Math.max(1, winnerPlayers.length));

    const expected = 1 / (1 + Math.pow(10, (opponentRating - currentDupr) / 400));
    const actual = isWinner ? 1 : 0;
    const delta = K * (actual - expected) * 0.01; // small nudge per game
    const totalDelta = delta * (gamesWon + gamesLost);

    dir[name] = { ...player, dupr: Math.max(1.0, Math.min(6.0, currentDupr + totalDelta)) };
  });
  state.playerDirectory = dir;
  save();
}

// ─── Standings ──────────────────────────────────────

function getLeagueStandings(leagueId) {
  const league = getLeagueById(leagueId);
  if (!league) return [];
  if (league.format === 'round_robin' || league.format === 'swiss') {
    return computeRoundRobinStandings(league);
  }
  return [];
}

function computeRoundRobinStandings(league) {
  const standings = league.teams.map(t => ({
    teamId: t.id,
    teamName: t.name,
    players: t.players,
    seed: t.seed || 99,
    wins: 0, losses: 0,
    gamesWon: 0, gamesLost: 0,
    points: 0,
    avgDupr: getTeamAvgDupr(league.id, t.id)
  }));

  league.matches.forEach(m => {
    if (m.status !== 'completed') return;
    const s1 = standings.find(s => s.teamId === m.team1Id);
    const s2 = standings.find(s => s.teamId === m.team2Id);
    if (!s1 || !s2) return;
    const t1Games = m.score1 || 0;
    const t2Games = m.score2 || 0;
    if (m.winnerId === m.team1Id) {
      s1.wins++; s1.points += 3; s1.gamesWon += t1Games; s1.gamesLost += t2Games;
      s2.losses++; s2.gamesWon += t2Games; s2.gamesLost += t1Games;
    } else {
      s2.wins++; s2.points += 3; s2.gamesWon += t2Games; s2.gamesLost += t1Games;
      s1.losses++; s1.gamesWon += t1Games; s1.gamesLost += t2Games;
    }
  });

  return standings.sort((a, b) => b.points - a.points || (b.gamesWon - b.gamesLost) - (a.gamesWon - a.gamesLost));
}

      <div class="schedule-list">

          <div class="schedule-row" onclick="openMatchResultModal('${league.id}','${m.id}')">
            <div style="display:flex;flex-direction:column;gap:2px;">
              <div style="font-weight:600;font-size:13px;">${escHtml(m.team1Name)} <span style="color:var(--text-muted);">vs</span> ${escHtml(m.team2Name)}</div>
              <div style="font-size:11px;color:var(--text-muted);">${m.court ? 'Court '+m.court : 'Court TBD'} · ${m.scheduledTime || 'Time TBD'}</div>
            </div>
            <div class="pill" style="background:var(--teal);color:white;font-size:11px;">Enter Result</div>
          </div>
        `).join('')}
      </div>
    `}
  `;
}

function renderLeagueResultsTab(el, league) {
  const completed = league.matches.filter(m => m.status === 'completed');
  el.innerHTML = `
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">${completed.length} completed matches</div>
    ${completed.length === 0 ? `<div class="empty-state"><div style="font-size:13px;">No results yet.</div></div>` : `
      <div class="results-list">
        ${completed.map(m => {
          const winner = league.teams.find(t => t.id === m.winnerId);
          return `
            <div class="result-row">
              <div style="display:flex;flex-direction:column;gap:2px;flex:1;">
                <div style="font-size:13px;font-weight:600;">${escHtml(m.team1Name)} vs ${escHtml(m.team2Name)}</div>
                <div style="font-size:12px;color:var(--text-muted);">${m.court ? 'Court '+m.court : ''} #${m.matchNumber} · ${winner ? '🏆 '+escHtml(winner.name) : ''}</div>
              </div>
              <div style="font-size:16px;font-weight:800;color:var(--teal);">${m.score1}–${m.score2}</div>
            </div>
          `;
        }).join('')}
      </div>
    `}
  `;
}

function renderLeagueStandingsTab(el, league) {
  const standings = getLeagueStandings(league.id);
  el.innerHTML = `
    <table class="standings-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>W</th><th>L</th>
          <th>GF</th><th>GA</th>
          <th>Pts</th>
        </tr>
      </thead>
      <tbody>
        ${standings.map((s, i) => `
          <tr class="${i === 0 ? 'standings-first' : ''}">
            <td>${i + 1}</td>
            <td>
              <div style="font-weight:600;font-size:13px;">${escHtml(s.teamName)}</div>
              <div style="font-size:11px;color:var(--text-muted);">${s.avgDupr.toFixed(1)} DUPR</div>
            </td>
            <td style="color:var(--green);font-weight:700;">${s.wins}</td>
            <td style="color:var(--red);">${s.losses}</td>
            <td>${s.gamesWon}</td>

// ─── Modals ──────────────────────────────────────────

function openCreateLeagueModal() {
  const today = state.currentDate;
  hideAllLeagueModals();
  document.getElementById('lgName').value = '';
  document.getElementById('lgFormat').value = 'single_elim';
  document.getElementById('lgTeamCount').value = '8';
  document.getElementById('lgStartDate').value = today;
  document.getElementById('lgEndDate').value = '';
  document.getElementById('lgCourts').value = '2';
  document.getElementById('lgGamesPerMatch').value = '3';
  showLeagueModal('create-league-modal');
}

function handleCreateLeague() {
  const name = document.getElementById('lgName').value.trim();
  if (!name) { alert('Enter a league name'); return; }
  const league = createLeague({
    name,
    format: document.getElementById('lgFormat').value,
    teamCount: parseInt(document.getElementById('lgTeamCount').value),
    startDate: document.getElementById('lgStartDate').value,
    endDate: document.getElementById('lgEndDate').value,
    courts: parseInt(document.getElementById('lgCourts').value),
    gamesPerMatch: parseInt(document.getElementById('lgGamesPerMatch').value)
  });
  closeModal();
  renderLeagueTab();
}

function openCreateTeamModal(leagueId) {
  activeLeagueId = leagueId;
  hideAllLeagueModals();
  document.getElementById('teamName').value = '';
  document.getElementById('teamSeed').value = '';
  document.getElementById('teamPlayers').value = '';
  showLeagueModal('create-team-modal');
}

function handleCreateTeam() {
  const name = document.getElementById('teamName').value.trim();
  if (!name) { alert('Enter a team name'); return; }
  const playerNames = document.getElementById('teamPlayers').value.split(',').map(s => s.trim()).filter(Boolean);
  if (playerNames.length < 2) { alert('Add at least 2 players'); return; }
  addTeamToLeague(activeLeagueId, { name, seed: parseInt(document.getElementById('teamSeed').value) || undefined, players: playerNames });
  hideAllLeagueModals();
  renderLeagueDetail(activeLeagueId);
}

function openTeamDetailModal(leagueId, teamId) {
  const league = getLeagueById(leagueId);
  if (!league) return;
  const team = league.teams.find(t => t.id === teamId);
  if (!team) return;
  hideAllLeagueModals();
  document.getElementById('tdTeamName').textContent = team.name;
  document.getElementById('tdSeed').textContent = 'Seed #' + (team.seed || '?');
  document.getElementById('tdAvgDupr').textContent = getTeamAvgDupr(leagueId, teamId).toFixed(1) + ' DUPR';
  document.getElementById('tdPlayers').innerHTML = (team.players || []).map(p => `<span class="player-tag">${escHtml(p)}</span>`).join('');
  document.getElementById('tdMatchStats').textContent = league.matches.filter(m => m.status === 'completed' && (m.winnerId === teamId)).length + ' wins / ' + league.matches.filter(m => m.status === 'completed' && (m.winnerId !== teamId) && (m.team1Id === teamId || m.team2Id === teamId)).length + ' losses';
  showLeagueModal('team-detail-modal');
}

function openMatchResultModal(leagueId, matchId) {
  const league = getLeagueById(leagueId);
  if (!league) return;
  const match = league.matches.find(m => m.id === matchId);
  if (!match) return;
  hideAllLeagueModals();
  document.getElementById('mrTeam1').textContent = match.team1Name;
  document.getElementById('mrTeam2').textContent = match.team2Name;
  document.getElementById('mrScore1').value = '';
  document.getElementById('mrScore2').value = '';
  document.getElementById('mrCourt').value = '1';
  document.getElementById('mrWinner').innerHTML = `<option value="">Select winner</option><option value="${match.team1Id}">${escHtml(match.team1Name)}</option><option value="${match.team2Id}">${escHtml(match.team2Name)}</option>`;
  document.getElementById('mrLeagueId').value = leagueId;
  document.getElementById('mrMatchId').value = matchId;
  showLeagueModal('match-result-modal');
}

function handleSubmitMatchResult() {
  const leagueId = document.getElementById('mrLeagueId').value;
  const matchId = document.getElementById('mrMatchId').value;
  const score1 = parseInt(document.getElementById('mrScore1').value);
  const score2 = parseInt(document.getElementById('mrScore2').value);
  const winnerId = document.getElementById('mrWinner').value;
  const court = parseInt(document.getElementById('mrCourt').value);
  if (!winnerId) { alert('Select the winner'); return; }
  if (isNaN(score1) || isNaN(score2)) { alert('Enter both scores'); return; }
  submitMatchResult(leagueId, matchId, score1, score2, winnerId, court);
  hideAllLeagueModals();
  renderLeagueDetail(leagueId);
}

function showLeagueModal(id) {
  document.getElementById(id).style.display = 'flex';
}
function hideAllLeagueModals() {
  ['create-league-modal','create-team-modal','team-detail-modal','match-result-modal'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}

function startLeague(leagueId) {
  updateLeague(leagueId, { status: 'active' });
  renderLeagueDetail(leagueId);
}

function generateAndRenderBracket(leagueId) {
  generateBracket(leagueId);
  leagueDetailTab = 'bracket';
  renderLeagueDetail(leagueId);
}

// Inject modals when league tab loads for the first time
let leagueModalsInjected = false;
function ensureLeagueModals() {
  if (leagueModalsInjected) return;
  leagueModalsInjected = true;
  const existing = document.getElementById('create-league-modal');
  if (!existing) {
    const frag = document.createElement('div');
    frag.innerHTML = getLeagueModalHTML();
    document.body.appendChild(frag);
  }
}

// Hook into existing modal system
const _origSwitchView = switchView;
switchView = function(viewName) {
  _origSwitchView(viewName);
  if (viewName === 'league') ensureLeagueModals();
};
