<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pickleball Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ──────────────────────────────────────────────────────
   DESIGN TOKENS
────────────────────────────────────────────────────── */
:root {
  --bg-base:      #0B0F1A;
  --bg-surface:   #111827;
  --bg-elevated:  #1E293B;
  --bg-input:     #1a2233;
  --navy:         #003B73;
  --teal:         #14B8A6;
  --teal-hover:   #0D9488;
  --teal-subtle:  rgba(20, 184, 166, 0.1);
  --gold:         #F5A623;
  --gold-subtle:  rgba(245, 166, 35, 0.15);
  --green:        #22C55E;
  --green-subtle: rgba(34, 197, 94, 0.15);
  --red:          #EF4444;
  --red-subtle:   rgba(239, 68, 68, 0.18);
  --blue:         #3B82F6;
  --blue-subtle:  rgba(59, 130, 246, 0.15);
  --amber:        #F59E0B;
  --text-primary: #F8FAFC;
  --text-secondary:#94A3B8;
  --text-muted:   #64748B;
  --border:       rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.14);
  --border-teal:  rgba(20, 184, 166, 0.3);
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.4);
  --shadow-md:  0 4px 12px rgba(0,0,0,0.5);
  --shadow-lg:  0 8px 24px rgba(0,0,0,0.6);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --hour-h: 72px;
  --time-col-w: 56px;
  --court-hdr-h: 52px;
  --DAY_START: 7;
  --DAY_END: 21;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2d3a4f; border-radius: 3px; }

/* ──────────────────────────────────────────────────────
   HEADER
────────────────────────────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11, 15, 26, 0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: var(--space-2) var(--space-3);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--space-2) var(--space-3);
  min-height: 48px;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  text-decoration: none;
  flex-shrink: 0;
}

.brand-icon {
  width: 30px;
  height: 30px;
  background: linear-gradient(135deg, var(--teal), var(--navy));
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  box-shadow: 0 0 10px rgba(20, 184, 166, 0.3);
  flex-shrink: 0;
}

.brand-text {
  font-size: 13px;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  white-space: nowrap;
}

.brand-text span { color: var(--teal); }

/* Date navigation */
.date-nav {
  display: flex;
  align-items: center;
  gap: 2px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2px;
  flex-shrink: 0;
}

.date-nav button {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  line-height: 1;
}

.date-nav button:hover { background: var(--bg-elevated); color: var(--text-primary); }

.current-date {
  font-size: 11px;
  font-weight: 700;
  min-width: 88px;
  text-align: center;
  padding: 4px 6px;
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  white-space: nowrap;
  letter-spacing: -0.01em;
}

.current-date.today {
  background: var(--teal-subtle);
  color: var(--teal);
  border: 1px solid var(--border-teal);
}

.date-today-btn {
  height: 28px;
  padding: 0 8px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 9px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}

.date-today-btn:hover { background: var(--teal-subtle); color: var(--teal); }

/* Time format toggle */
.time-format-btn {
  height: 28px;
  padding: 0 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-muted);
  font-size: 9px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.time-format-btn:hover { border-color: var(--border-hover); color: var(--text-secondary); }
.time-format-btn.active { background: var(--teal-subtle); color: var(--teal); border-color: var(--border-teal); }

/* Metrics strip */
.metrics-strip {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.metric-card {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 3px 10px;
  font-size: 10px;
  transition: border-color 0.2s;
}

.metric-card:hover { border-color: var(--border-hover); }
.metric-card .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.metric-card .label { color: var(--text-muted); font-weight: 500; }
.metric-card .value { font-weight: 800; font-variant-numeric: tabular-nums; }
.metric-card .value.teal  { color: var(--teal); }
.metric-card .value.gold  { color: var(--gold); }
.metric-card .value.green { color: var(--green); }

/* Header action buttons */
.header-actions {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  flex-shrink: 0;
  width: 100%;
  margin-top: 2px;
}

.header-btn {
  height: 32px;
  padding: 0 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}

.header-btn:hover { background: var(--teal-subtle); color: var(--teal); border-color: var(--border-teal); }

/* ──────────────────────────────────────────────────────
   QUICK PANEL — STICKY TOP BAR (always visible in viewport)
────────────────────────────────────────────────────── */
.quick-panel {
  position: sticky;
  top: 0;
  z-index: 90;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-hover);
  padding: var(--space-2) var(--space-3);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  min-height: 54px;
  transition: all 0.2s;
}

.quick-panel.hidden {
  display: none;
}

/* Selected session indicator strip on the left */
.qp-indicator {
  width: 3px;
  height: 36px;
  border-radius: 2px;
  flex-shrink: 0;
  background: var(--teal);
}

.qp-court-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  flex-shrink: 0;
}

.qp-court-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--teal);
}

.qp-time {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
  white-space: nowrap;
  flex-shrink: 0;
}

.qp-info { flex: 1; min-width: 0; }

.qp-type-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}

.qp-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.qp-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.qp-actions {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  flex-shrink: 0;
}

.qp-btn {
  height: 32px;
  padding: 0 12px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}

.qp-btn:hover { background: var(--bg-base); color: var(--text-primary); border-color: var(--border-hover); }
.qp-btn.primary { background: var(--teal); border-color: var(--teal); color: #fff; font-weight: 700; padding: 0 16px; }
.qp-btn.primary:hover { background: var(--teal-hover); border-color: var(--teal-hover); }
.qp-btn.primary:disabled { opacity: 0.35; cursor: not-allowed; }
.qp-btn.danger:hover { background: var(--red-subtle); color: var(--red); border-color: rgba(239,68,68,0.4); }
.qp-btn.info-btn { background: var(--bg-surface); border-color: var(--border); }
.qp-btn.info-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }

/* Session type pills */
.session-type-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 20px;
  border: 1px solid;
  width: fit-content;
}

.pill-open      { background: rgba(20,184,166,0.2); color: #5eead4; border-color: rgba(20,184,166,0.4); }
.pill-reserved  { background: rgba(59,130,246,0.2); color: #93c5fd; border-color: rgba(59,130,246,0.4); }
.pill-league    { background: rgba(245,166,35,0.2); color: #fcd34d; border-color: rgba(245,166,35,0.4); }
.pill-tournament{ background: rgba(239,68,68,0.2); color: #fca5a5; border-color: rgba(239,68,68,0.4); }
.pill-clinic    { background: rgba(139,92,246,0.2); color: #c4b5fd; border-color: rgba(139,92,246,0.4); }
.pill-lesson    { background: rgba(236,72,153,0.2); color: #f9a8d4; border-color: rgba(236,72,153,0.4); }

/* ──────────────────────────────────────────────────────
   DAY GRID
────────────────────────────────────────────────────── */
.day-view {
  display: flex;
  flex-direction: column;
}

.day-grid {
  display: flex;
  flex: 1;
  overflow: auto;
  position: relative;
}

/* Time column */
.time-col {
  width: var(--time-col-w);
  flex-shrink: 0;
  position: relative;
  background: var(--bg-base);
  z-index: 5;
  border-right: 1px solid var(--border);
}

.time-col-header {
  height: var(--court-hdr-h);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  background: var(--bg-base);
  z-index: 6;
}

.time-cell {
  height: var(--hour-h);
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding-right: 6px;
  padding-top: 3px;
}

.time-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.01em;
}

/* Courts area */
.courts-area {
  display: flex;
  flex: 1;
  min-width: 0;
}

.court-column {
  flex: 1;
  min-width: 180px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}

.court-column:last-child { border-right: none; }

/* Court column header */
.court-col-header {
  height: var(--court-hdr-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-3);
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  position: sticky;
  top: 0;
  z-index: 6;
  gap: var(--space-2);
  flex-shrink: 0;
}

.court-title-group {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  min-width: 0;
}

.court-status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.court-status-dot.live {
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
  animation: pulse-dot 2s infinite;
}

.court-status-dot.available { background: var(--text-muted); }

@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
  50% { box-shadow: 0 0 0 5px rgba(34,197,94,0.1); }
}

.court-number {
  font-size: 13px;
  font-weight: 800;
  color: var(--text-primary);
  white-space: nowrap;
}

.court-live-label {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--green);
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 20px;
  padding: 1px 6px;
  animation: pulse-label 2s infinite;
}

@keyframes pulse-label {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.court-add-btn {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  line-height: 1;
  flex-shrink: 0;
}

.court-add-btn:hover { background: var(--teal-subtle); color: var(--teal); border-color: var(--border-teal); }

/* Court body — scrollable area with hour grid */
.court-body {
  position: relative;
  flex: 1;
}

.hour-grid {
  position: relative;
}

.hour-row {
  height: var(--hour-h);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

/* Current time line */
.current-time-line {
  position: absolute;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--red);
  z-index: 8;
  pointer-events: none;
}

.current-time-line::before {
  content: '';
  position: absolute;
  left: -4px;
  top: -4px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--red);
}

/* Now dot in time column */
.now-dot {
  position: absolute;
  left: calc(var(--time-col-w) - 5px);
  top: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(34,197,94,0.25);
  z-index: 9;
  transform: translateY(-50%);
  animation: pulse-dot 2s infinite;
}

/* Now badge in court column header */
.now-badge {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--green);
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 20px;
  padding: 1px 6px;
  animation: pulse-label 2s infinite;
  flex-shrink: 0;
}

/* ──────────────────────────────────────────────────────
   SESSION BLOCKS
────────────────────────────────────────────────────── */
.session-block {
  position: absolute;
  left: 4px;
  right: 4px;
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  border-top-width: 3px;
  padding: 6px 8px;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  z-index: 4;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 30px;
}

.session-block:hover {
  border-color: rgba(255,255,255,0.15);
  z-index: 5;
}

.session-block.selected {
  box-shadow: 0 0 0 2px var(--teal), 0 4px 16px rgba(0,0,0,0.6);
  z-index: 7;
  border-color: rgba(20,184,166,0.4) !important;
}

/* Type colors */
.session-block.type-open      { background: rgba(20,184,166,0.22); border-top-color: var(--teal); }
.session-block.type-reserved  { background: rgba(59,130,246,0.22); border-top-color: var(--blue); }
.session-block.type-league    { background: rgba(245,166,35,0.22); border-top-color: var(--gold); }
.session-block.type-tournament{ background: rgba(239,68,68,0.22);  border-top-color: var(--red); }

/* Currently playing block — extra glow */
.session-block.is-live {
  box-shadow: 0 0 0 1px rgba(34,197,94,0.4), 0 4px 16px rgba(34,197,94,0.15);
}

.session-block.is-live.selected {
  box-shadow: 0 0 0 2px var(--green), 0 0 0 4px rgba(34,197,94,0.2), 0 4px 16px rgba(0,0,0,0.6);
}

.sb-time {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-variant-numeric: tabular-nums;
}

.sb-title {
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  gap: 4px;
}

.sb-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.sb-players {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
}

.sb-badge {
  font-size: 9px;
  font-weight: 900;
  padding: 1px 6px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.sb-badge.queue { background: rgba(245,166,35,0.3); color: #fcd34d; border: 1px solid rgba(245,166,35,0.5); }
.sb-badge.full  { background: rgba(239,68,68,0.25); color: #fca5a5; border: 1px solid rgba(239,68,68,0.45); }

/* Click hint shown briefly after selecting a session */
.click-hint {
  position: absolute;
  bottom: 4px;
  right: 4px;
  font-size: 8px;
  font-weight: 700;
  color: var(--teal);
  opacity: 0;
  animation: fadeHint 2s ease-out forwards;
}

@keyframes fadeHint {
  0%   { opacity: 0; }
  20%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ──────────────────────────────────────────────────────
   MODAL
────────────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: var(--space-4);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-hover);
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 440px;
  box-shadow: var(--shadow-lg);
  animation: modal-enter 0.25s cubic-bezier(0,0,0.2,1);
  overflow: hidden;
  max-height: 90vh;
  overflow-y: auto;
}

@keyframes modal-enter {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-elevated);
  position: sticky;
  top: 0;
  z-index: 1;
}

.modal-title { font-size: 14px; font-weight: 800; color: var(--text-primary); }

.modal-close {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  line-height: 1;
}

.modal-close:hover { background: var(--bg-base); color: var(--text-primary); }

.modal-body { padding: var(--space-4) var(--space-5); display: flex; flex-direction: column; gap: var(--space-4); }

.fg { display: flex; flex-direction: column; gap: 5px; }

.fg label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-muted);
}

.fg input, .fg select {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 13px;
  padding: 9px 12px;
  font-family: inherit;
  width: 100%;
  transition: border-color 0.15s;
}

.fg input:focus, .fg select:focus { outline: none; border-color: var(--teal); }
.fg select option { background: var(--bg-surface); }

.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }

.queue-entry {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: 7px 10px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}

.queue-entry .pos {
  font-size: 10px;
  font-weight: 800;
  color: var(--text-muted);
  width: 18px;
  flex-shrink: 0;
}

.queue-entry .name { flex: 1; font-size: 12px; font-weight: 600; color: var(--text-primary); }
.queue-entry .size { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
.queue-entry .time { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
.queue-entry .call-btn {
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-teal);
  background: var(--teal-subtle);
  color: var(--teal);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  flex-shrink: 0;
}
.queue-entry .call-btn:hover { background: var(--teal); color: #fff; }

.modal-footer {
  padding: var(--space-3) var(--space-5);
  border-top: 1px solid var(--border);
  display: flex;
  gap: var(--space-3);
  justify-content: flex-end;
  background: var(--bg-elevated);
  position: sticky;
  bottom: 0;
}

.btn-cancel {
  height: 34px;
  padding: 0 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.btn-cancel:hover { background: var(--bg-base); color: var(--text-primary); }

.btn-save {
  height: 34px;
  padding: 0 20px;
  border-radius: var(--radius-md);
  border: none;
  background: var(--teal);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}

.btn-save:hover { background: var(--teal-hover); }

/* ──────────────────────────────────────────────────────
   TOAST
────────────────────────────────────────────────────── */
.toast-container {
  position: fixed;
  top: 70px;
  right: 12px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  pointer-events: none;
}

.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-hover);
  border-radius: var(--radius-md);
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  animation: toast-in 0.3s cubic-bezier(0,0,0.2,1);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  max-width: 270px;
}

.toast.exit { animation: toast-out 0.25s cubic-bezier(0.4,0,0.2,1) forwards; }

@keyframes toast-in  { from { opacity: 0; transform: translateX(120%); } to { opacity: 1; transform: translateX(0); } }
@keyframes toast-out { from { opacity: 1; transform: translateX(0); }     to { opacity: 0; transform: translateX(120%); } }

.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--teal); }
.toast.warning { border-left: 3px solid var(--amber); }

.toast-icon { font-size: 13px; flex-shrink: 0; }

/* ──────────────────────────────────────────────────────
   RESPONSIVE
────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .metrics-strip { display: none; }
}

@media (max-width: 640px) {
  .court-column { min-width: 140px; }
  :root { --time-col-w: 44px; --hour-h: 60px; }
  .qp-time { font-size: 13px; }
  .qp-btn { padding: 0 8px; font-size: 10px; }
  .header { padding: var(--space-2); gap: var(--space-2); }
}

@media (max-width: 375px) {
  .court-column { min-width: 120px; }
  .qp-court-badge, .qp-indicator { display: none; }
  .qp-time { font-size: 12px; }
}

/* ──────────────────────────────────────────────────────
   SESSION DETAIL MODAL — MATCHUP VIEW
────────────────────────────────────────────────────── */
.modal-overlay.open { align-items: flex-end; justify-content: center; }

.session-detail-modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-hover);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%;
  max-width: 900px;
  max-height: 92vh;
  box-shadow: var(--shadow-lg);
  animation: modal-enter 0.3s cubic-bezier(0,0,0.2,1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  margin: 0;
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
}

@keyframes modal-enter {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

/* Modal header */
.sdm-header {
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  background: var(--bg-elevated);
  flex-shrink: 0;
}

.sdm-live-badge {
  font-size: 9px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--green);
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.35);
  border-radius: 20px;
  padding: 2px 8px;
  animation: pulse-label 2s infinite;
}

@keyframes pulse-label {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.sdm-title {
  flex: 1;
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-wrap: wrap;
}

.sdm-court-time {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
}

.sdm-close {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.sdm-close:hover { background: var(--bg-base); color: var(--text-primary); border-color: var(--border-hover); }

/* Scrollable body */
.sdm-body {
  overflow-y: auto;
  flex: 1;
  padding: var(--space-4) var(--space-5);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  -webkit-overflow-scrolling: touch;
}

/* ─── SCOREBOARD ─── */
.scoreboard {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  min-width: 0;
  width: 100%;
}

.team-score-side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-4) var(--space-4);
  gap: 4px;
  min-width: 120px;
  flex-shrink: 0;
  text-align: center;
}

.team-score-side.team-a { background: rgba(20,184,166,0.08); }
.team-score-side.team-b { background: rgba(248,113,113,0.08); }

.team-label {
  font-size: 9px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.team-a .team-label { color: var(--teal); }
.team-b .team-label { color: #F87171; }

.team-players-row {
  display: flex;
  gap: 4px;
  justify-content: center;
  flex-wrap: wrap;
}

.team-mini-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
  object-fit: cover;
}

.team-a .team-mini-avatar { background: var(--teal); }
.team-b .team-mini-avatar { background: #F87171; }

.score-number {
  font-size: 52px;
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  transition: transform 0.15s;
  max-width: 100%;
  text-align: center;
  padding: 2px 0;
}

.team-a .score-number { color: var(--teal); }
.team-b .score-number { color: #F87171; }

.score-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-base);
  color: var(--text-secondary);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  line-height: 1;
}

.score-btn:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-hover); }
.score-btn:active { transform: scale(0.92); background: var(--bg-elevated); }

.score-btn-row {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  justify-content: center;
  width: 100%;
}

.score-divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: var(--space-3) var(--space-3);
  flex-shrink: 0;
  min-width: 80px;
  text-align: center;
}

.score-colon {
  font-size: 36px;
  font-weight: 900;
  color: var(--text-muted);
  line-height: 1;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.score-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  text-align: center;
}

.game-history-pills {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

/* ─── MATCHUP SECTION ─── */
.matchup-section {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: var(--space-4);
  align-items: start;
}

/* Player cards column */
.player-col {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.player-col-header {
  font-size: 9px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}

.player-col.team-a .player-col-header { color: var(--teal); border-color: rgba(20,184,166,0.3); }
.player-col.team-b .player-col-header { color: #F87171; border-color: rgba(248,113,113,0.3); }

.player-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-3);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  transition: border-color 0.15s;
  min-height: 56px;
}

.player-card:hover { border-color: var(--border-hover); }
.player-card.is-live { border-color: var(--green); box-shadow: 0 0 0 1px rgba(34,197,94,0.2); }

.player-card-actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
  flex-shrink: 0;
}

.player-avatar {
  width: 40px;
  height: 40px;
  min-width: 40px;
  min-height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
  position: relative;
  object-fit: cover;
}

.team-a .player-avatar { background: var(--teal); }
.team-b .player-avatar { background: #F87171; }

.avatar-placeholder {
  background: rgba(255,255,255,0.12);
}

.player-info { flex: 1; min-width: 0; }

.player-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-position {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 600;
  margin-top: 1px;
  letter-spacing: 0.02em;
}

.player-status-badge {
  font-size: 8px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 1px 5px;
  border-radius: 20px;
  border: 1px solid;
  flex-shrink: 0;
}

.player-status-badge.playing {
  background: rgba(34,197,94,0.15);
  color: var(--green);
  border-color: rgba(34,197,94,0.35);
}

.player-status-badge.waiting {
  background: rgba(245,166,35,0.15);
  color: var(--amber);
  border-color: rgba(245,166,35,0.35);
}

.waiting-label {
  font-size: 10px;
  color: var(--text-muted);
  font-style: italic;
  padding: var(--space-2) var(--space-3);
  text-align: center;
}

/* ─── COURT DIAGRAM ─── */
.court-diagram-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-2);
  overflow: visible;
  padding: var(--space-2) 0;
}

.court-svg {
  width: 240px;
  height: auto;
  overflow: visible;
}

.court-area { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 2; }
.court-net { stroke: rgba(255,255,255,0.5); stroke-width: 1.5; stroke-dasharray: 6 3; }
.court-line { stroke: rgba(255,255,255,0.15); stroke-width: 1; }
.court-label { font-size: 8px; fill: rgba(255,255,255,0.25); font-family: Inter, sans-serif; }

.player-dot {
  cursor: pointer;
  transition: r 0.15s;
}
.player-dot:hover { r: 9; }

.player-dot-label {
  font-size: 8px;
  font-weight: 800;
  fill: #fff;
  font-family: Inter, sans-serif;
  pointer-events: none;
  text-anchor: middle;
  dominant-baseline: central;
}

.court-hint {
  font-size: 9px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 4px;
}

/* ─── QUEUE SECTION ─── */
.queue-section {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}

.queue-section-header {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
}

.queue-section-title {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--amber);
  display: flex;
  align-items: center;
  gap: 5px;
}

.queue-entry-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

.queue-entry-row:last-child { border-bottom: none; }
.queue-entry-row:hover { background: rgba(255,255,255,0.02); }

.qe-pos { font-size: 10px; font-weight: 800; color: var(--text-muted); width: 20px; flex-shrink: 0; }
.qe-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(245,166,35,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 800;
  color: var(--amber);
  flex-shrink: 0;
}
.qe-avatar-img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.qe-name { flex: 1; font-size: 12px; font-weight: 600; color: var(--text-primary); }
.qe-size { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
.qe-wait { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
.qe-call {
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-teal);
  background: var(--teal-subtle);
  color: var(--teal);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  flex-shrink: 0;
}
.qe-call:hover { background: var(--teal); color: #fff; }

.queue-empty {
  padding: var(--space-4);
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
}

/* ─── ACTION BAR ─── */
.sdm-actions {
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--border);
  display: flex;
  gap: var(--space-2);
  justify-content: flex-end;
  align-items: center;
  background: var(--bg-elevated);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.sdm-btn {
  height: 34px;
  padding: 0 18px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
  font-family: inherit;
  white-space: nowrap;
}

.sdm-btn:hover { background: var(--bg-base); color: var(--text-primary); border-color: var(--border-hover); }
.sdm-btn.primary { background: var(--teal); border-color: var(--teal); color: #fff; }
.sdm-btn.primary:hover { background: var(--teal-hover); border-color: var(--teal-hover); }
.sdm-btn.primary:disabled { opacity: 0.35; cursor: not-allowed; }
.sdm-btn.danger:hover { background: var(--red-subtle); color: var(--red); border-color: rgba(239,68,68,0.4); }

/* Rating display */
.player-rating { margin: 2px 0; display: flex; align-items: center; gap: 4px; }
.dupr-value { font-size: 12px; font-weight: 800; color: #F5A623; }
.dupr-label { font-size: 9px; color: var(--text-muted); font-weight: 600; }

/* Rotation buttons */
.rotate-out-btn, .rotate-in-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg-base);
  color: var(--text-secondary); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.rotate-out-btn:hover { background: rgba(245,166,35,0.15); border-color: var(--amber); color: var(--amber); }
.rotate-in-btn:hover { background: rgba(20,184,166,0.15); border-color: var(--teal); color: var(--teal); }

/* Waiting Room */
.waiting-room-section {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.wr-header {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-2);
}
.wr-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--amber); }
.wr-controls { display: flex; align-items: center; gap: 8px; }
.wr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--space-3); padding: var(--space-4); }
.wr-card {
  background: var(--bg-base); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: var(--space-3);
  display: flex; align-items: center; gap: var(--space-3);
  transition: border-color 0.15s;
}
.wr-card:hover { border-color: var(--amber); }
.wr-avatar { flex-shrink: 0; object-fit: cover; border-radius: 50%; width: 44px; height: 44px; }
.wr-info { flex: 1; min-width: 0; }
.wr-name { font-size: 12px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wr-rating { margin: 2px 0; }
.wr-wait { font-size: 10px; color: var(--text-muted); }
.wr-team-badge {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 20px;
  border: 1px solid;
  width: fit-content;
}
.wr-team-badge.team-a { background: rgba(20,184,166,0.15); color: #14B8A6; border-color: rgba(20,184,166,0.4); }
.wr-team-badge.team-b { background: rgba(248,113,113,0.15); color: #F87171; border-color: rgba(248,113,113,0.4); }

/* Waiting room position indicator */
.wr-pos {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.wr-pos-next {
  background: rgba(245,166,35,0.15);
  color: var(--amber);
  border-color: rgba(245,166,35,0.4);
}

/* Next up card highlight */
.wr-next {
  border-color: rgba(245,166,35,0.3);
  background: rgba(245,166,35,0.04);
}

/* Name row with optional badge */
.wr-name-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.wr-next-badge {
  font-size: 8px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--amber);
  background: rgba(245,166,35,0.15);
  border: 1px solid rgba(245,166,35,0.3);
  border-radius: 20px;
  padding: 1px 6px;
  white-space: nowrap;
}

.star-btn {
  padding: 5px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-base);
  color: rgba(255,255,255,0.2); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.star-btn:hover { border-color: var(--amber); color: var(--amber); }

/* Scoreboard team mini avatars */
.team-mini-avatar { border-radius: 50%; }

/* ─── RESPONSIVE ─── */
@media (max-width: 700px) {
  .matchup-section {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    gap: var(--space-3);
  }
  .court-diagram-wrap { order: -1; }
  .court-svg { width: 200px; }
  .score-number { font-size: 44px; }
  .sdm-body { padding: var(--space-3); }
  .scoreboard { flex-wrap: nowrap; }
  .team-score-side { min-width: 100px; flex-shrink: 0; padding: var(--space-3); }
  .score-divider { min-width: 70px; flex-shrink: 0; padding: var(--space-2); }
  .score-colon { font-size: 28px; }
  .sdm-btn { height: 32px; padding: 0 12px; font-size: 11px; }
}

@media (max-width: 375px) {
  .score-number { font-size: 36px; }
  .team-score-side { padding: var(--space-2); min-width: 90px; flex-shrink: 0; }
  .sdm-header { padding: var(--space-3) var(--space-4); }
  .sdm-actions { padding: var(--space-2) var(--space-3); gap: 6px; }
  .sdm-btn { height: 30px; padding: 0 10px; font-size: 10px; }
  .wr-grid { grid-template-columns: 1fr; padding: var(--space-3); }
  .score-btn { width: 28px; height: 28px; font-size: 16px; }
  .score-btn-row { gap: 4px; }
  .court-svg { width: 160px; }
}

/* ──────────────────────────────────────────────────────
   DASHBOARD VIEW
────────────────────────────────────────────────────── */
.dashboard-view { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
.dash-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.dash-stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  text-align: center;
}
.dash-stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.dash-stat-value { font-size: 24px; font-weight: 900; color: var(--text-primary); }
.dash-stat-card.teal .dash-stat-value { color: var(--teal); }
.dash-stat-card.green .dash-stat-value { color: var(--green); }
.dash-stat-card.gold .dash-stat-value { color: var(--gold); }
.dash-stat-card.blue .dash-stat-value { color: var(--blue); }
.dash-stat-sub { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

/* Dashboard Timeline */
.dash-section { margin-bottom: 24px; }
.dash-section-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
.dash-timeline { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow-x: auto; }
.dash-timeline-inner { min-width: 700px; padding: 12px; position: relative; }
.dash-timeline-header { display: flex; margin-left: 80px; margin-bottom: 8px; position: relative; }
.dash-timeline-hour { flex: 1; font-size: 10px; color: var(--text-muted); text-align: center; }
.dash-timeline-row { display: flex; align-items: center; height: 40px; margin-bottom: 4px; }
.dash-timeline-court { width: 80px; font-size: 12px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; }
.dash-timeline-track { flex: 1; position: relative; height: 32px; background: rgba(255,255,255,0.02); border-radius: 4px; }
.dash-timeline-bar { position: absolute; height: 100%; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10px; font-weight: 600; overflow: hidden; white-space: nowrap; cursor: pointer; transition: opacity 0.2s; }
.dash-timeline-bar:hover { opacity: 0.85; }
.dash-timeline-bar.open { background: var(--teal-subtle); color: var(--teal); border-left: 2px solid var(--teal); }
.dash-timeline-bar.reserved { background: var(--blue-subtle); color: var(--blue); border-left: 2px solid var(--blue); }
.dash-timeline-bar.league { background: var(--gold-subtle); color: var(--gold); border-left: 2px solid var(--gold); }
.dash-timeline-bar.tournament { background: var(--red-subtle); color: var(--red); border-left: 2px solid var(--red); }
.dash-timeline-bar.clinic { background: rgba(168,85,247,0.15); color: #a855f7; border-left: 2px solid #a855f7; }
.dash-timeline-bar.lesson { background: rgba(236,72,153,0.15); color: #ec4899; border-left: 2px solid #ec4899; }
.dash-now-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); z-index: 5; }
.dash-now-line::before { content: 'NOW'; position: absolute; top: -16px; left: -14px; font-size: 8px; font-weight: 800; color: var(--red); }

/* Quick Actions */
.dash-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
.dash-action-btn {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  color: var(--text-primary);
  font-family: inherit;
}
.dash-action-btn:hover { border-color: var(--teal); background: rgba(20,184,166,0.05); }
.dash-action-icon { font-size: 24px; margin-bottom: 6px; }
.dash-action-label { font-size: 11px; font-weight: 700; }

/* Activity Feed */
.dash-feed { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); max-height: 300px; overflow-y: auto; }
.dash-feed-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.dash-feed-item:last-child { border-bottom: none; }
.dash-feed-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.dash-feed-text { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
.dash-feed-text strong { color: var(--text-primary); font-weight: 600; }
.dash-feed-time { font-size: 10px; color: var(--text-muted); margin-left: auto; flex-shrink: 0; white-space: nowrap; }

/* Upcoming */
.dash-upcoming { display: flex; flex-direction: column; gap: 10px; }
.dash-upcoming-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.dash-upcoming-info { flex: 1; }
.dash-upcoming-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.dash-upcoming-meta { font-size: 12px; color: var(--text-muted); }
.dash-upcoming-spots { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.dash-upcoming-btn {
  padding: 8px 16px;
  background: var(--teal);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.dash-upcoming-btn:hover { background: var(--teal-hover); }

/* ──────────────────────────────────────────────────────
   CALENDAR VIEW
────────────────────────────────────────────────────── */
.calendar-view { padding: 16px; max-width: 900px; margin: 0 auto; }
.calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.calendar-nav { display: flex; align-items: center; gap: 8px; }
.calendar-nav button { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-secondary); padding: 6px 10px; cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.15s; }
.calendar-nav button:hover { border-color: var(--border-hover); color: var(--text-primary); }
.calendar-title { font-size: 18px; font-weight: 800; }
.calendar-view-toggle { display: flex; gap: 4px; }
.calendar-view-toggle button { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-muted); padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: all 0.15s; }
.calendar-view-toggle button.active { background: var(--teal-subtle); color: var(--teal); border-color: var(--border-teal); }
.calendar-view-toggle button:hover { border-color: var(--border-hover); }

/* Week View */
.week-grid { display: grid; grid-template-columns: 60px repeat(7, 1fr); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.week-header { background: var(--bg-surface); padding: 12px 8px; text-align: center; font-size: 12px; font-weight: 700; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
.week-header.today { color: var(--teal); }
.week-time-label { padding: 4px 8px; font-size: 10px; color: var(--text-muted); text-align: right; border-right: 1px solid var(--border); background: var(--bg-surface); display: flex; align-items: flex-start; justify-content: flex-end; min-height: 48px; }
.week-cell { min-height: 48px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; cursor: pointer; }
.week-cell:hover { background: rgba(255,255,255,0.02); }
.week-session { position: absolute; left: 2px; right: 2px; padding: 4px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; overflow: hidden; cursor: pointer; z-index: 1; }
.week-session.open { background: var(--teal-subtle); color: var(--teal); border-left: 2px solid var(--teal); }
.week-session.reserved { background: var(--blue-subtle); color: var(--blue); border-left: 2px solid var(--blue); }
.week-session.league { background: var(--gold-subtle); color: var(--gold); border-left: 2px solid var(--gold); }
.week-session.tournament { background: var(--red-subtle); color: var(--red); border-left: 2px solid var(--red); }
.week-session.clinic { background: rgba(168,85,247,0.15); color: #a855f7; border-left: 2px solid #a855f7; }
.week-session.lesson { background: rgba(236,72,153,0.15); color: #ec4899; border-left: 2px solid #ec4899; }
.now-indicator { position: absolute; left: 0; right: 0; height: 2px; background: var(--red); z-index: 2; pointer-events: none; }
.now-indicator::before { content: ''; position: absolute; left: -4px; top: -3px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; }

/* Month View */
.month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.month-day-header { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-muted); padding: 8px; }
.month-day { min-height: 80px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; cursor: pointer; transition: border-color 0.2s; }
.month-day:hover { border-color: var(--border-hover); }
.month-day.today { border-color: var(--teal); background: rgba(20,184,166,0.05); }
.month-day.other-month { opacity: 0.3; }
.month-day-num { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.month-day-sessions { font-size: 10px; color: var(--text-muted); }
.month-day-dots { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
.month-day-dots .dot { width: 6px; height: 6px; border-radius: 50%; }

/* ──────────────────────────────────────────────────────
   KIOSK VIEW
────────────────────────────────────────────────────── */
.kiosk-view { padding: 24px; max-width: 800px; margin: 0 auto; }
.kiosk-title { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 24px; }
.kiosk-session-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kiosk-session-card {
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.kiosk-session-card:hover { border-color: var(--teal); transform: scale(1.02); }
.kiosk-session-card.active { border-color: var(--teal); background: rgba(20,184,166,0.05); }
.kiosk-session-name { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.kiosk-session-time { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; }
.kiosk-session-court { font-size: 12px; color: var(--text-muted); }
.kiosk-session-players { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
.kiosk-player-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.kiosk-player-card {
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 16px;
}
.kiosk-player-card:hover { border-color: var(--teal); }
.kiosk-player-card.checked-in { border-color: var(--green); background: rgba(34,197,94,0.05); }
.kiosk-player-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
.kiosk-player-name { font-size: 16px; font-weight: 700; }
.kiosk-player-status { font-size: 12px; margin-top: 4px; }
.kiosk-player-status.confirmed { color: var(--amber); }
.kiosk-player-status.checked-in { color: var(--green); }
.kiosk-checkin-btn {
  width: 100%;
  padding: 20px;
  font-size: 20px;
  font-weight: 800;
  border: none;
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 16px;
  font-family: inherit;
}
.kiosk-checkin-btn.ready { background: var(--green); color: white; }
.kiosk-checkin-btn.ready:hover { background: #16a34a; }
.kiosk-checkin-btn.done { background: var(--teal); color: white; }
.kiosk-walkin-btn {
  width: 100%;
  padding: 16px;
  font-size: 16px;
  font-weight: 700;
  background: var(--amber);
  color: #000;
  border: none;
  border-radius: var(--radius-lg);
  cursor: pointer;
  margin-top: 12px;
  font-family: inherit;
}
.kiosk-walkin-btn:hover { background: #d97706; }
.kiosk-back { font-size: 14px; color: var(--text-muted); cursor: pointer; margin-bottom: 16px; display: inline-block; }
.kiosk-back:hover { color: var(--text-secondary); }
.kiosk-checkin-animation { animation: kioskPop 0.4s ease-out; }
@keyframes kioskPop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

/* ──────────────────────────────────────────────────────
   TV DISPLAY MODE
────────────────────────────────────────────────────── */
.tv-mode {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-base);
  z-index: 9999;
  padding: 32px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.tv-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}
.tv-venue-name { font-size: 32px; font-weight: 900; }
.tv-live { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--green); }
.tv-live .dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.tv-time { font-size: 48px; font-weight: 900; font-variant-numeric: tabular-nums; }
.tv-courts { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; flex: 1; }
.tv-court-card {
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 24px;
  display: flex;
  flex-direction: column;
}
.tv-court-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.tv-court-name { font-size: 24px; font-weight: 800; }
.tv-court-status { font-size: 14px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
.tv-court-status.live { background: var(--green-subtle); color: var(--green); }
.tv-court-status.available { background: rgba(255,255,255,0.05); color: var(--text-muted); }
.tv-session-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.tv-session-time { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; }
.tv-session-type-pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
.tv-score { text-align: center; font-size: 64px; font-weight: 900; margin: 16px 0; }
.tv-score .team-a { color: var(--teal); }
.tv-score .vs { font-size: 24px; color: var(--text-muted); margin: 0 16px; }
.tv-score .team-b { color: var(--red); }
.tv-players { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.tv-player { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
.tv-player img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
.tv-queue-info { font-size: 13px; color: var(--text-muted); margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
.tv-ticker {
  margin-top: auto;
  padding: 16px 0;
  border-top: 1px solid var(--border);
  overflow: hidden;
  white-space: nowrap;
}
.tv-ticker-content {
  display: inline-block;
  animation: scroll-ticker 30s linear infinite;
  font-size: 14px;
  color: var(--text-secondary);
}
@keyframes scroll-ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
.tv-exit { position: fixed; top: 16px; right: 16px; z-index: 10000; }
.tv-exit button { padding: 8px 16px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); cursor: pointer; font-size: 12px; font-family: inherit; }
.tv-exit button:hover { background: rgba(0,0,0,0.7); color: var(--text-primary); }
.tv-court-available-msg { color: var(--text-muted); font-size: 14px; text-align: center; padding: 20px 0; }
.tv-next-session { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
.tv-court-card.live { border-color: var(--green); }

/* Responsive for Dashboard */
@media (max-width: 700px) {
  .dash-stats { grid-template-columns: repeat(2, 1fr); }
  .dash-actions { grid-template-columns: repeat(2, 1fr); }
  .dash-timeline { overflow-x: auto; }
  .kiosk-player-list { grid-template-columns: 1fr; }
  .kiosk-session-grid { grid-template-columns: 1fr; }
  .calendar-view { padding: 12px 8px; }
  .week-grid { font-size: 10px; }
  .tv-venue-name { font-size: 24px; }
  .tv-time { font-size: 32px; }
  .tv-courts { grid-template-columns: 1fr; }
}

/* ──────────────────────────────────────────────────────
   BOTTOM TAB BAR
────────────────────────────────────────────────────── */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  background: rgba(11, 15, 26, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 0;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tab-item.active { color: var(--teal); }
.tab-item .tab-icon { font-size: 20px; line-height: 1; }
.tab-item:hover { color: var(--text-secondary); }
.tab-item.active:hover { color: var(--teal); }

/* View containers */
.view-container { display: none; padding-bottom: 80px; }
.view-container.active { display: block; }

/* ──────────────────────────────────────────────────────
   SETTINGS VIEW
────────────────────────────────────────────────────── */
.settings-view { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
.settings-section { margin-bottom: 24px; }
.settings-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 8px;
}
.settings-row-label { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.settings-row-value { font-size: 13px; color: var(--text-secondary); text-align: right; }
.settings-row input, .settings-row select {
  background: var(--bg-input);

function buildPlayerDirectory() {
  const dir = {};
  PLAYER_POOL.forEach(p => {
    dir[p.name] = {
      name: p.name,
      rating: p.rating,
      sessionsPlayed: Math.floor(hashCode(p.name) % 20) + 1,
      wins: Math.floor(hashCode(p.name + 'w') % 15),
      losses: Math.floor(hashCode(p.name + 'l') % 12),
      lastPlayed: state.currentDate,
      memberSince: '2024-' + String((hashCode(p.name) % 12) + 1).padStart(2, '0') + '-15'
    };
  });
  // Add players from bookings/queue
  [...state.bookings, ...state.queue].forEach(b => {
    if (!dir[b.playerName]) {
      dir[b.playerName] = {
        name: b.playerName,
        rating: b.rating || 3.0,
        sessionsPlayed: 1,
        wins: 0,
        losses: 0,
        lastPlayed: state.currentDate,
        memberSince: state.currentDate
      };
    }
  });
  return dir;
}

let currentView = 'schedule';

function switchView(viewName) {
  currentView = viewName;
  // Update tab bar
  document.querySelectorAll('.tab-item').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.view === viewName);
  });
  // Update view containers
  document.querySelectorAll('.view-container').forEach(vc => {
    vc.classList.toggle('active', vc.id === 'view-' + viewName);
  });
  // Show/hide header elements based on view
  const dateNav = document.querySelector('.date-nav');
  const todayBtn = document.querySelector('.date-today-btn');
  const timeFmtBtn = document.getElementById('timeFormatBtn');
  const metrics = document.getElementById('metricsStrip');
  const headerActions = document.querySelector('.header-actions');
  const isSchedule = viewName === 'schedule';
  if (dateNav) dateNav.style.display = isSchedule ? '' : 'none';
  if (todayBtn) todayBtn.style.display = isSchedule ? '' : 'none';
  if (timeFmtBtn) timeFmtBtn.style.display = isSchedule ? '' : 'none';
  if (metrics) metrics.style.display = isSchedule ? '' : 'none';
  if (headerActions) headerActions.style.display = isSchedule ? '' : 'none';
  // Render the active view
  if (viewName === 'schedule') render();
  else if (viewName === 'dashboard') renderDashboardView();
  else if (viewName === 'calendar') renderCalendarView();
  else if (viewName === 'kiosk') renderKioskView();
  else if (viewName === 'courts') renderCourtsView();
  else if (viewName === 'bookings') renderBookingsView();
  else if (viewName === 'players') renderPlayersView();
  else if (viewName === 'settings') renderSettingsView();
  else if (viewName === 'analytics') renderAnalyticsView();
}

// ══════════════════════════════════════════════════════
// TIME FORMATTING
// ══════════════════════════════════════════════════════
function fmtTime24(h, m) {
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function fmtTimeDisplay(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  if (timeFormat === '24h') {
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  } else {
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }
}

function fmtRange(startTime, endTime) {
  const [sh, sm] = startTime.split(':').map(Number);
  const [eh, em] = endTime.split(':').map(Number);
  return `${fmtTimeDisplay(sh, sm)} – ${fmtTimeDisplay(eh, em)}`;
}

// fmtTimeDisplay — accepts (h, m) numbers for time cell labels
function fmtTimeDisplay(h, m) {
  if (timeFormat === '24h') {
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  } else {
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }
}

// fmtRange — accepts (startTime, endTime) strings for session blocks
function fmtRange(startTime, endTime) {
  const [sh, sm] = startTime.split(':').map(Number);
  const [eh, em] = endTime.split(':').map(Number);
  return `${fmtTimeDisplay(sh, sm)} – ${fmtTimeDisplay(eh, em)}`;
}

function toggleTimeFormat() {
  timeFormat = timeFormat === '12h' ? '24h' : '12h';
  localStorage.setItem('pb_time_format', timeFormat);
  updateTimeFormatBtn();
  render();
}

function updateTimeFormatBtn() {
  const btn = document.getElementById('timeFormatBtn');
  btn.textContent = timeFormat === '12h' ? '24h' : '12h';
  btn.classList.toggle('active', timeFormat === '24h');
  btn.title = `Switch to ${timeFormat === '12h' ? '12' : '24'} hour format`;
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      state = { ...state, ...p };
    }
  } catch(e) {}
  if (!state.venue) state.venue = { ...DEFAULT_VENUE };
  else state.venue = { ...DEFAULT_VENUE, ...state.venue, pricing: { ...DEFAULT_VENUE.pricing, ...(state.venue.pricing || {}) } };
  if (!state.playerDirectory) state.playerDirectory = buildPlayerDirectory();
  if (!state.sessions || state.sessions.length === 0) seedSampleData();
}

function formatDate(dateStr) {
  const today = new Date().toISOString().split('T')[0];
  const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
  if (dateStr === today) return 'Today';
  if (dateStr === tomorrow) return 'Tomorrow';
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function sessBookings(sessionId) {
  return state.bookings.filter(b =>
    b.sessionId === sessionId && b.status !== 'cancelled' && b.status !== 'no_show'
  );
}

function sessQueue(sessionId) {
  return state.queue
    .filter(q => q.sessionId === sessionId && q.status === 'waiting')
    .sort((a,b) => a.position - b.position);
}

function totalPlayers(sessionId) {
  return sessBookings(sessionId).reduce((sum,b) => sum + b.groupSize, 0);
}

  const [h] = startTime.split(':').map(Number);
  const timeLabel = h < 12 ? 'Morning' : h < 17 ? 'Afternoon' : 'Evening';
  const typeLabels = { open: 'Open Play', reserved: 'Reserved Session', league: 'League Match', tournament: 'Tournament', clinic: 'Clinic', lesson: 'Private Lesson' };
  return `${timeLabel} ${typeLabels[type] || 'Session'}`;
}

  if (s.pricePerPlayer != null) return s.pricePerPlayer;
  const v = state.venue || DEFAULT_VENUE;
  const map = { open: v.pricing.openPlay, reserved: v.pricing.reserved, league: v.pricing.league, tournament: v.pricing.tournament, clinic: v.pricing.clinic, lesson: v.pricing.lesson };
  return map[s.type] || v.pricing.openPlay;
}

  return s.maxPlayers || 4;
}

// ─── Matchup Algorithm ───────────────────────────────────
// Auto-balances two teams of 2 so total rating is equal ±1
// Greedy: sort waiting players by rating desc, then alternate assignment
function balanceTeams(waitingPlayers) {
  const sorted = [...waitingPlayers].sort((a, b) => b.rating - a.rating);
  let teamA = [], teamB = [];
  sorted.forEach((p, i) => {
    if (i % 2 === 0) teamA.push(p); else teamB.push(p);
  });
  // Fine-tune: if diff > 1, swap highest diff pair
  const sumA = teamA.reduce((s, p) => s + p.rating, 0);
  const sumB = teamB.reduce((s, p) => s + p.rating, 0);
  if (Math.abs(sumA - sumB) > 1 && teamA.length >= 2 && teamB.length >= 2) {
    // Try swapping player 1 of A with player 1 of B to balance
    const trialA = [teamB[0], ...teamA.slice(1)];
    const trialB = [teamA[0], ...teamB.slice(1)];
    if (Math.abs(trialA.reduce((s,p) => s+p.rating,0) - trialB.reduce((s,p) => s+p.rating,0)) < Math.abs(sumA - sumB)) {
      return [trialA, trialB];
    }
  }
  return [teamA, teamB];
}

// Simple deterministic hash for seeding per-session
function hashCode(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

// Deterministic shuffle using seed
function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 16807 + 7) % 2147483647;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function seedSessionMatchup(s) {
  if (s.players !== undefined) return; // already seeded

  const seed = hashCode(s.id);
  const pool = seededShuffle(PLAYER_POOL, seed);
  const pick = (n) => pool.splice(0, n);

  // Determine how many on-court vs waiting based on session type
  const onCourtCount = 4;
  const waitingCount = Math.min(2 + (seed % 3), pool.length - 4); // 2-4 waiting

  const courtPlayers = pick(onCourtCount);
  const waitingPlayers = pick(waitingCount);

  // Assign teams using balanceTeams
  const [teamA, teamB] = balanceTeams(courtPlayers);

  // Score variations based on seed
  const scoreOptions = [
    [{ a: 7, b: 3 }, { a: 5, b: 7 }],     // split games
    [{ a: 11, b: 6 }, { a: 8, b: 4 }],     // team A dominating
    [{ a: 3, b: 7 }, { a: 5, b: 4 }],      // team B leading
    [{ a: 4, b: 2 }],                        // single game in progress
    [{ a: 9, b: 5 }, { a: 6, b: 11 }, { a: 3, b: 1 }],  // 3 games
    [{ a: 2, b: 5 }],                        // single game, B winning
  ];
  const scores = scoreOptions[seed % scoreOptions.length];

  // Determine wins
  let winsA = 0, winsB = 0;
  scores.forEach(g => { if (g.a > g.b) winsA++; else if (g.b > g.a) winsB++; });

  s.players = [];
  teamA.forEach((p, i) => {
    s.players.push({ ...p, position: i === 0 ? 'Left' : 'Right', onCourt: true, team: 'A' });
  });
  teamB.forEach((p, i) => {
    s.players.push({ ...p, position: i === 0 ? 'Left' : 'Right', onCourt: true, team: 'B' });
  });

  // Waiting room with realistic wait times (2-25 min ago)
  // Assign alternating teams so they're pre-sorted for rotation
  s.waitingRoom = waitingPlayers.map((p, i) => ({
    ...p,
    position: '',
    onCourt: false,
    team: i % 2 === 0 ? 'A' : 'B',
    waitStartedAt: Date.now() - (2 + ((seed + i * 7) % 24)) * 60000
  }));

  s.games = scores;
  s.currentGame = Math.max(0, scores.length - 1);
  s.gamesWonA = winsA;
  s.gamesWonB = winsB;
}

function getMatchupData(s) {
  seedSessionMatchup(s);
  const q = sessQueue(s.id);
  const bookings = sessBookings(s.id);

  // Merge booking names into waiting room (queue players)
  const waitingNames = q.map(entry => ({
    name: entry.playerName,
    rating: entry.rating || 3,
    position: '',
    onCourt: false,
    team: '',
    waitStartedAt: new Date(entry.joinedAt).getTime()
  }));

  // On-court players (first 4 from s.players)
  const onCourt = (s.players || []).filter(p => p.onCourt).slice(0, 4);
  const teamA = onCourt.filter(p => p.team === 'A');
  const teamB = onCourt.filter(p => p.team === 'B');

  // Waiting room (s.waitingRoom + any queue entries not already on court)
  const waitingRoom = [
    ...(s.waitingRoom || []),
    ...waitingNames.filter(wn => !onCourt.some(oc => oc.name === wn.name))
  ];

  return {
    games: s.games || [],
    currentGame: s.currentGame || 0,
    gamesWonA: s.gamesWonA || 0,
    gamesWonB: s.gamesWonB || 0,
    playersA: teamA,
    playersB: teamB,
    waitingRoom,
    queue: q,
    isLive: isSessionLive(s),
    totalOnCourt: onCourt.length,
    totalWaiting: waitingRoom.length
  };
}

function rotatePlayer(sessionId, playerName) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s || !s.players) return;
  const onCourt = s.players.filter(p => p.onCourt);
  const waiting = s.waitingRoom || [];
  if (waiting.length === 0) return;

  // Find player leaving court
  const leaving = onCourt.find(p => p.name === playerName);
  if (!leaving) return;

  // Next player from waiting room
  const incoming = waiting[0];

  // Swap: leaving → waiting room, incoming → on court, keep same team
  leaving.onCourt = false;
  incoming.onCourt = true;
  incoming.team = leaving.team;
  incoming.position = leaving.position;

  // Update waiting room: remove incoming, add leaving
  s.waitingRoom = [leaving, ...waiting.slice(1)];

  save();
  openModal('sessionDetail', sessionId);
}

function autoBalanceTeams(sessionId) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s || !s.players) return;
  const allPlayers = [...(s.players || []).filter(p => p.onCourt), ...(s.waitingRoom || [])];
  const [teamA, teamB] = balanceTeams(allPlayers);

  // Reassign team + positions
  teamA.forEach((p, i) => {
    p.team = 'A';
    p.position = i === 0 ? 'Left' : 'Right';
    p.onCourt = true;
  });
  teamB.forEach((p, i) => {
    p.team = 'B';
    p.position = i === 0 ? 'Left' : 'Right';
    p.onCourt = true;
  });

  // Remaining unassigned go to waiting room — preserve their original team assignment
  const assigned = new Set([...teamA, ...teamB].map(p => p.name));
  const leftovers = allPlayers.filter(p => !assigned.has(p.name)).map(p => ({
    ...p,
    onCourt: false,
    // Keep existing team or assign based on rating parity
    team: p.team || (p.rating >= 3.5 ? 'A' : 'B')
  }));
  s.waitingRoom = leftovers;
  s.players = [...teamA, ...teamB];

  save();
  showToast('Teams rebalanced by skill rating', 'success');
  openModal('sessionDetail', sessionId);
}

function changeScore(sessionId, team, delta) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s) return;
  seedSessionMatchup(s);

  // Ensure games array exists
  if (!s.games) { s.games = [{a:0,b:0}]; s.currentGame = 0; s.gamesWonA = 0; s.gamesWonB = 0; }
  const cg = s.currentGame;
  if (!s.games[cg]) s.games[cg] = {a:0, b:0};

  const prevGamesWonA = s.gamesWonA;
  const prevGamesWonB = s.gamesWonB;
  const prevCurrentGame = s.currentGame;

  if (delta > 0) {
    // Point scored
    if (team === 'A') {
      s.games[cg].a++;
    } else {
      s.games[cg].b++;
    }
    // Check win condition: first to 11, win by 2
    const a = s.games[cg].a, b = s.games[cg].b;
    const maxPts = Math.max(a, b);
    if (maxPts >= 11 && Math.abs(a - b) >= 2) {
      // Game won
      if (a > b) { s.gamesWonA++; } else { s.gamesWonB++; }
      // Start next game if match not over (best of 3 = first to 2 games)
      if (s.gamesWonA < 2 && s.gamesWonB < 2) {
        s.currentGame = s.games.length; // add new game
        s.games.push({a:0, b:0});
      } else {
        // Match over — disable further scoring
        s.currentGame = -1;
      }
    }
  } else {
    // Remove point
    if (team === 'A') {
      s.games[cg].a = Math.max(0, s.games[cg].a - 1);
    } else {
      s.games[cg].b = Math.max(0, s.games[cg].b - 1);
    }
  }

  save();

  // If game state changed (game won, new game, match over), full re-render
  const gameStateChanged = s.gamesWonA !== prevGamesWonA || s.gamesWonB !== prevGamesWonB || s.currentGame !== prevCurrentGame;
  if (gameStateChanged) {
    openModal('sessionDetail', sessionId);
    return;
  }

  // Simple score update — patch DOM in-place for instant feedback (no flicker)
  const scoreElA = document.getElementById('sdm-score-a');
  const scoreElB = document.getElementById('sdm-score-b');
  if (scoreElA && s.games[s.currentGame]) {
    scoreElA.textContent = s.games[s.currentGame].a;
  }
  if (scoreElB && s.games[s.currentGame]) {
    scoreElB.textContent = s.games[s.currentGame].b;
  }
  // Brief pulse animation on the changed score
  const el = team === 'A' ? scoreElA : scoreElB;
  if (el) {
    el.style.transition = 'transform 0.15s ease';
    el.style.transform = 'scale(1.2)';
    setTimeout(() => { el.style.transform = 'scale(1)'; }, 150);
  }
}

function waitTime(joinedAt) {
  const ms = Date.now() - new Date(joinedAt).getTime();
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins/60)}h ${mins%60}m`;
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function timeToY(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return (h - 7) * ROW_H + (m / 60) * ROW_H;
}

function sessionBlockH(startTime, endTime) {
  const [sh, sm] = startTime.split(':').map(Number);
  const [eh, em] = endTime.split(':').map(Number);
  const startMin = (sh - 7) * 60 + sm;
  const endMin   = (eh - 7) * 60 + em;
  return Math.max((endMin - startMin) / 60 * ROW_H, 30);
}

function isSessionLive(session) {
  const now = new Date();
  const curH = now.getHours(), curM = now.getMinutes();
  const [sh, sm] = session.startTime.split(':').map(Number);
  const [eh, em] = session.endTime.split(':').map(Number);
  const curMin = curH * 60 + curM;
  return curMin >= sh * 60 + sm && curMin < eh * 60 + em;
}

function getNowTop() {
  const now = new Date();
  return timeToY(fmtTime24(now.getHours(), now.getMinutes()));
}

function computeMetrics() {
  const todaySessions = state.sessions.filter(s => s.date === state.currentDate);
  const openSessions = todaySessions.filter(s => s.type === 'open');
  const openWithQueue = openSessions.filter(s => sessQueue(s.id).length > 0);
  const totalQueue = state.queue.filter(q => q.status === 'waiting').length;
  const confirmed = state.bookings.filter(b => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    return s && s.date === state.currentDate && (b.status === 'confirmed' || b.status === 'checked_in');
  }).length;
  return { openCount: openSessions.length, openWithQueueCount: openWithQueue.length,
    totalQueue, confirmed, totalSessions: todaySessions.length };
}

  }
  actionsHTML += `
    <button class="qp-btn" onclick="openModal('bookingDetail','${s.id}')">+ Book</button>
    <button class="qp-btn danger" onclick="openModal('noShow','${s.id}')">No-show</button>
  `;
  document.getElementById('qpActions').innerHTML = actionsHTML;
}

// ══════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════
function selectSession(id) {
  state.selectedSessionId = id;
  openModal('sessionDetail', id);
}

function changeDate(delta) {
  const d = new Date(state.currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  state.currentDate = d.toISOString().split('T')[0];
  state.selectedSessionId = null;
  render();
}

function goToToday() {
  state.currentDate = new Date().toISOString().split('T')[0];
  state.selectedSessionId = null;
  render();
}

function callNext(sessionId, entryId = null) {
  const q = sessQueue(sessionId);
  if (!q.length) return;
  const entry = entryId ? state.queue.find(e => e.id === entryId) : q[0];
  if (!entry) return;
  entry.status = 'called';
  showToast(`⚡ ${entry.playerName} called to court!`, 'info');
  render();
}

function removeFromQueue(entryId) {
  const entry = state.queue.find(e => e.id === entryId);
  if (!entry) return;
  const sessionId = entry.sessionId;
  state.queue = state.queue.filter(e => e.id !== entryId);
  state.queue.filter(e => e.sessionId === sessionId && e.status === 'waiting')
    .sort((a,b) => a.position - b.position)
    .forEach((e,i) => e.position = i+1);
  showToast(`Removed ${entry.playerName}`, 'warning');
  render();
  if (modalMode === 'sessionDetail') {
    openModal('sessionDetail', sessionId);
  }
}

function callNextFromDetail(sessionId, entryId) {
  callNext(sessionId, entryId);
  openModal('sessionDetail', sessionId);
}

function updateDuprDisplay(val) {
  document.getElementById('fQRatingValue').textContent = parseFloat(val).toFixed(1);
}
