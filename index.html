function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  // If session-detail-modal is showing, remove it and restore .modal
  const sdm = overlay.querySelector('.session-detail-modal');
  if (sdm) {
    sdm.remove();
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = '<div class="modal-header"><div class="modal-title" id="modalTitle"></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" id="modalSubmit" onclick="submitModal()">Save</button></div>';
    overlay.appendChild(modal);
  }
}

function updateSessionPrice() {
  const v = state.venue || DEFAULT_VENUE;
  const type = document.getElementById('fType')?.value;
  const priceEl = document.getElementById('fPrice');
  if (!priceEl || !type) return;
  const priceMap = { open: v.pricing.openPlay, reserved: v.pricing.reserved, league: v.pricing.league, tournament: v.pricing.tournament, clinic: v.pricing.clinic, lesson: v.pricing.lesson };
  priceEl.value = priceMap[type] || v.pricing.openPlay;
}

function submitModal() {
  if (modalMode === 'session') {
    const name = document.getElementById('fName')?.value.trim() || '';
    const courtId = document.getElementById('fCourt').value;
    const sport = document.getElementById('fSport')?.value || (state.venue?.sport || 'pickleball');
    const type = document.getElementById('fType').value;
    const date = document.getElementById('fDate')?.value || state.currentDate;
    const startTime = document.getElementById('fStart').value;
    const endTime = document.getElementById('fEnd').value;
    const maxPlayers = parseInt(document.getElementById('fMaxPlayers')?.value || '4');
    const pricePerPlayer = parseFloat(document.getElementById('fPrice')?.value || '0');
    const skillLevel = document.getElementById('fSkill')?.value || 'all';
    const instructor = document.getElementById('fInstructor')?.value.trim() || '';
    const description = document.getElementById('fDescription')?.value.trim() || '';
    const recurring = document.getElementById('fRecurring')?.value || 'none';
    if (!courtId || !startTime || !endTime) { showToast('Fill all required fields', 'error'); return; }
    const sessionName = name || generateSessionName(type, startTime);
    state.sessions.push({ id: genId(), name: sessionName, courtId, date, startTime, endTime, type, sport, maxPlayers, pricePerPlayer, skillLevel, instructor, description, recurring });
    showToast('Session added ✓', 'success');
  } else if (modalMode === 'queue') {
    const sessionId  = document.getElementById('fQSession').value;
    const playerName = document.getElementById('fQName').value.trim();
    const groupSize  = parseInt(document.getElementById('fQSize').value);
    const rating     = parseFloat(document.getElementById('fQRating')?.value || '3.5');
    if (!playerName || !sessionId) { showToast('Fill all fields', 'error'); return; }
    const existing = state.queue.filter(q => q.sessionId === sessionId && q.status === 'waiting').length;
    state.queue.push({ id: genId(), sessionId, playerName, groupSize, position: existing+1, status: 'waiting', joinedAt: new Date().toISOString(), rating });
    showToast(`${playerName} added to queue ✓`, 'success');
  } else if (modalMode === 'booking') {
    const sessionId  = document.getElementById('fBSession').value;
    const playerName = document.getElementById('fBName').value.trim();
    const groupSize  = parseInt(document.getElementById('fBSize').value);
    const rating     = parseFloat(document.getElementById('fBRating')?.value || '3.5');
    if (!playerName || !sessionId) { showToast('Fill all fields', 'error'); return; }
    state.bookings.push({ id: genId(), sessionId, playerName, groupSize, status: 'confirmed', bookedAt: new Date().toISOString(), rating });
    showToast(`${playerName} booked ✓`, 'success');
  } else if (modalMode === 'noShow') {
    const bookingId = document.getElementById('fNSBooking')?.value;
    const booking = state.bookings.find(b => b.id === bookingId);
    if (booking) { booking.status = 'no_show'; showToast(`${booking.playerName} marked no-show`, 'warning'); }
  }
  closeModal();
  render();
}

let bookingPlayerCount = 2;

function selectPlayerCount(n, price) {
  bookingPlayerCount = n;
  document.querySelectorAll('#playerCountSelector .player-count-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.textContent) === n);
  });
  const calcPlayers = document.getElementById('priceCalcPlayers');
  const calcTotal = document.getElementById('priceCalcTotal');
  if (calcPlayers) calcPlayers.textContent = `× ${n} player${n > 1 ? 's' : ''}`;
  if (calcTotal) calcTotal.textContent = `$${(price * n).toFixed(2)}`;
}

function confirmBooking(sessionId) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s) return;
  const playerName = document.getElementById('fBDName')?.value.trim();
  const rating = parseFloat(document.getElementById('fBDRating')?.value || '3.5');
  const notes = document.getElementById('fBDNotes')?.value.trim() || '';
  if (!playerName) { showToast('Please enter a player name', 'error'); return; }
  const maxP = getSessionMaxPlayers(s);
  const booked = totalPlayers(s.id);
  const spotsLeft = Math.max(0, maxP - booked);
  const groupSize = Math.min(bookingPlayerCount, spotsLeft > 0 ? spotsLeft : bookingPlayerCount);
  const status = spotsLeft > 0 ? 'confirmed' : 'waitlisted';
  state.bookings.push({
    id: genId(), sessionId, playerName, groupSize, status,
    bookedAt: new Date().toISOString(), rating, notes
  });
  save();
  showBookingConfirmation(s, playerName, groupSize, status);
}

function cancelBooking(bookingId) {
  if (!confirm('Are you sure you want to cancel this booking?')) return;
  const b = state.bookings.find(x => x.id === bookingId);
  if (b) {
    b.status = 'cancelled';
    save();
    showToast('Booking cancelled', 'info');
    renderBookingsView();
  }
}

function checkInBooking(bookingId) {
  const b = state.bookings.find(x => x.id === bookingId);
  if (b) {
    b.status = 'checked_in';
    save();
    showToast(`${b.playerName} checked in ✓`, 'success');
    renderBookingsView();
  }
}

// TOAST
// ══════════════════════════════════════════════════════
function showToast(msg, type = 'success') {
  const icons = { success:'✓', error:'✕', info:'⚡', warning:'⚠' };
  const container = document.getElementById('toastContainer');
  const id = 't' + Date.now();
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.id = id;
  el.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${escHtml(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('exit');
    setTimeout(() => el.remove(), 300);
  }, 2800);
}

function renderCourtsView() {
  const container = document.getElementById('view-courts');
  let html = '<div class="courts-view"><h2 style="font-size:20px;font-weight:800;margin-bottom:20px;">🏟️ Courts</h2>';
  
  state.courts.forEach(court => {
    const sessions = state.sessions.filter(s => s.courtId === court.id && s.date === state.currentDate);
    const liveSession = sessions.find(s => isSessionLive(s));
    const statusClass = liveSession ? 'occupied' : 'available';
    const statusText = liveSession ? 'In Use' : 'Available';
    const totalBooked = sessions.reduce((sum, s) => sum + totalPlayers(s.id), 0);
    const totalSlots = sessions.length * 4;
    
    html += `
    <div class="court-card">
      <div class="court-card-header">
        <div class="court-card-name">${escHtml(court.name)}</div>
        <span class="court-card-status ${statusClass}">${statusText}</span>
      </div>
      <div class="court-card-meta">
        <span>📅 ${sessions.length} sessions today</span>
        <span>👥 ${totalBooked}/${totalSlots} players</span>
        ${liveSession ? `<span>🔴 ${fmtRange(liveSession.startTime, liveSession.endTime)}</span>` : ''}
      </div>
    </div>`;
  });
  
  html += `
  <button class="add-court-card" onclick="addNewCourt()">
    + Add Court
  </button>
  </div>`;
  
  container.innerHTML = html;
}

function addNewCourt() {
  const num = state.courts.length + 1;
  state.courts.push({ id: 'c' + genId().slice(0, 4), name: 'Court ' + num });
  save();
  renderCourtsView();
  showToast('Court ' + num + ' added ✓', 'success');
}

function renderBookingsView() {
  const container = document.getElementById('view-bookings');
  const today = state.currentDate;
  const selectedDate = state.bookingDate || today;
  const filterType = state.bookingFilter || 'all';
  const now = new Date();
  const curMin = now.getHours() * 60 + now.getMinutes();
  const isToday = selectedDate === today;

  // ─── Date pills (next 7 days) ───
  let datePillsHTML = '<div class="date-pills">';
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const dateStr = d.toISOString().split('T')[0];
    const dayNum = d.getDate();
    const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
    const isActive = dateStr === selectedDate;
    datePillsHTML += `<button class="date-pill ${isActive ? 'active' : ''}" onclick="setBookingDate('${dateStr}')">
      <span class="day">${dayNum}</span>
      <span class="day-name">${i === 0 ? 'Today' : i === 1 ? 'Tmrw' : dayName}</span>
    </button>`;
  }
  datePillsHTML += '</div>';

  // ─── Filter bar ───
  const filterTypes = [
    { key: 'all', label: 'All' },
    { key: 'open', label: '🏓 Open Play' },
    { key: 'reserved', label: '🔒 Reserved' },
    { key: 'league', label: '🏆 League' },
    { key: 'tournament', label: '🎯 Tournament' },
    { key: 'clinic', label: '📚 Clinic' },
    { key: 'lesson', label: '🎓 Lesson' }
  ];
  let filterBarHTML = '<div class="filter-bar">';
  filterTypes.forEach(f => {
    filterBarHTML += `<button class="filter-chip ${filterType === f.key ? 'active' : ''}" onclick="setBookingFilter('${f.key}')">${f.label}</button>`;
  });
  filterBarHTML += '</div>';

  // ─── My Bookings (today only) ───
  const myBookings = state.bookings
    .filter(b => {
      const s = state.sessions.find(sess => sess.id === b.sessionId);
      return s && s.date === today && b.status !== 'cancelled';
    })
    .sort((a, b) => {
      const sa = state.sessions.find(s => s.id === a.sessionId);
      const sb = state.sessions.find(s => s.id === b.sessionId);
      return (sa?.startTime || '').localeCompare(sb?.startTime || '');
    });

  let myBookingsHTML = '';
  if (myBookings.length > 0) {
    myBookingsHTML = '<div class="my-bookings"><div class="my-bookings-title">My Bookings Today</div>';
    myBookings.forEach(b => {
      const s = state.sessions.find(sess => sess.id === b.sessionId);
      const court = state.courts.find(c => c.id === s?.courtId);
      const colorInfo = SESSION_COLORS[s?.type] || SESSION_COLORS.open;
      const isLive = s && isToday && isSessionLive(s);
      myBookingsHTML += `
      <div class="my-booking-card">
        <div class="my-booking-info">
          <div class="my-booking-name">${escHtml(b.playerName)}</div>
          <div class="my-booking-detail">${s ? fmtRange(s.startTime, s.endTime) : ''} · ${escHtml(court?.name || '')} · ${colorInfo.label} · ${b.groupSize}p</div>
        </div>
        <span class="booking-status ${b.status}" style="font-size:10px;padding:2px 8px;">${b.status.replace('_', ' ')}</span>
        <div class="my-booking-actions">
          ${isLive && b.status === 'confirmed' ? `<button class="btn-checkin" onclick="checkInBooking('${b.id}')">✓ Check In</button>` : ''}
          ${b.status === 'confirmed' || b.status === 'waitlisted' ? `<button class="btn-cancel-booking" onclick="cancelBooking('${b.id}')">✕ Cancel</button>` : ''}
        </div>
      </div>`;
    });
    myBookingsHTML += '</div>';
  }

  // ─── Available Sessions ───
  let sessions = state.sessions
    .filter(s => s.date === selectedDate)
    .filter(s => filterType === 'all' || s.type === filterType)
    .sort((a, b) => a.startTime.localeCompare(b.startTime));

  let sessionsHTML = '';
  if (sessions.length === 0) {
    sessionsHTML = `
    <div class="empty-state">
      <div class="empty-state-icon">📅</div>
      <div class="empty-state-text">No sessions available for ${formatDate(selectedDate)}</div>
    </div>`;
  } else {
    sessions.forEach(s => {
      const court = state.courts.find(c => c.id === s.courtId);
      const colorInfo = SESSION_COLORS[s.type] || SESSION_COLORS.open;
      const price = getSessionPrice(s);
      const maxP = getSessionMaxPlayers(s);
      const booked = totalPlayers(s.id);
      const spotsLeft = Math.max(0, maxP - booked);
      const fillPct = Math.min(100, Math.round((booked / maxP) * 100));
      const isFull = spotsLeft === 0;
      const skillLabels = { all: 'All Levels', beginner: 'Beginner', intermediate: 'Intermediate', advanced: 'Advanced' };
      const skillClass = s.skillLevel || 'all';
      const fillBarColor = fillPct >= 100 ? 'var(--red)' : fillPct >= 75 ? 'var(--amber)' : 'var(--teal)';

      sessionsHTML += `
      <div class="session-card" onclick="openModal('bookingDetail','${s.id}')">
        <div class="session-card-header">
          <div>
            <div class="session-card-title">${escHtml(s.name || 'Session')}</div>
          </div>
          <div class="session-card-price">$${price.toFixed(2)} <span>/ player</span></div>
        </div>
        <div class="session-card-meta">
          <span class="meta-tag">🕐 ${fmtRange(s.startTime, s.endTime)}</span>
          <span class="meta-tag">🏟️ ${escHtml(court?.name || '')}</span>
          <span class="session-type-pill ${colorInfo.pill}" style="font-size:10px;">${colorInfo.label}</span>

function renderPlayersView(searchTerm) {
  if (typeof searchTerm === 'undefined') searchTerm = '';

function updateVenue(key, value) {
  if (!state.venue) state.venue = { ...DEFAULT_VENUE };
  state.venue[key] = value;
  save();
  // Update header brand text
  const brandText = document.getElementById('brandText');
  if (brandText && key === 'name') {
    brandText.innerHTML = `${escHtml(value)} <span>Queue</span>`;
  }
}

function updateVenuePricing(key, value) {
  if (!state.venue) state.venue = { ...DEFAULT_VENUE };
  if (!state.venue.pricing) state.venue.pricing = {};
  state.venue.pricing[key] = value;
  save();
}

function removeCourt(courtId) {
  if (state.courts.length <= 1) { showToast('Need at least 1 court', 'error'); return; }
  state.courts = state.courts.filter(c => c.id !== courtId);
  state.sessions = state.sessions.filter(s => s.courtId !== courtId);
  save();
  renderCourtsView();
  renderSettingsView();
  showToast('Court removed', 'warning');
}

// ANALYTICS VIEW
// ══════════════════════════════════════════════════════
function renderAnalyticsView() {
  const container = document.getElementById('view-analytics');
  const today = state.currentDate;
  const todaySessions = state.sessions.filter(s => s.date === today);
  const todayBookings = state.bookings.filter(b => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    return s && s.date === today;
  });
  const v = state.venue || DEFAULT_VENUE;
  
  // Calculate revenue
  let totalRevenue = 0;
  todayBookings.forEach(b => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    if (!s) return;
    const pricePerPlayer = v.pricing?.[s.type] || 15;
    totalRevenue += pricePerPlayer * b.groupSize;
  });
  
  // Utilization per court
  const courtUtil = state.courts.map(court => {
    const sessions = todaySessions.filter(s => s.courtId === court.id);
    const totalHours = sessions.reduce((sum, s) => {
      const [sh, sm] = s.startTime.split(':').map(Number);
      const [eh, em] = s.endTime.split(':').map(Number);
      return sum + ((eh * 60 + em) - (sh * 60 + sm)) / 60;
    }, 0);
    const availableHours = (v.closeHour - v.openHour);
    return { name: court.name, pct: availableHours > 0 ? Math.round((totalHours / availableHours) * 100) : 0 };
  });
  
  // Hourly distribution
  const hourCounts = {};
  for (let h = v.openHour; h < v.closeHour; h++) hourCounts[h] = 0;
  todaySessions.forEach(s => {
    const [sh] = s.startTime.split(':').map(Number);
    if (hourCounts[sh] !== undefined) hourCounts[sh]++;
  });
  const maxHourCount = Math.max(1, ...Object.values(hourCounts));
  
  function fmtHourLabel(h) {
    if (timeFormat === '24h') {
      return `${String(h).padStart(2,'0')}:00`;
    } else {
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      return `${h12} ${ampm}`;
    }
  }
  
  container.innerHTML = `
  <div class="analytics-view">
    <h2 style="font-size:20px;font-weight:800;margin-bottom:20px;">📊 Analytics</h2>
    
    <div class="analytics-grid">
      <div class="analytics-card">
        <div class="analytics-card-label">Revenue Today</div>
        <div class="analytics-card-value" style="color:var(--green);">$${totalRevenue}</div>
        <div class="analytics-card-change up">↑ from bookings</div>
      </div>
      <div class="analytics-card">
        <div class="analytics-card-label">Total Bookings</div>
        <div class="analytics-card-value">${todayBookings.length}</div>
        <div class="analytics-card-change">${todayBookings.filter(b => b.status === 'checked_in').length} checked in</div>
      </div>
      <div class="analytics-card">
        <div class="analytics-card-label">Sessions</div>
        <div class="analytics-card-value">${todaySessions.length}</div>
        <div class="analytics-card-change">${todaySessions.filter(s => s.type === 'open').length} open play</div>
      </div>
      <div class="analytics-card">
        <div class="analytics-card-label">Players Active</div>
        <div class="analytics-card-value">${new Set(todayBookings.map(b => b.playerName)).size}</div>
        <div class="analytics-card-change">unique players</div>
      </div>
    </div>
    
    <div class="analytics-chart">
      <div class="analytics-chart-title">Court Utilization</div>
      ${courtUtil.map(c => `
      <div class="utilization-bar">
        <span class="utilization-label">${escHtml(c.name)}</span>
        <div class="utilization-track">
          <div class="utilization-fill" style="width:${c.pct}%;background:${c.pct > 80 ? 'var(--green)' : c.pct > 40 ? 'var(--teal)' : 'var(--amber)'}"></div>
        </div>
        <span class="utilization-pct">${c.pct}%</span>
      </div>`).join('')}
    </div>
    
    <div class="analytics-chart">
      <div class="analytics-chart-title">Sessions by Hour</div>
      <div class="bar-chart">
        ${Object.entries(hourCounts).map(([h, count]) => {
          const pct = Math.round((count / maxHourCount) * 100);
          return `<div class="bar-col">
            <div class="bar-value">${count}</div>
            <div class="bar" style="height:${pct}%;background:var(--teal);"></div>
            <div class="bar-label">${fmtHourLabel(parseInt(h))}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    
    <div class="analytics-chart">
      <div class="analytics-chart-title">Session Types</div>
      ${Object.entries(SESSION_COLORS).map(([type, info]) => {
        const count = todaySessions.filter(s => s.type === type).length;
        const pct = todaySessions.length > 0 ? Math.round((count / todaySessions.length) * 100) : 0;
        return `<div class="utilization-bar">
          <span class="utilization-label">${info.label}</span>
          <div class="utilization-track">
            <div class="utilization-fill" style="width:${pct}%;background:${info.hex}"></div>
          </div>
          <span class="utilization-pct">${count}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function getWeekStart(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day; // Monday as start
  date.setDate(date.getDate() + diff);
  return date;
}

function formatDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function renderDashboardView() {
  const container = document.getElementById('view-dashboard');
  const today = state.currentDate;
  const todaySessions = state.sessions.filter(s => s.date === today);
  const todayBookings = state.bookings.filter(b => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    return s && s.date === today && b.status !== 'cancelled';
  });

  // Stats
  const totalRevenue = todayBookings.reduce((sum, b) => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    return sum + (s ? getSessionPrice(s) * b.groupSize : 0);
  }, 0);
  const activeSessions = todaySessions.filter(s => isSessionLive(s)).length;
  const uniquePlayers = new Set(todayBookings.map(b => b.playerName)).size;
  const v = state.venue || DEFAULT_VENUE;
  const totalCourtHours = state.courts.length * (v.closeHour - v.openHour);
  const usedHours = todaySessions.reduce((sum, s) => {
    const [sh, sm] = s.startTime.split(':').map(Number);
    const [eh, em] = s.endTime.split(':').map(Number);
    return sum + (eh * 60 + em - sh * 60 - sm) / 60;
  }, 0);
  const utilization = totalCourtHours > 0 ? Math.round((usedHours / totalCourtHours) * 100) : 0;

  // Timeline
  const openH = v.openHour || 7;
  const closeH = v.closeHour || 21;
  const hours = [];
  for (let h = openH; h < closeH; h++) hours.push(h);
  const totalMinutes = (closeH - openH) * 60;

  let timelineHTML = '';
  state.courts.forEach(court => {
    const courtSessions = todaySessions.filter(s => s.courtId === court.id);
    let barsHTML = courtSessions.map(s => {
      const [sh, sm] = s.startTime.split(':').map(Number);
      const [eh, em] = s.endTime.split(':').map(Number);
      const startPct = ((sh * 60 + sm - openH * 60) / totalMinutes) * 100;
      const widthPct = ((eh * 60 + em - sh * 60 - sm) / totalMinutes) * 100;
      const pCount = totalPlayers(s.id);
      return `<div class="dash-timeline-bar ${s.type}" style="left:${startPct}%;width:${widthPct}%;" onclick="state.selectedSessionId='${s.id}';switchView('schedule');" title="${escHtml(s.name)} (${pCount} players)">${escHtml(s.name)} · ${pCount}p</div>`;
    }).join('');
    // Now line
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    let nowLine = '';
    if (nowMin >= openH * 60 && nowMin < closeH * 60) {
      const nowPct = ((nowMin - openH * 60) / totalMinutes) * 100;
      nowLine = `<div class="dash-now-line" style="left:${nowPct}%"></div>`;
    }
    timelineHTML += `<div class="dash-timeline-row">
      <div class="dash-timeline-court">${escHtml(court.name)}</div>
      <div class="dash-timeline-track">${barsHTML}${nowLine}</div>
    </div>`;

  const timelineHoursHTML = hours.map(h => {
    const label = timeFormat === '24h' ? `${String(h).padStart(2,'0')}:00` : `${h > 12 ? h - 12 : h}${h < 12 ? 'a' : 'p'}`;

      <div class="dash-action-label">TV Display</div>

      <div class="dash-feed-icon">${item.icon}</div>
      <div class="dash-feed-text">${item.text}</div>
      <div class="dash-feed-time">${item.time}</div>
    </div>`
  ).join('');

  // Upcoming (next 3 sessions)
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const upcomingSessions = todaySessions
    .filter(s => {
      const [sh] = s.startTime.split(':').map(Number);
      const [sm2] = s.startTime.split(':').map(Number);
      return sh * 60 + sm2 > nowMin;
    })
    .sort((a, b) => a.startTime.localeCompare(b.startTime))

    const canStart = sMin - nowMin <= 15 && sMin - nowMin >= -5;
    return `<div class="dash-upcoming-card">
      <div class="dash-upcoming-info">
        <div class="dash-upcoming-name">${escHtml(s.name)}</div>
        <div class="dash-upcoming-meta">${fmtTimeDisplay(sh, sm)} · ${court ? escHtml(court.name) : 'TBD'}</div>
        <div class="dash-upcoming-spots">${pCount} / ${maxP} players</div>
      </div>
      ${canStart ? `<button class="dash-upcoming-btn" onclick="state.selectedSessionId='${s.id}';switchView('schedule');">Start</button>` : ''}
    </div>`;
  }).join('') : '<div style="text-align:center;color:var(--text-muted);padding:20px;font-size:13px;">No more sessions today</div>';

        <div class="dash-stat-sub">${todayBookings.length} bookings</div>
      </div>
      <div class="dash-stat-card teal">
        <div class="dash-stat-label">Active Sessions</div>
        <div class="dash-stat-value">${activeSessions}</div>
        <div class="dash-stat-sub">of ${todaySessions.length} total</div>
      </div>
      <div class="dash-stat-card gold">
        <div class="dash-stat-label">Players Today</div>
        <div class="dash-stat-value">${uniquePlayers}</div>
        <div class="dash-stat-sub">unique players</div>
      </div>
      <div class="dash-stat-card blue">
        <div class="dash-stat-label">Court Utilization</div>
        <div class="dash-stat-value">${utilization}%</div>
        <div class="dash-stat-sub">${Math.round(usedHours)}h used</div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Session Timeline</div>
      <div class="dash-timeline">
        <div class="dash-timeline-inner">
          <div class="dash-timeline-header">${timelineHoursHTML}</div>
          ${timelineHTML}
        </div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Quick Actions</div>
      <div class="dash-actions">${actionsHTML}</div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Live Activity</div>
      <div class="dash-feed">${feedHTML}</div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Upcoming Today</div>
      <div class="dash-upcoming">${upcomingHTML}</div>
      ${courtsLink}
    </div>
  </div>`;
}

function callNextPlayer() {
  // Find first open session with a queue
  const today = state.currentDate;
  const todaySessions = state.sessions.filter(s => s.date === today && s.type === 'open');
  for (const s of todaySessions) {
    const queue = sessQueue(s.id);
    if (queue.length > 0) {
      const next = queue[0];
      // Move from queue to bookings
      state.queue = state.queue.filter(q => q.id !== next.id);
      state.bookings.push({
        id: genId(),
        sessionId: s.id,
        playerName: next.playerName,
        groupSize: next.groupSize,
        status: 'confirmed',
        bookedAt: new Date().toISOString(),
        rating: next.rating
      });
      save();
      showToast(`${next.playerName} called from queue for ${s.name}`);
      renderDashboardView();
      return;
    }
  }
  showToast('No players in queue', 'info');
}

// ══════════════════════════════════════════════════════
// CALENDAR VIEW
// ══════════════════════════════════════════════════════
function renderCalendarView() {
  const container = document.getElementById('view-calendar');
  const v = state.venue || DEFAULT_VENUE;
  const openH = v.openHour || 7;
  const closeH = v.closeHour || 21;

  // Navigation title
  let navTitle = '';
  if (calendarMode === 'week') {
    const ws = getWeekStart(calendarDate);
    const we = new Date(ws);
    we.setDate(we.getDate() + 6);
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    if (ws.getMonth() === we.getMonth()) {
      navTitle = `${months[ws.getMonth()]} ${ws.getDate()} – ${we.getDate()}, ${ws.getFullYear()}`;
    } else {
      navTitle = `${months[ws.getMonth()]} ${ws.getDate()} – ${months[we.getMonth()]} ${we.getDate()}, ${we.getFullYear()}`;
    }
  } else {
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    navTitle = `${months[calendarDate.getMonth()]} ${calendarDate.getFullYear()}`;
  }

  const todayStr = new Date().toISOString().split('T')[0];

  let gridHTML = '';
  if (calendarMode === 'week') {
    gridHTML = renderWeekGrid(openH, closeH, todayStr);
  } else {
    gridHTML = renderMonthGrid(todayStr);
  }

  container.innerHTML = `
  <div class="calendar-view">
    <div class="calendar-header">
      <div class="calendar-nav">
        <button onclick="calNav(-1)">‹</button>
        <span class="calendar-title">${navTitle}</span>
        <button onclick="calNav(1)">›</button>
        <button onclick="calToday()" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;">Today</button>
      </div>
      <div class="calendar-view-toggle">
        <button class="${calendarMode === 'week' ? 'active' : ''}" onclick="calendarMode='week';renderCalendarView();">Week</button>
        <button class="${calendarMode === 'month' ? 'active' : ''}" onclick="calendarMode='month';renderCalendarView();">Month</button>
      </div>
    </div>
    ${gridHTML}
  </div>`;
}

function renderWeekGrid(openH, closeH, todayStr) {
  const ws = getWeekStart(calendarDate);
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const dayDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(d.getDate() + i);
    dayDates.push(d);
  }

  // Header row
  let headerHTML = '<div class="week-header" style="background:var(--bg-surface);"></div>';
  dayDates.forEach((d, i) => {
    const ds = formatDateStr(d);
    const isToday = ds === todayStr;
    headerHTML += `<div class="week-header ${isToday ? 'today' : ''}">${days[i]}<br><span style="font-size:16px;font-weight:800;${isToday ? 'color:var(--teal);' : ''}">${d.getDate()}</span></div>`;
  });

  // Time rows
  let rowsHTML = '';
  for (let h = openH; h < closeH; h++) {
    const label = timeFormat === '24h' ? `${String(h).padStart(2,'0')}:00` : `${h > 12 ? h - 12 : h}${h < 12 ? 'a' : 'p'}`;
    rowsHTML += `<div class="week-time-label">${label}</div>`;
    dayDates.forEach(d => {
      const ds = formatDateStr(d);
      const cellSessions = state.sessions.filter(s => s.date === ds && parseInt(s.startTime) === h);
      let sessionBlocks = cellSessions.map(s => {
        const [sh, sm] = s.startTime.split(':').map(Number);
        const [eh, em] = s.endTime.split(':').map(Number);
        const heightPx = ((eh * 60 + em - sh * 60 - sm) / 60) * 48;
        const pCount = totalPlayers(s.id);
        return `<div class="week-session ${s.type}" style="height:${heightPx - 4}px;top:2px;" onclick="state.selectedSessionId='${s.id}';switchView('schedule');" title="${escHtml(s.name)}">${escHtml(s.name)} (${pCount}p)</div>`;
      }).join('');
      rowsHTML += `<div class="week-cell" onclick="openModal('session');">${sessionBlocks}</div>`;
    });
  }

  return `<div class="week-grid">${headerHTML}${rowsHTML}</div>`;
}

function renderMonthGrid(todayStr) {
  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  let startOffset = firstDay.getDay() - 1; // Monday start
  if (startOffset < 0) startOffset = 6;

  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  let headerHTML = days.map(d => `<div class="month-day-header">${d}</div>`).join('');

  let cellsHTML = '';
  const totalCells = Math.ceil((startOffset + lastDay.getDate()) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startOffset + 1;
    const d = new Date(year, month, dayNum);
    const ds = formatDateStr(d);
    const isCurrentMonth = dayNum >= 1 && dayNum <= lastDay.getDate();
    const isToday = ds === todayStr;
    const daySessions = state.sessions.filter(s => s.date === ds);
    const totalP = daySessions.reduce((sum, s) => sum + totalPlayers(s.id), 0);

    const dotsHTML = daySessions.slice(0, 5).map(s => {
      const color = SESSION_COLORS[s.type]?.hex || '#64748B';
      return `<span class="dot" style="background:${color}"></span>`;
    }).join('');

    cellsHTML += `<div class="month-day ${isToday ? 'today' : ''} ${!isCurrentMonth ? 'other-month' : ''}" onclick="calendarDate=new Date('${ds}T12:00:00');calendarMode='week';renderCalendarView();">
      <div class="month-day-num">${d.getDate()}</div>
      ${daySessions.length > 0 ? `<div class="month-day-sessions">${daySessions.length} sessions · ${totalP} players</div>` : ''}
      <div class="month-day-dots">${dotsHTML}</div>
    </div>`;
  }

  return `<div class="month-grid">${headerHTML}${cellsHTML}</div>`;
}

function calNav(dir) {
  if (calendarMode === 'week') {
    calendarDate.setDate(calendarDate.getDate() + dir * 7);
  } else {
    calendarDate.setMonth(calendarDate.getMonth() + dir);
  }
  renderCalendarView();
}

function calToday() {
  calendarDate = new Date();
  renderCalendarView();
}

// ══════════════════════════════════════════════════════
// KIOSK VIEW
// ══════════════════════════════════════════════════════
function renderKioskView() {
  const container = document.getElementById('view-kiosk');
  const today = state.currentDate;
  const todaySessions = state.sessions.filter(s => s.date === today);

  if (kioskWalkinMode) {
    renderKioskWalkin(container, todaySessions);
    return;
  }

  if (!kioskSessionId) {
    // Session selection grid
    const sessionCards = todaySessions.map(s => {
      const court = state.courts.find(c => c.id === s.courtId);
      const pCount = totalPlayers(s.id);
      const maxP = getSessionMaxPlayers(s);
      const bookedCount = sessBookings(s.id).length;
      return `<div class="kiosk-session-card" onclick="kioskSessionId='${s.id}';renderKioskView();">
        <div class="kiosk-session-name">${escHtml(s.name)}</div>
        <div class="kiosk-session-time">${fmtRange(s.startTime, s.endTime)}</div>
        <div class="kiosk-session-court">${court ? escHtml(court.name) : 'TBD'}</div>
        <div class="kiosk-session-players">${bookedCount} booked · ${pCount}/${maxP} players</div>
      </div>`;
    }).join('');

    container.innerHTML = `
    <div class="kiosk-view">
      <div class="kiosk-title">🏓 Check-In Kiosk</div>
      <div class="kiosk-session-grid">${sessionCards || '<div style="text-align:center;color:var(--text-muted);padding:40px;">No sessions today</div>'}</div>
      <button class="kiosk-walkin-btn" onclick="kioskWalkinMode=true;renderKioskView();">＋ Walk-In Player</button>
      <div style="text-align:center;margin-top:16px;">
        <span class="kiosk-back" onclick="switchView('dashboard');">← Back to Dashboard</span>
      </div>
    </div>`;
  } else {
    // Player check-in for selected session
    const session = state.sessions.find(s => s.id === kioskSessionId);
    if (!session) { kioskSessionId = null; renderKioskView(); return; }
    const court = state.courts.find(c => c.id === session.courtId);
    const bookings = sessBookings(session.id);

    const playerCards = bookings.map(b => {
      const isCI = b.status === 'checked_in';
      return `<div class="kiosk-player-card ${isCI ? 'checked-in' : ''}" onclick="kioskCheckIn('${b.id}', this);">
        <img class="kiosk-player-avatar" src="${avatarUrl(b.playerName, 96)}" alt="">
        <div>
          <div class="kiosk-player-name">${escHtml(b.playerName)}</div>
          <div class="kiosk-player-status ${isCI ? 'checked-in' : 'confirmed'}">${isCI ? '✅ Checked In' : '⏳ Confirmed'}</div>
        </div>
      </div>`;
    }).join('');

    const allCheckedIn = bookings.length > 0 && bookings.every(b => b.status === 'checked_in');

    container.innerHTML = `
    <div class="kiosk-view">
      <span class="kiosk-back" onclick="kioskSessionId=null;renderKioskView();">← Back to Sessions</span>
      <div class="kiosk-title">${escHtml(session.name)}</div>
      <div style="text-align:center;color:var(--text-secondary);margin-bottom:20px;font-size:14px;">
        ${fmtRange(session.startTime, session.endTime)} · ${court ? escHtml(court.name) : 'TBD'}
      </div>
      <div class="kiosk-player-list">${playerCards || '<div style="text-align:center;color:var(--text-muted);padding:40px;">No bookings yet</div>'}</div>
      ${allCheckedIn ? `<button class="kiosk-checkin-btn done">✅ All Players Checked In</button>` : ''}
      <button class="kiosk-walkin-btn" onclick="kioskWalkinMode=true;renderKioskView();">＋ Add Walk-In</button>
    </div>`;
  }
}

function kioskCheckIn(bookingId, el) {
  const booking = state.bookings.find(b => b.id === bookingId);
  if (!booking) return;
  if (booking.status === 'checked_in') {
    showToast(`${booking.playerName} is already checked in`, 'info');
    return;
  }
  booking.status = 'checked_in';
  save();
  // Animate
  if (el) {
    el.classList.add('checked-in', 'kiosk-checkin-animation');
    const statusEl = el.querySelector('.kiosk-player-status');
    if (statusEl) {
      statusEl.className = 'kiosk-player-status checked-in';
      statusEl.textContent = '✅ Checked In';
    }
  }
  showToast(`${booking.playerName} checked in! ✅`);
  // Re-render after animation
  setTimeout(() => renderKioskView(), 600);
}

function renderKioskWalkin(container, todaySessions) {
  const availableSessions = todaySessions.filter(s => {
    const pCount = totalPlayers(s.id);
    const maxP = getSessionMaxPlayers(s);
    return pCount < maxP;
  });

  const sessionOptions = availableSessions.map(s => {
    const court = state.courts.find(c => c.id === s.courtId);
    const pCount = totalPlayers(s.id);
    const maxP = getSessionMaxPlayers(s);
    return `<div class="kiosk-session-card" onclick="kioskSelectWalkinSession('${s.id}');" id="kioskWalkin-${s.id}">
      <div class="kiosk-session-name">${escHtml(s.name)}</div>
      <div class="kiosk-session-time">${fmtRange(s.startTime, s.endTime)}</div>
      <div class="kiosk-session-court">${court ? escHtml(court.name) : 'TBD'}</div>
      <div class="kiosk-session-players">${maxP - pCount} spots left</div>
    </div>`;
  }).join('');

  container.innerHTML = `
  <div class="kiosk-view">
    <span class="kiosk-back" onclick="kioskWalkinMode=false;kioskSessionId=null;renderKioskView();">← Back</span>
    <div class="kiosk-title">＋ Walk-In Player</div>
    <div style="text-align:center;color:var(--text-secondary);margin-bottom:20px;font-size:14px;">Select a session, then enter the player's name</div>
    <div class="kiosk-session-grid">${sessionOptions || '<div style="text-align:center;color:var(--text-muted);padding:40px;">No sessions with available spots</div>'}</div>
    <div id="kioskWalkinForm" style="display:none;max-width:400px;margin:0 auto;">
      <input type="text" id="kioskWalkinName" placeholder="Player Name" style="width:100%;padding:16px;font-size:18px;background:var(--bg-input);border:2px solid var(--border);border-radius:var(--radius-lg);color:var(--text-primary);font-family:inherit;margin-bottom:12px;">
      <button class="kiosk-checkin-btn ready" onclick="kioskSubmitWalkin();">Book + Check In</button>
    </div>
  </div>`;
}

let kioskWalkinSessionId = null;

function kioskSelectWalkinSession(sid) {
  kioskWalkinSessionId = sid;
  // Highlight selected
  document.querySelectorAll('.kiosk-session-card').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('kioskWalkin-' + sid);
  if (el) el.classList.add('active');
  const form = document.getElementById('kioskWalkinForm');
  if (form) {
    form.style.display = 'block';
    document.getElementById('kioskWalkinName').focus();
  }
}

function kioskSubmitWalkin() {
  const nameInput = document.getElementById('kioskWalkinName');
  const name = nameInput ? nameInput.value.trim() : '';
  if (!name) { showToast('Enter a player name', 'error'); return; }
  if (!kioskWalkinSessionId) { showToast('Select a session first', 'error'); return; }

  const session = state.sessions.find(s => s.id === kioskWalkinSessionId);
  if (!session) return;

  // Create booking + check-in
  state.bookings.push({
    id: genId(),
    sessionId: session.id,
    playerName: name,
    groupSize: 1,
    status: 'checked_in',
    bookedAt: new Date().toISOString(),
    rating: 3.0
  });
  save();
  showToast(`${name} booked and checked in for ${session.name}! ✅`);
  kioskWalkinMode = false;
  kioskWalkinSessionId = null;
  kioskSessionId = null;
  renderKioskView();
}

// ══════════════════════════════════════════════════════
// TV DISPLAY MODE
// ══════════════════════════════════════════════════════
let tvModeInterval = null;

function openTVMode() {
  // Create TV overlay if not exists
  let overlay = document.getElementById('tvModeOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'tvModeOverlay';
    document.body.appendChild(overlay);
  }
  renderTVMode();
  tvModeInterval = setInterval(renderTVMode, 30000); // Update every 30s
}

function closeTVMode() {
  const overlay = document.getElementById('tvModeOverlay');
  if (overlay) overlay.remove();
  if (tvModeInterval) { clearInterval(tvModeInterval); tvModeInterval = null; }
}

function renderTVMode() {
  const overlay = document.getElementById('tvModeOverlay');
  if (!overlay) return;
  const v = state.venue || DEFAULT_VENUE;
  const today = state.currentDate;
  const todaySessions = state.sessions.filter(s => s.date === today);

  // Time
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: timeFormat !== '24h' });

  // Court cards
  const courtCards = state.courts.map(court => {
    const courtSessions = todaySessions.filter(s => s.courtId === court.id);
    const liveSession = courtSessions.find(s => isSessionLive(s));
    const bookings = liveSession ? sessBookings(liveSession.id) : [];
    const queue = liveSession ? sessQueue(liveSession.id) : [];

    // Next session
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const nextSession = courtSessions
      .filter(s => {
        const [sh, sm] = s.startTime.split(':').map(Number);
        return sh * 60 + sm > nowMin;
      })
      .sort((a, b) => a.startTime.localeCompare(b.startTime))[0];

    if (liveSession) {
      const typeInfo = SESSION_COLORS[liveSession.type] || {};
      const pNames = bookings.map(b => b.playerName);
      // Show players in 2-column layout
      const playersHTML = pNames.slice(0, 4).map(name =>
        `<div class="tv-player"><img src="${avatarUrl(name, 64)}" alt="">${escHtml(name)}</div>`
      ).join('');

      // Score from matchup data
      const matchup = liveSession._matchup;
      let scoreHTML = '';
      if (matchup && matchup.score) {
        scoreHTML = `<div class="tv-score"><span class="team-a">${matchup.score.a || 0}</span><span class="vs">–</span><span class="team-b">${matchup.score.b || 0}</span></div>`;
      }

      const nextHTML = nextSession ? `<div class="tv-next-session">Next: ${escHtml(nextSession.name)} at ${fmtTimeDisplay(...nextSession.startTime.split(':').map(Number))}</div>` : '';

      return `<div class="tv-court-card live">
        <div class="tv-court-header">
          <span class="tv-court-name">${escHtml(court.name)}</span>
          <span class="tv-court-status live">● LIVE</span>
        </div>
        <div class="tv-session-type-pill" style="background:${typeInfo.hex || '#64748B'}22;color:${typeInfo.hex || '#64748B'};">${typeInfo.label || liveSession.type}</div>
        <div class="tv-session-name">${escHtml(liveSession.name)}</div>
        <div class="tv-session-time">${fmtRange(liveSession.startTime, liveSession.endTime)}</div>
        ${scoreHTML}
        <div class="tv-players">${playersHTML}</div>
        ${queue.length > 0 ? `<div class="tv-queue-info">⚡ ${queue.length} waiting in queue</div>` : ''}
        ${nextHTML}
      </div>`;
    } else {
      // No live session
      const nextHTML = nextSession ? `<div class="tv-next-session">Next: ${escHtml(nextSession.name)} at ${fmtTimeDisplay(...nextSession.startTime.split(':').map(Number))}</div>` : '';
      return `<div class="tv-court-card">
        <div class="tv-court-header">
          <span class="tv-court-name">${escHtml(court.name)}</span>
          <span class="tv-court-status available">Available</span>
        </div>
        <div class="tv-court-available-msg">No active session</div>
        ${nextHTML}
      </div>`;
    }
  }).join('');

  // Ticker
  const allQueue = state.queue.filter(q => q.status === 'waiting');
  const tickerItems = allQueue.map(q => {
    const s = state.sessions.find(sess => sess.id === q.sessionId);
    return `${q.playerName} waiting for ${s ? s.name : 'session'}`;
  });
  // Also add upcoming sessions
  const nowMin2 = now.getHours() * 60 + now.getMinutes();
  const upcoming = todaySessions
    .filter(s => {
      const [sh, sm] = s.startTime.split(':').map(Number);
      return sh * 60 + sm > nowMin2;
    })
    .sort((a, b) => a.startTime.localeCompare(b.startTime))
    .slice(0, 3)
    .map(s => `Coming up: ${s.name} at ${fmtTimeDisplay(...s.startTime.split(':').map(Number))}`);

  const tickerText = [...tickerItems, ...upcoming].join('  •  ') || 'All courts running smoothly';

  overlay.innerHTML = `
  <div class="tv-mode">
    <div class="tv-exit"><button onclick="closeTVMode()">✕ Exit TV Mode</button></div>
    <div class="tv-header">
      <div class="tv-venue-name">${escHtml(v.name)}</div>
      <div style="display:flex;align-items:center;gap:24px;">
        <div class="tv-live"><span class="dot"></span> LIVE</div>
        <div class="tv-time">${timeStr}</div>
      </div>
    </div>
    <div class="tv-courts">${courtCards}</div>
    <div class="tv-ticker">
      <div class="tv-ticker-content">${escHtml(tickerText)}</div>
    </div>
  </div>`;
}
