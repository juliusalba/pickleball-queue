/* ──────────────────────────────────────────────────────
   PAYMENT MODAL
────────────────────────────────────────────────────── */
.payment-modal { max-width: 400px; }
.payment-summary { background: rgba(255,255,255,0.03); border-radius: var(--radius-md); padding: 16px; margin-bottom: 16px; }
.payment-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
.payment-row.total { font-size: 18px; font-weight: 800; color: var(--green); border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; }
.payment-methods { display: flex; gap: 8px; margin-bottom: 16px; }
.payment-method { flex: 1; padding: 12px; background: var(--bg-surface); border: 2px solid var(--border); border-radius: var(--radius-md); text-align: center; cursor: pointer; transition: all 0.2s; }
.payment-method.active { border-color: var(--teal); background: rgba(20,184,166,0.05); }
.payment-method:hover { border-color: var(--border-hover); }
.payment-method-icon { font-size: 24px; margin-bottom: 4px; }
.payment-method-label { font-size: 11px; font-weight: 600; }
.card-inputs { display: grid; gap: 8px; margin-bottom: 16px; }
.card-inputs input {
  width: 100%; padding: 10px 12px; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary); font-size: 14px; font-family: inherit;
}
.card-inputs input:focus { border-color: var(--teal); outline: none; }
.card-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pay-btn { width: 100%; padding: 16px; background: var(--teal); color: white; border: none; border-radius: var(--radius-md); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.pay-btn:hover { background: var(--teal-hover); }
.pay-btn.processing { opacity: 0.7; cursor: not-allowed; }
.payment-success { text-align: center; padding: 32px; }
.payment-success .checkmark { font-size: 64px; }
.receipt { background: var(--bg-surface); border-radius: var(--radius-md); padding: 16px; margin-top: 16px; text-align: left; }
.receipt-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.receipt-header { text-align: center; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.payment-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.payment-badge.paid { background: var(--green-subtle); color: var(--green); }
.payment-badge.pending { background: rgba(245,158,11,0.15); color: var(--amber); }
.payment-badge.refunded { background: var(--red-subtle); color: var(--red); }

/* ──────────────────────────────────────────────────────
   RECURRING BOOKINGS
────────────────────────────────────────────────────── */
.recurring-options { display: none; margin-top: 12px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); border: 1px solid var(--border); }
.recurring-options.visible { display: block; }
.days-of-week { display: flex; gap: 6px; margin-top: 8px; }
.day-checkbox { display: none; }
.day-label { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: var(--bg-surface); border: 1px solid var(--border); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }

.recurring-rule-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; }

/* ──────────────────────────────────────────────────────

────────────────────────────────────────────────────── */
.staff-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; }

.staff-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 4px 10px; border-radius: var(--radius-sm); font-size: 11px; cursor: pointer; transition: all 0.2s; }
.staff-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }

/* Clickable player names */
.player-name-click { cursor: pointer; transition: color 0.15s; }
.player-name-click:hover { color: var(--teal); text-decoration: underline; }

/* ──────────────────────────────────────────────────────
   NOTIFICATION CENTER
────────────────────────────────────────────────────── */
.notif-bell {
  position: relative;
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.notif-bell:hover { background: var(--teal-subtle); color: var(--teal); border-color: var(--border-teal); }
.notif-badge {
  position: absolute; top: -4px; right: -4px;
  min-width: 16px; height: 16px;
  background: var(--red);
  color: #fff; font-size: 9px; font-weight: 800;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
  pointer-events: none;
}
.notif-badge:empty, .notif-badge[data-count="0"] { display: none; }
.notif-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  width: 340px; max-height: 420px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-hover);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  z-index: 300;
  overflow: hidden;
  display: none;
}
.notif-dropdown.open { display: block; }
.notif-dropdown-header {
  padding: var(--space-3) var(--space-4);

}
.notif-dropdown-body {
  max-height: 340px; overflow-y: auto;
}
.notif-item {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border);
  display: flex; gap: var(--space-3); align-items: flex-start;
  transition: background 0.15s;
  cursor: default;
}
.notif-item:hover { background: rgba(255,255,255,0.02); }
.notif-item.unread { border-left: 3px solid var(--teal); }
.notif-item-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.notif-item-body { flex: 1; min-width: 0; }
.notif-item-msg { font-size: 12px; color: var(--text-primary); line-height: 1.4; }
.notif-item-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.notif-unread-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); flex-shrink: 0; margin-top: 6px; }
.notif-empty { padding: var(--space-6); text-align: center; color: var(--text-muted); font-size: 13px; }

/* ──────────────────────────────────────────────────────

────────────────────────────────────────────────────── */
.players-toolbar {

}

}
.player-tab-btn.active { background: var(--teal-subtle); color: var(--teal); }
.player-tab-btn:hover:not(.active) { color: var(--text-secondary); }

.player-card-grid {

}
.player-card {

}

.member-badge {

}
.member-badge.guest { background: rgba(100,116,139,0.2); color: var(--text-muted); }
.member-badge.day_pass { background: var(--blue-subtle); color: var(--blue); }
.member-badge.monthly { background: var(--teal-subtle); color: var(--teal); }
.member-badge.annual { background: var(--gold-subtle); color: var(--gold); }
.member-badge.package { background: rgba(168,85,247,0.15); color: #a855f7; }

.strike-indicator {

}

}

.pp-field { display: flex; align-items: center; gap: var(--space-2); padding: 6px 0; font-size: 12px; }

.pp-field-value { color: var(--text-primary); font-weight: 500; }
.pp-package-card {

.add-player-fab {

/* ──────────────────────────────────────────────────────
   POLICIES SETTINGS
───────────────────────────────────────────────────── */
.policy-toggle { position: relative; width: 40px; height: 22px; }
.policy-toggle input { opacity: 0; width: 0; height: 0; }
.policy-toggle .slider {
  position: absolute; inset: 0; background: var(--bg-input); border: 1px solid var(--border);

function buildPlayerDirectory() {
  const dir = {};
  PLAYER_POOL.forEach(p => {
    dir[p.name] = {
      name: p.name,
      rating: p.rating,
      sessionsPlayed: Math.floor(hashCode(p.name) % 20) + 1,
      wins: Math.floor(hashCode(p.name + 'w') % 15),
      losses: Math.floor(hashCode(p.name + 'l') % 12),
      lastPlayed: state.currentDate,
      memberSince: '2024-' + String((hashCode(p.name) % 12) + 1).padStart(2, '0') + '-15'

  });
  // Add players from bookings/queue
  [...state.bookings, ...state.queue].forEach(b => {
    if (!dir[b.playerName]) {

        name: b.playerName,

        losses: 0,
        lastPlayed: state.currentDate,

function toggleMoreMenu() {
  const menu = document.getElementById('moreMenu');

// Close more menu when clicking elsewhere
document.addEventListener('click', function(e) {
  const menu = document.getElementById('moreMenu');
  const moreBtn = document.getElementById('moreTabBtn');
  if (menu && menu.style.display !== 'none' && !menu.contains(e.target) && !moreBtn.contains(e.target)) {
    menu.style.display = 'none';
  }
});

function switchView(viewName) {
  currentView = viewName;
  // Update tab bar — deactive "More" unless it's selected
  document.querySelectorAll('.tab-item').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.view === viewName);
  });
  // Close more menu on view change
  const moreMenu = document.getElementById('moreMenu');
  if (moreMenu) moreMenu.style.display = 'none';
  // Update view containers
  document.querySelectorAll('.view-container').forEach(vc => {
    vc.classList.toggle('active', vc.id === 'view-' + viewName);
  });
  // Show/hide header elements based on view
  const dateNav = document.querySelector('.date-nav');
  const todayBtn = document.querySelector('.date-today-btn');
  const timeFmtBtn = document.getElementById('timeFormatBtn');
  const metrics = document.getElementById('metricsStrip');
  const headerActions = document.querySelector('.header-actions');
  const isSchedule = viewName === 'schedule';
  if (dateNav) dateNav.style.display = isSchedule ? '' : 'none';
  if (todayBtn) todayBtn.style.display = isSchedule ? '' : 'none';
  if (timeFmtBtn) timeFmtBtn.style.display = isSchedule ? '' : 'none';
  if (metrics) metrics.style.display = isSchedule ? '' : 'none';
  if (headerActions) headerActions.style.display = isSchedule ? '' : 'none';

  if (viewName === 'schedule') render();
  else if (viewName === 'dashboard') renderDashboardView();

  else if (viewName === 'players') renderPlayersView();
  else if (viewName === 'settings') renderSettingsView();
  else if (viewName === 'analytics') renderAnalyticsView();
}

// TIME FORMATTING
// ══════════════════════════════════════════════════════
function fmtTime24(h, m) {
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function fmtTimeDisplay(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  if (timeFormat === '24h') {
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  } else {
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }
}

function fmtRange(startTime, endTime) {
  const [sh, sm] = startTime.split(':').map(Number);
  const [eh, em] = endTime.split(':').map(Number);
  return `${fmtTimeDisplay(sh, sm)} – ${fmtTimeDisplay(eh, em)}`;
}

// fmtTimeDisplay — accepts (h, m) numbers for time cell labels
function fmtTimeDisplay(h, m) {
  if (timeFormat === '24h') {
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  } else {
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }
}

// fmtRange — accepts (startTime, endTime) strings for session blocks
function fmtRange(startTime, endTime) {
  const [sh, sm] = startTime.split(':').map(Number);
  const [eh, em] = endTime.split(':').map(Number);
  return `${fmtTimeDisplay(sh, sm)} – ${fmtTimeDisplay(eh, em)}`;
}

function toggleTimeFormat() {
  timeFormat = timeFormat === '12h' ? '24h' : '12h';
  localStorage.setItem('pb_time_format', timeFormat);
  updateTimeFormatBtn();
  render();
}

function updateTimeFormatBtn() {
  const btn = document.getElementById('timeFormatBtn');
  btn.textContent = timeFormat === '12h' ? '24h' : '12h';
  btn.classList.toggle('active', timeFormat === '24h');
  btn.title = `Switch to ${timeFormat === '12h' ? '12' : '24'} hour format`;
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      state = { ...state, ...p };
    }
  } catch(e) {}
  if (!state.venue) state.venue = { ...DEFAULT_VENUE };
  else state.venue = { ...DEFAULT_VENUE, ...state.venue, pricing: { ...DEFAULT_VENUE.pricing, ...(state.venue.pricing || {}) } };
  if (!state.playerDirectory) state.playerDirectory = buildPlayerDirectory();
  if (!state.settings) state.settings = {};
  if (!state.packageRedemptions) state.packageRedemptions = [];
  if (!state.sessions || state.sessions.length === 0) seedSampleData();
}

// ─── Matchup Algorithm ───────────────────────────────────
// Auto-balances two teams of 2 so total rating is equal ±1
// Greedy: sort waiting players by rating desc, then alternate assignment
function balanceTeams(waitingPlayers) {
  const sorted = [...waitingPlayers].sort((a, b) => b.rating - a.rating);
  let teamA = [], teamB = [];
  sorted.forEach((p, i) => {
    if (i % 2 === 0) teamA.push(p); else teamB.push(p);
  });
  // Fine-tune: if diff > 1, swap highest diff pair
  const sumA = teamA.reduce((s, p) => s + p.rating, 0);
  const sumB = teamB.reduce((s, p) => s + p.rating, 0);
  if (Math.abs(sumA - sumB) > 1 && teamA.length >= 2 && teamB.length >= 2) {
    // Try swapping player 1 of A with player 1 of B to balance
    const trialA = [teamB[0], ...teamA.slice(1)];
    const trialB = [teamA[0], ...teamB.slice(1)];
    if (Math.abs(trialA.reduce((s,p) => s+p.rating,0) - trialB.reduce((s,p) => s+p.rating,0)) < Math.abs(sumA - sumB)) {
      return [trialA, trialB];
    }
  }
  return [teamA, teamB];
}

// Simple deterministic hash for seeding per-session
function hashCode(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

// Deterministic shuffle using seed
function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 16807 + 7) % 2147483647;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function seedSessionMatchup(s) {
  if (s.players !== undefined) return; // already seeded

  const seed = hashCode(s.id);
  const pool = seededShuffle(PLAYER_POOL, seed);
  const pick = (n) => pool.splice(0, n);

  // Determine how many on-court vs waiting based on session type
  const onCourtCount = 4;
  const waitingCount = Math.min(2 + (seed % 3), pool.length - 4); // 2-4 waiting

  const courtPlayers = pick(onCourtCount);
  const waitingPlayers = pick(waitingCount);

  // Assign teams using balanceTeams
  const [teamA, teamB] = balanceTeams(courtPlayers);

  // Score variations based on seed
  const scoreOptions = [
    [{ a: 7, b: 3 }, { a: 5, b: 7 }],     // split games
    [{ a: 11, b: 6 }, { a: 8, b: 4 }],     // team A dominating
    [{ a: 3, b: 7 }, { a: 5, b: 4 }],      // team B leading
    [{ a: 4, b: 2 }],                        // single game in progress
    [{ a: 9, b: 5 }, { a: 6, b: 11 }, { a: 3, b: 1 }],  // 3 games
    [{ a: 2, b: 5 }],                        // single game, B winning
  ];
  const scores = scoreOptions[seed % scoreOptions.length];

  // Determine wins
  let winsA = 0, winsB = 0;
  scores.forEach(g => { if (g.a > g.b) winsA++; else if (g.b > g.a) winsB++; });

  s.players = [];
  teamA.forEach((p, i) => {
    s.players.push({ ...p, position: i === 0 ? 'Left' : 'Right', onCourt: true, team: 'A' });
  });
  teamB.forEach((p, i) => {
    s.players.push({ ...p, position: i === 0 ? 'Left' : 'Right', onCourt: true, team: 'B' });
  });

  // Waiting room with realistic wait times (2-25 min ago)
  // Assign alternating teams so they're pre-sorted for rotation
  s.waitingRoom = waitingPlayers.map((p, i) => ({
    ...p,
    position: '',
    onCourt: false,
    team: i % 2 === 0 ? 'A' : 'B',
    waitStartedAt: Date.now() - (2 + ((seed + i * 7) % 24)) * 60000
  }));

  s.games = scores;
  s.currentGame = Math.max(0, scores.length - 1);
  s.gamesWonA = winsA;
  s.gamesWonB = winsB;
}

function getMatchupData(s) {
  seedSessionMatchup(s);
  const q = sessQueue(s.id);
  const bookings = sessBookings(s.id);

  // Merge booking names into waiting room (queue players)
  const waitingNames = q.map(entry => ({
    name: entry.playerName,
    rating: entry.rating || 3,
    position: '',
    onCourt: false,
    team: '',
    waitStartedAt: new Date(entry.joinedAt).getTime()
  }));

  // On-court players (first 4 from s.players)
  const onCourt = (s.players || []).filter(p => p.onCourt).slice(0, 4);
  const teamA = onCourt.filter(p => p.team === 'A');
  const teamB = onCourt.filter(p => p.team === 'B');

  // Waiting room (s.waitingRoom + any queue entries not already on court)
  const waitingRoom = [
    ...(s.waitingRoom || []),
    ...waitingNames.filter(wn => !onCourt.some(oc => oc.name === wn.name))
  ];

  return {
    games: s.games || [],
    currentGame: s.currentGame || 0,
    gamesWonA: s.gamesWonA || 0,
    gamesWonB: s.gamesWonB || 0,
    playersA: teamA,
    playersB: teamB,
    waitingRoom,
    queue: q,
    isLive: isSessionLive(s),
    totalOnCourt: onCourt.length,
    totalWaiting: waitingRoom.length
  };
}

function rotatePlayer(sessionId, playerName) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s || !s.players) return;
  const onCourt = s.players.filter(p => p.onCourt);
  const waiting = s.waitingRoom || [];
  if (waiting.length === 0) return;

  // Find player leaving court
  const leaving = onCourt.find(p => p.name === playerName);
  if (!leaving) return;

  // Next player from waiting room
  const incoming = waiting[0];

  // Swap: leaving → waiting room, incoming → on court, keep same team
  leaving.onCourt = false;
  incoming.onCourt = true;
  incoming.team = leaving.team;
  incoming.position = leaving.position;

  // Update waiting room: remove incoming, add leaving
  s.waitingRoom = [leaving, ...waiting.slice(1)];

  save();
  openModal('sessionDetail', sessionId);
}

function autoBalanceTeams(sessionId) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s || !s.players) return;
  const allPlayers = [...(s.players || []).filter(p => p.onCourt), ...(s.waitingRoom || [])];
  const [teamA, teamB] = balanceTeams(allPlayers);

  // Reassign team + positions
  teamA.forEach((p, i) => {
    p.team = 'A';
    p.position = i === 0 ? 'Left' : 'Right';
    p.onCourt = true;
  });
  teamB.forEach((p, i) => {
    p.team = 'B';
    p.position = i === 0 ? 'Left' : 'Right';
    p.onCourt = true;
  });

  // Remaining unassigned go to waiting room — preserve their original team assignment
  const assigned = new Set([...teamA, ...teamB].map(p => p.name));
  const leftovers = allPlayers.filter(p => !assigned.has(p.name)).map(p => ({
    ...p,
    onCourt: false,
    // Keep existing team or assign based on rating parity
    team: p.team || (p.rating >= 3.5 ? 'A' : 'B')
  }));
  s.waitingRoom = leftovers;
  s.players = [...teamA, ...teamB];

  save();
  showToast('Teams rebalanced by skill rating', 'success');
  openModal('sessionDetail', sessionId);
}

function changeScore(sessionId, team, delta) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s) return;
  seedSessionMatchup(s);

  // Ensure games array exists
  if (!s.games) { s.games = [{a:0,b:0}]; s.currentGame = 0; s.gamesWonA = 0; s.gamesWonB = 0; }
  const cg = s.currentGame;
  if (!s.games[cg]) s.games[cg] = {a:0, b:0};

  const prevGamesWonA = s.gamesWonA;
  const prevGamesWonB = s.gamesWonB;
  const prevCurrentGame = s.currentGame;

  if (delta > 0) {
    // Point scored
    if (team === 'A') {
      s.games[cg].a++;
    } else {
      s.games[cg].b++;
    }
    // Check win condition: first to 11, win by 2
    const a = s.games[cg].a, b = s.games[cg].b;
    const maxPts = Math.max(a, b);
    if (maxPts >= 11 && Math.abs(a - b) >= 2) {
      // Game won
      if (a > b) { s.gamesWonA++; } else { s.gamesWonB++; }
      // Start next game if match not over (best of 3 = first to 2 games)
      if (s.gamesWonA < 2 && s.gamesWonB < 2) {
        s.currentGame = s.games.length; // add new game
        s.games.push({a:0, b:0});
      } else {
        // Match over — disable further scoring
        s.currentGame = -1;
      }
    }
  } else {
    // Remove point
    if (team === 'A') {
      s.games[cg].a = Math.max(0, s.games[cg].a - 1);
    } else {
      s.games[cg].b = Math.max(0, s.games[cg].b - 1);
    }
  }

  save();

  // If game state changed (game won, new game, match over), full re-render
  const gameStateChanged = s.gamesWonA !== prevGamesWonA || s.gamesWonB !== prevGamesWonB || s.currentGame !== prevCurrentGame;
  if (gameStateChanged) {
    openModal('sessionDetail', sessionId);
    return;
  }

  // Simple score update — patch DOM in-place for instant feedback (no flicker)
  const scoreElA = document.getElementById('sdm-score-a');
  const scoreElB = document.getElementById('sdm-score-b');
  if (scoreElA && s.games[s.currentGame]) {
    scoreElA.textContent = s.games[s.currentGame].a;
  }
  if (scoreElB && s.games[s.currentGame]) {
    scoreElB.textContent = s.games[s.currentGame].b;
  }
  // Brief pulse animation on the changed score
  const el = team === 'A' ? scoreElA : scoreElB;
  if (el) {
    el.style.transition = 'transform 0.15s ease';
    el.style.transform = 'scale(1.2)';
    setTimeout(() => { el.style.transform = 'scale(1)'; }, 150);
  }
}

function waitTime(joinedAt) {

  if (mins < 60) return `${mins}m`;
  return `${Math.floor(mins/60)}h ${mins%60}m`;
}

function timeToY(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return (h - 7) * ROW_H + (m / 60) * ROW_H;
}

function sessionBlockH(startTime, endTime) {
  const [sh, sm] = startTime.split(':').map(Number);
  const [eh, em] = endTime.split(':').map(Number);
  const startMin = (sh - 7) * 60 + sm;
  const endMin   = (eh - 7) * 60 + em;
  return Math.max((endMin - startMin) / 60 * ROW_H, 30);
}

function isSessionLive(session) {
  const now = new Date();
  const curH = now.getHours(), curM = now.getMinutes();
  const [sh, sm] = session.startTime.split(':').map(Number);
  const [eh, em] = session.endTime.split(':').map(Number);
  const curMin = curH * 60 + curM;
  return curMin >= sh * 60 + sm && curMin < eh * 60 + em;
}

function getNowTop() {
  const now = new Date();
  return timeToY(fmtTime24(now.getHours(), now.getMinutes()));
}

function computeMetrics() {
  const todaySessions = state.sessions.filter(s => s.date === state.currentDate);
  const openSessions = todaySessions.filter(s => s.type === 'open');
  const openWithQueue = openSessions.filter(s => sessQueue(s.id).length > 0);
  const totalQueue = state.queue.filter(q => q.status === 'waiting').length;
  const confirmed = state.bookings.filter(b => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    return s && s.date === state.currentDate && (b.status === 'confirmed' || b.status === 'checked_in');
  }).length;
  return { openCount: openSessions.length, openWithQueueCount: openWithQueue.length,
    totalQueue, confirmed, totalSessions: todaySessions.length };
}

    <div class="metric-card"><div class="dot" style="background:var(--teal)"></div><span class="label">Open</span><span class="value teal">${m.openCount}</span></div>
    <div class="metric-card"><div class="dot" style="background:var(--amber)"></div><span class="label">w/ Queue</span><span class="value gold">${m.openWithQueueCount}</span></div>
    <div class="metric-card"><div class="dot" style="background:var(--green)"></div><span class="label">Queued</span><span class="value green">${m.totalQueue}</span></div>
    <div class="metric-card"><div class="dot" style="background:var(--blue)"></div><span class="label">Booked</span><span class="value">${m.confirmed}</span></div>
  `;
}

function renderDayGrid() {
  const grid = document.getElementById('dayGrid');
  const isToday = state.currentDate === new Date().toISOString().split('T')[0];
  const now = new Date();
  const curH = now.getHours(), curM = now.getMinutes();
  const curMin = curH * 60 + curM;

  // Time column
  let timeColHTML = `<div class="time-col">
    <div class="time-col-header"></div>
    <div>`;

  for (let h = 7; h < 21; h++) {
    const label = fmtTimeDisplay(h, 0);
    timeColHTML += `<div class="time-cell"><span class="time-label">${label}</span></div>`;
  }
  timeColHTML += `</div></div>`;

  // Courts
  let courtsHTML = `<div class="courts-area">`;

  state.courts.forEach(court => {
    const courtSessions = state.sessions
      .filter(s => s.courtId === court.id && s.date === state.currentDate)
      .sort((a,b) => a.startTime.localeCompare(b.startTime));

    // Find if any session is currently live on this court
    const liveSession = courtSessions.find(s => isSessionLive(s));

    courtsHTML += `<div class="court-column">`;

    // Court header with optional NOW badge
    let headerExtra = '';
    if (liveSession && isToday) {
      headerExtra = `<span class="now-badge">● LIVE</span>`;
    }

    courtsHTML += `<div class="court-col-header">
      <div class="court-title-group">
        <div class="court-status-dot ${liveSession && isToday ? 'live' : 'available'}"></div>
        <div class="court-number">${escHtml(court.name)}</div>
        ${headerExtra}
      </div>
      <button class="court-add-btn" onclick="openModal('session','${court.id}')">+</button>
    </div>`;

    // Court body
    courtsHTML += `<div class="court-body" id="courtBody-${court.id}">
      <div class="hour-grid">`;

    // Hour rows
    for (let h = 7; h < 21; h++) {
      courtsHTML += `<div class="hour-row"></div>`;
    }

    // Session blocks
    courtSessions.forEach(s => {
      const top     = timeToY(s.startTime);
      const height  = sessionBlockH(s.startTime, s.endTime);
      const q       = sessQueue(s.id);
      const players = totalPlayers(s.id);
      const isSelected = state.selectedSessionId === s.id;
      const isLive    = isSessionLive(s) && isToday;
      const colorInfo  = SESSION_COLORS[s.type] || SESSION_COLORS.open;

      let metaHTML = `<span class="sb-players">${players}/4</span>`;
      if (s.type === 'open' && q.length > 0) {
        metaHTML += `<span class="sb-badge queue">${q.length} queued</span>`;
      } else if (s.type === 'open' && players >= 4) {
        metaHTML += `<span class="sb-badge full">Full</span>`;
      }

      // NOW indicator inside the block
      let liveBadge = '';
      if (isLive) {
        liveBadge = `<span style="font-size:8px;font-weight:900;color:var(--green);text-transform:uppercase;letter-spacing:0.08em;">● NOW</span>`;
      }

      // Check-in badge: show when session is within 30min and has confirmed bookings
      let checkInBadge = '';
      if (isToday && !isLive) {
        const [sh2, sm2] = s.startTime.split(':').map(Number);
        const sessionStartMin = sh2 * 60 + sm2;
        const minsUntil = sessionStartMin - curMin;
        const hasConfirmed = state.bookings.some(b => b.sessionId === s.id && b.status === 'confirmed');
        if (minsUntil > 0 && minsUntil <= 30 && hasConfirmed) {
          checkInBadge = `<span class="sb-badge" style="background:var(--blue-subtle);color:var(--blue);font-size:8px;font-weight:700;">CHECK-IN OPEN</span>`;
        }
      }

      // Completed overlay for past sessions
      const [eh2, em2] = s.endTime.split(':').map(Number);
      const sessionEndMin = eh2 * 60 + em2;
      const isCompleted = isToday && curMin >= sessionEndMin;
      const completedOverlay = isCompleted
        ? `<div style="position:absolute;inset:0;background:rgba(0,0,0,0.45);border-radius:inherit;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none;"><span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">✓ Completed</span></div>`
        : '';

      courtsHTML += `<div
        class="session-block type-${escHtml(s.type)}${isSelected ? ' selected' : ''}${isLive ? ' is-live' : ''}${isCompleted ? ' is-completed' : ''}"
        style="top:${top}px; height:${height}px;${isCompleted ? 'opacity:0.5;' : ''}"
        onclick="selectSession('${s.id}')"
        id="block-${s.id}"
      >
        ${completedOverlay}
        <div class="sb-time">${liveBadge}${fmtRange(s.startTime, s.endTime)}</div>
        <div class="sb-title">
          <span class="session-type-pill ${colorInfo.pill}">${colorInfo.label}</span>
        </div>
        <div class="sb-meta">${metaHTML}${checkInBadge}</div>
        ${isSelected ? '<div class="click-hint">selected ✓</div>' : ''}
      </div>`;
    });

    courtsHTML += `</div></div></div>`;
  });

  courtsHTML += `</div>`;

  grid.innerHTML = timeColHTML + courtsHTML;

  // Red time line (today only, during operating hours)
  if (isToday && curH >= 7 && curH < 21) {
    updateCurrentTimeLine();
    if (timeLineInterval) clearInterval(timeLineInterval);
    timeLineInterval = setInterval(updateCurrentTimeLine, 60000);
  } else {
    document.querySelectorAll('.current-time-line').forEach(el => el.remove());
    if (timeLineInterval) { clearInterval(timeLineInterval); timeLineInterval = null; }
  }
}

function updateCurrentTimeLine() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  if (h < 7 || h >= 21) {
    document.querySelectorAll('.current-time-line').forEach(el => el.remove());
    return;
  }
  const topPx = timeToY(fmtTime24(h, m));
  document.querySelectorAll('.current-time-line').forEach(el => el.remove());
  document.querySelectorAll('.court-body').forEach(body => {
    const line = document.createElement('div');
    line.className = 'current-time-line';
    line.style.top = topPx + 'px';
    body.appendChild(line);
  });
}

// QUICK PANEL
// ══════════════════════════════════════════════════════
function renderQuickPanel() {
  const panel = document.getElementById('quickPanel');
  if (!state.selectedSessionId) { panel.classList.add('hidden'); return; }

  const s = state.sessions.find(x => x.id === state.selectedSessionId);
  if (!s) { panel.classList.add('hidden'); state.selectedSessionId = null; return; }

  const court = state.courts.find(c => c.id === s.courtId);
  const q = sessQueue(s.id);
  const players = totalPlayers(s.id);
  const colorInfo = SESSION_COLORS[s.type] || SESSION_COLORS.open;

  panel.classList.remove('hidden');
  document.getElementById('qpIndicator').style.background = colorInfo.hex;
  document.getElementById('qpCourtName').textContent = court?.name || '';
  document.getElementById('qpTime').textContent = fmtRange(s.startTime, s.endTime);

  document.getElementById('qpTypeRow').innerHTML =
    `<span class="session-type-pill ${colorInfo.pill}">${colorInfo.label}</span>`;

  document.getElementById('qpTitle').textContent = `${players}/4 players`;

  const isLive = isSessionLive(s);
  const waitingQ = q.filter(e => e.status === 'waiting');
  const notifiedQ = q.filter(e => e.status === 'notified');
  const hasActiveClaim = notifiedQ.length > 0 && isClaimActive(notifiedQ[0]);

  let subtitleHTML = '';
  if (isLive) {
    subtitleHTML = `<span style="color:var(--green);font-weight:700;">● Playing now</span>`;
  } else if (hasActiveClaim) {
    const cd = claimTimeRemaining(notifiedQ[0].claimDeadline);
    const cdClass = claimCountdownClass(notifiedQ[0].claimDeadline);
    subtitleHTML = `<span class="claim-badge">🔔 CLAIM NOW</span><span class="claim-countdown ${cdClass}" data-claim-countdown data-claim-deadline="${notifiedQ[0].claimDeadline}">${cd}</span>`;
  } else if (notifiedQ.length > 0) {
    subtitleHTML = `<span style="color:var(--red)">${notifiedQ.length} notified — waiting for claim</span>`;
  } else if (waitingQ.length > 0) {
    subtitleHTML = `<span style="color:var(--amber)">${waitingQ.length} in queue</span><span>·</span><span>${waitingQ[0].playerName} up next</span>`;
  } else if (s.type === 'open') {
    subtitleHTML = players >= 4 ? `<span style="color:var(--teal)">Full — waiting for next</span>` : `<span>Available for booking</span>`;
  } else {
    subtitleHTML = `<span>${s.type === 'reserved' ? 'Private booking' : colorInfo.label}</span>`;
  }
  document.getElementById('qpSubtitle').innerHTML = subtitleHTML;

  let actionsHTML = '';
  if (s.type === 'open') {
    if (notifiedQ.length > 0 && hasActiveClaim) {
      // Show claim buttons for notified entries
      actionsHTML += notifiedQ.slice(0, 2).map(entry =>
        `<button class="qe-claim-btn" onclick="claimSlot('${entry.id}')">✅ ${entry.playerName} — Claim</button>`
      ).join('');
    }
    actionsHTML += `<button class="qp-btn primary" onclick="callNext('${s.id}')"
      ${waitingQ.length === 0 ? 'disabled' : ''}>
      ⚡ Call Next${waitingQ.length > 0 ? ` · ${waitingQ[0].playerName}` : ''}
    </button>`;
    // Notify waitlist button (for staff, when there are waiters but no active claims)
    if (waitingQ.length > 0 && notifiedQ.length === 0 && players < getSessionMaxPlayers(s)) {
      actionsHTML += `<button class="notify-waitlist-btn" onclick="notifyWaitlist('${s.id}')">🔔 Notify Waitlist</button>`;
    }
  }
  actionsHTML += `
    <button class="qp-btn" onclick="openModal('bookingDetail','${s.id}')">+ Book</button>
    <button class="qp-btn danger" onclick="openModal('noShow','${s.id}')">No-show</button>
  `;
  document.getElementById('qpActions').innerHTML = actionsHTML;
}

function selectSession(id) {
  state.selectedSessionId = id;
  openModal('sessionDetail', id);
}

function changeDate(delta) {
  const d = new Date(state.currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  state.currentDate = d.toISOString().split('T')[0];
  state.selectedSessionId = null;
  render();
}

function goToToday() {
  state.currentDate = new Date().toISOString().split('T')[0];
  state.selectedSessionId = null;
  render();
}

function callNext(sessionId, entryId = null) {
  const q = sessQueue(sessionId);
  if (!q.length) return;
  const entry = entryId ? state.queue.find(e => e.id === entryId) : q[0];
  if (!entry) return;
  entry.status = 'called';
  showToast(`⚡ ${entry.playerName} called to court!`, 'info');
  render();
}

function removeFromQueue(entryId) {
  const entry = state.queue.find(e => e.id === entryId);
  if (!entry) return;
  const sessionId = entry.sessionId;
  state.queue = state.queue.filter(e => e.id !== entryId);
  state.queue.filter(e => e.sessionId === sessionId && e.status === 'waiting')
    .sort((a,b) => a.position - b.position)
    .forEach((e,i) => e.position = i+1);
  showToast(`Removed ${entry.playerName}`, 'warning');
  render();
  if (modalMode === 'sessionDetail') {
    openModal('sessionDetail', sessionId);
  }
}

function callNextFromDetail(sessionId, entryId) {
  callNext(sessionId, entryId);
  openModal('sessionDetail', sessionId);
}

/**
 * Add a notification to the notifications log.
 */
function addNotification(type, sessionId, playerName, message) {
  if (!state.notifications) state.notifications = [];
  state.notifications.unshift({
    id: genId(),
    type,
    sessionId,
    playerName,
    message,
    createdAt: new Date().toISOString(),
    read: false
  });
  // Keep only last 100 notifications
  if (state.notifications.length > 100) state.notifications = state.notifications.slice(0, 100);
  save();
  renderNotificationBell();
}

function getUnreadCount() {
  return (state.notifications || []).filter(n => !n.read).length;
}

function renderNotificationBell() {
  const badge = document.getElementById('notifBadge');
  if (!badge) return;
  const count = getUnreadCount();
  badge.textContent = count > 9 ? '9+' : count;
  badge.style.display = count > 0 ? 'flex' : 'none';
}

function toggleNotificationCenter() {
  const dropdown = document.getElementById('notifDropdown');
  if (!dropdown) return;
  const isOpen = dropdown.classList.contains('open');
  if (isOpen) {
    dropdown.classList.remove('open');
  } else {
    renderNotificationCenter();
    dropdown.classList.add('open');
    // Mark as read on open
    (state.notifications || []).forEach(n => n.read = true);
    save();
    renderNotificationBell();
  }
}

function renderNotificationCenter() {
  const container = document.getElementById('notifList');
  if (!container) return;
  const notifs = (state.notifications || []).slice(0, 30);
  if (notifs.length === 0) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">No notifications yet</div>';
    return;
  }
  const icons = {
    waitlist: '🔔', booking: '✓', cancel: '✕', strike: '⚠️',
    package: '🎫', general: 'ℹ️', cascade: '🔄', pair: '🎾'
  };
  container.innerHTML = notifs.map(n => `
    <div class="notif-item" style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;">
      <span style="font-size:16px;flex-shrink:0;margin-top:2px;">${icons[n.type] || 'ℹ️'}</span>
      <div style="flex:1;min-width:0;">
        <div style="color:var(--text-primary);line-height:1.4;">${escHtml(n.message)}</div>
        <div style="color:var(--text-muted);font-size:10px;margin-top:3px;">${waitTime(n.createdAt)} ago</div>
      </div>
    </div>
  `).join('');
}

function markAllNotificationsRead() {
  (state.notifications || []).forEach(n => n.read = true);
  save();
  renderNotificationBell();
  renderNotificationCenter();
}

/**
 * Join the waitlist for a session.
 * Auto-assigns position as max existing position + 1.
 */
function joinWaitlist(sessionId, playerName, groupSize, playerPhone, playerId, rating) {
  const activeStatuses = ['waiting', 'notified', 'claimed'];
  const existing = state.queue.filter(q => q.sessionId === sessionId && activeStatuses.includes(q.status));
  const maxPos = existing.length > 0 ? Math.max(...existing.map(e => e.position)) : 0;

  const entry = {
    id: genId(),
    sessionId,
    playerName,
    groupSize: groupSize || 1,
    position: maxPos + 1,
    status: 'waiting',
    joinedAt: new Date().toISOString(),
    calledAt: null,
    notifiedAt: null,
    claimDeadline: null,
    claimedAt: null,
    expiredAt: null,
    playerPhone: playerPhone || '',
    playerId: playerId || null,
    rating: rating || 3.0
  };

  state.queue.push(entry);
  save();

  addNotification('waitlist_joined', sessionId, playerName,
    `${playerName} joined the waitlist (position #${entry.position})`);

  showToast(`${playerName} added to waitlist — #${entry.position}`, 'success');
  return entry;
}

/**
 * Leave the waitlist (player cancels their queue entry).
 * Sets status to 'cancelled', reorders remaining positions.
 */
function leaveWaitlist(queueEntryId) {
  const entry = state.queue.find(e => e.id === queueEntryId);
  if (!entry) return;

  const sessionId = entry.sessionId;
  entry.status = 'cancelled';
  entry.expiredAt = new Date().toISOString();

  // Reorder remaining active entries for this session
  state.queue
    .filter(e => e.sessionId === sessionId && (e.status === 'waiting' || e.status === 'notified'))
    .sort((a, b) => a.position - b.position)
    .forEach((e, i) => e.position = i + 1);

  save();

  addNotification('waitlist_cancelled', sessionId, entry.playerName,
    `${entry.playerName} left the waitlist`);

  showToast(`${entry.playerName} removed from waitlist`, 'warning');
  render();
  if (modalMode === 'sessionDetail') {
    openModal('sessionDetail', sessionId);
  }
}

/**
 * Notify waitlist: when a slot opens, notify ALL waiting entries for a session.
 * Sets their status to 'notified' and starts the 15-min claim countdown.
 * Returns the number of players notified.
 */
function notifyWaitlist(sessionId) {
  const waitingEntries = state.queue.filter(
    q => q.sessionId === sessionId && q.status === 'waiting'
  );

  if (waitingEntries.length === 0) return 0;

  const now = new Date();
  const deadline = new Date(now.getTime() + CLAIM_WINDOW_MINS * 60000);

  waitingEntries.forEach(entry => {
    entry.status = 'notified';
    entry.notifiedAt = now.toISOString();
    entry.claimDeadline = deadline.toISOString();
  });

  save();

  const s = state.sessions.find(x => x.id === sessionId);
  const sessionName = s?.name || 'Session';

  addNotification('slot_opened', sessionId, '',
    `Slot opened in ${sessionName} — ${waitingEntries.length} players notified (${CLAIM_WINDOW_MINS}min to claim)`);

  showToast(`🔔 ${waitingEntries.length} players notified — ${CLAIM_WINDOW_MINS}min to claim!`, 'info');

  // Start the claim expiry checker
  startClaimExpiryChecker();

  render();
  if (modalMode === 'sessionDetail') {
    openModal('sessionDetail', sessionId);
  }

  return waitingEntries.length;
}

/**
 * Claim a slot: if claimDeadline hasn't passed, convert to booking.
 * All other notified entries for the same session are expired.
 */
function claimSlot(queueEntryId) {
  const entry = state.queue.find(e => e.id === queueEntryId);
  if (!entry) { showToast('Entry not found', 'error'); return false; }
  if (entry.status !== 'notified') { showToast('This entry is not in claimable state', 'error'); return false; }

  const now = new Date();
  const deadline = new Date(entry.claimDeadline);

  if (now > deadline) {
    // Claim window expired
    entry.status = 'expired';
    entry.expiredAt = now.toISOString();
    save();
    showToast('Claim window has expired', 'error');
    expireClaims(entry.sessionId);
    return false;
  }

  // Success! Mark as claimed
  entry.status = 'claimed';
  entry.claimedAt = now.toISOString();

  // Convert to booking
  const s = state.sessions.find(x => x.id === entry.sessionId);
  if (s) {
    state.bookings.push({
      id: genId(),
      sessionId: entry.sessionId,
      playerName: entry.playerName,
      groupSize: entry.groupSize,
      status: 'confirmed',
      bookedAt: now.toISOString(),
      rating: entry.rating
    });

    addNotification('booking_confirmed', entry.sessionId, entry.playerName,
      `${entry.playerName} claimed their slot in ${s.name || 'Session'}`);
  }

  // Mark entry as served
  entry.status = 'served';

  // Expire all other notified entries for this session (slot taken)
  state.queue
    .filter(q => q.sessionId === entry.sessionId && q.id !== entry.id && q.status === 'notified')
    .forEach(q => {
      q.status = 'expired';
      q.expiredAt = now.toISOString();
    });

  // Reorder remaining waiting entries
  state.queue
    .filter(e => e.sessionId === entry.sessionId && e.status === 'waiting')
    .sort((a, b) => a.position - b.position)
    .forEach((e, i) => e.position = i + 1);

  save();

  showToast(`✅ ${entry.playerName} claimed the slot!`, 'success');
  render();
  if (modalMode === 'sessionDetail') {
    openModal('sessionDetail', entry.sessionId);
  }
  return true;
}

/**
 * Expire claims: for all 'notified' entries past claimDeadline,
 * mark as 'expired'. Then cascade or open slot.
 */
function expireClaims(sessionId) {
  const now = new Date();
  const expired = [];

  state.queue
    .filter(q => q.sessionId === sessionId && q.status === 'notified')
    .forEach(q => {
      const deadline = new Date(q.claimDeadline);
      if (now > deadline) {
        q.status = 'expired';
        q.expiredAt = now.toISOString();
        expired.push(q);
      }
    });

  if (expired.length > 0) {
    save();

    const s = state.sessions.find(x => x.id === sessionId);
    addNotification('claim_expired', sessionId, '',
      `Claim window expired for ${expired.length} player(s) in ${s?.name || 'Session'}`);

    showToast(`⏰ Claim window expired for ${expired.length} player(s)`, 'warning');
  }

  // After expiry, check if we should cascade (second round) or open for public
  const stillWaiting = state.queue.filter(q => q.sessionId === sessionId && q.status === 'waiting');
  const anyNotified = state.queue.filter(q => q.sessionId === sessionId && q.status === 'notified');

  // Only cascade if there are still waiting entries and no active notifications
  if (stillWaiting.length > 0 && anyNotified.length === 0) {
    // Check if this session has already had 2 rounds of notifications
    const totalExpired = state.queue.filter(q => q.sessionId === sessionId && q.status === 'expired').length;
    const totalNotified = state.queue.filter(q => q.sessionId === sessionId && q.notifiedAt !== null).length;

    if (totalNotified <= stillWaiting.length) {
      // First round expired — cascade to next round
      cascadeWaitlist(sessionId);
    } else {
      // Two rounds done — open for public
      openSlotForPublic(sessionId);
    }
  } else if (stillWaiting.length === 0 && anyNotified.length === 0) {
    // No one left — slot opens for public
    openSlotForPublic(sessionId);
  }

  render();
  if (modalMode === 'sessionDetail') {
    openModal('sessionDetail', sessionId);
  }
}

/**
 * Cascade waitlist: second round of notifications after first claim expires.
 * Notifies next batch of waiting entries.
 */
function cascadeWaitlist(sessionId) {
  const waitingEntries = state.queue.filter(
    q => q.sessionId === sessionId && q.status === 'waiting'
  );

  if (waitingEntries.length === 0) {
    openSlotForPublic(sessionId);
    return 0;
  }

  const now = new Date();
  const deadline = new Date(now.getTime() + CLAIM_WINDOW_MINS * 60000);

  waitingEntries.forEach(entry => {
    entry.status = 'notified';
    entry.notifiedAt = now.toISOString();
    entry.claimDeadline = deadline.toISOString();
  });

  save();

  const s = state.sessions.find(x => x.id === sessionId);
  addNotification('slot_opened', sessionId, '',
    `Cascade round: ${waitingEntries.length} more players notified for ${s?.name || 'Session'}`);

  showToast(`🔄 Cascade: ${waitingEntries.length} more players notified`, 'info');

  startClaimExpiryChecker();

  render();
  if (modalMode === 'sessionDetail') {
    openModal('sessionDetail', sessionId);
  }

  return waitingEntries.length;
}

/**
 * Open slot for public booking: no waitlist claimers, slot is now available to anyone.
 */
function openSlotForPublic(sessionId) {
  const s = state.sessions.find(x => x.id === sessionId);
  const sessionName = s?.name || 'Session';

  addNotification('slot_public', sessionId, '',
    `Slot in ${sessionName} is now open for public booking`);

  showToast(`📢 Slot open for public booking`, 'info');
  render();
}

/**
 * Cancel a booking with cascade logic:
 * 1. Cancel the booking
 * 2. Check if session is open_play type
 * 3. If waitlist exists → trigger notifyWaitlist
 * 4. If no waitlist → slot opens for public
 * 5. Log cancellation in notifications
 */
function cancelBookingWithCascade(bookingId) {
  if (!confirm('Are you sure you want to cancel this booking?')) return;

  const booking = state.bookings.find(x => x.id === bookingId);
  if (!booking) return;

  const sessionId = booking.sessionId;
  const playerName = booking.playerName;
  const s = state.sessions.find(x => x.id === sessionId);

  // 1. Cancel the booking
  booking.status = 'cancelled';
  booking.cancelledAt = new Date().toISOString();

  // 2. Log cancellation
  addNotification('booking_cancelled', sessionId, playerName,
    `${playerName} cancelled booking for ${s?.name || 'Session'}`);

  showToast(`Booking for ${playerName} cancelled`, 'info');

  // 3. Check if this is an open_play type session with waitlist
  if (s && s.type === 'open') {
    const waitingEntries = state.queue.filter(
      q => q.sessionId === sessionId && q.status === 'waiting'
    );

    if (waitingEntries.length > 0) {
      // 4. Waitlist exists — trigger notification cascade
      save();
      notifyWaitlist(sessionId);
    } else {
      // 5. No waitlist — slot opens for public booking
      save();
      openSlotForPublic(sessionId);
    }
  } else {
    save();
  }

  render();
  renderBookingsView();
}

// ─── Claim Expiry Checker ───────────────────────────────
let claimCheckInterval = null;

function startClaimExpiryChecker() {
  if (claimCheckInterval) return; // Already running

  claimCheckInterval = setInterval(() => {
    const now = new Date();
    let hasActiveClaims = false;

    // Find all sessions with 'notified' entries
    const sessionIds = [...new Set(
      state.queue
        .filter(q => q.status === 'notified')
        .map(q => q.sessionId)
    )];

    sessionIds.forEach(sessionId => {
      const notifiedEntries = state.queue.filter(
        q => q.sessionId === sessionId && q.status === 'notified'
      );

      const anyExpired = notifiedEntries.some(q => now > new Date(q.claimDeadline));
      if (anyExpired) {
        expireClaims(sessionId);
      } else if (notifiedEntries.length > 0) {
        hasActiveClaims = true;
      }
    });

    // Re-render if there are active claims (for countdown updates)
    if (hasActiveClaims) {
      renderQuickPanel();
      // Also re-render session detail if open
      if (modalMode === 'sessionDetail' && state.selectedSessionId) {
        // Light update: just refresh countdown elements
        document.querySelectorAll('[data-claim-countdown]').forEach(el => {
          const deadline = el.dataset.claimDeadline;
          if (deadline) {
            const remaining = Math.max(0, Math.floor((new Date(deadline) - now) / 1000));
            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            el.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
            el.className = 'claim-countdown' + (remaining < 120 ? ' critical' : remaining < 300 ? ' warning' : '');
          }
        });
      }
    } else {
      // No active claims, stop checking
      clearInterval(claimCheckInterval);
      claimCheckInterval = null;
    }
  }, 5000); // Check every 5 seconds
}

/**
 * Get claim time remaining as a formatted string.
 */
function claimTimeRemaining(claimDeadline) {
  if (!claimDeadline) return '';
  const remaining = Math.max(0, Math.floor((new Date(claimDeadline) - Date.now()) / 1000));
  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  return `${mins}:${String(secs).padStart(2, '0')}`;
}

/**
 * Get claim countdown CSS class based on remaining time.
 */
function claimCountdownClass(claimDeadline) {
  if (!claimDeadline) return '';
  const remaining = Math.max(0, Math.floor((new Date(claimDeadline) - Date.now()) / 1000));
  if (remaining < 120) return 'critical';
  if (remaining < 300) return 'warning';
  return '';
}

/**
 * Check if a queue entry has an active (non-expired) claim window.
 */
function isClaimActive(entry) {
  if (entry.status !== 'notified' || !entry.claimDeadline) return false;
  return new Date() < new Date(entry.claimDeadline);
}

/**
 * Get the display position for a queue entry (ignoring expired/cancelled).
 */
function getQueueDisplayPosition(sessionId, entryId) {
  const activeEntries = state.queue
    .filter(q => q.sessionId === sessionId && (q.status === 'waiting' || q.status === 'notified' || q.status === 'claimed'))
    .sort((a, b) => a.position - b.position);
  const idx = activeEntries.findIndex(e => e.id === entryId);
  return idx >= 0 ? idx + 1 : null;
}

/**
 * Get all queue entries for a session including historical (for display).
 */
function sessQueueAll(sessionId) {
  return state.queue
    .filter(q => q.sessionId === sessionId)
    .sort((a, b) => a.position - b.position);
}

function updateDuprDisplay(val) {
  document.getElementById('fQRatingValue').textContent = parseFloat(val).toFixed(1);
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  // Remove any custom modals (session-detail-modal, day-summary-modal) and restore standard modal
  const sdm = overlay.querySelector('.session-detail-modal');
  if (sdm) sdm.remove();
  const dsm = overlay.querySelector('.day-summary-modal');
  if (dsm) dsm.remove();
  // Restore standard modal visibility
  const stdModal = overlay.querySelector('.modal');
  if (stdModal) stdModal.style.display = '';
  // Always ensure a standard .modal exists with proper structure
  let standardModal = overlay.querySelector('.modal');
  if (!standardModal || !standardModal.querySelector('#modalTitle')) {
    if (standardModal) standardModal.remove();
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = '<div class="modal-header"><div class="modal-title" id="modalTitle"></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" id="modalSubmit" onclick="submitModal()">Save</button></div>';
    overlay.appendChild(modal);
  }
}

function updateSessionPrice() {
  const v = state.venue || DEFAULT_VENUE;
  const type = document.getElementById('fType')?.value;
  const priceEl = document.getElementById('fPrice');
  if (!priceEl || !type) return;
  const priceMap = { open: v.pricing.openPlay, reserved: v.pricing.reserved, league: v.pricing.league, tournament: v.pricing.tournament, clinic: v.pricing.clinic, lesson: v.pricing.lesson };
  priceEl.value = priceMap[type] || v.pricing.openPlay;
}

function submitModal() {
  if (modalMode === 'session') {
    const name = document.getElementById('fName')?.value.trim() || '';
    const courtId = document.getElementById('fCourt').value;
    const sport = document.getElementById('fSport')?.value || (state.venue?.sport || 'pickleball');
    const type = document.getElementById('fType').value;
    const date = document.getElementById('fDate')?.value || state.currentDate;
    const startTime = document.getElementById('fStart').value;
    const endTime = document.getElementById('fEnd').value;
    const maxPlayers = parseInt(document.getElementById('fMaxPlayers')?.value || '4');
    const pricePerPlayer = parseFloat(document.getElementById('fPrice')?.value || '0');
    const skillLevel = document.getElementById('fSkill')?.value || 'all';
    const instructor = document.getElementById('fInstructor')?.value.trim() || '';
    const description = document.getElementById('fDescription')?.value.trim() || '';
    const recurring = document.getElementById('fRecurring')?.value || 'none';
    if (!courtId || !startTime || !endTime) { showToast('Fill all required fields', 'error'); return; }
    const sessionName = name || generateSessionName(type, startTime);
    if (recurring !== 'none') {
      // Create a recurring rule instead of a single session
      const startDate = document.getElementById('fRecurStart')?.value || state.currentDate;
      const endDate = document.getElementById('fRecurEnd')?.value || null;
      const daysOfWeek = [];
      for (let i = 0; i < 7; i++) {
        const cb = document.getElementById('dow' + i);
        if (cb && cb.checked) daysOfWeek.push(i);
      }
      if (daysOfWeek.length === 0 && (recurring === 'weekly' || recurring === 'biweekly')) {
        showToast('Please select at least one day of the week', 'error'); return;
      }
      createRecurringRule(
        { name: sessionName, courtId, startTime, endTime, type, sport, maxPlayers, pricePerPlayer, skillLevel, instructor, description },
        recurring, startDate, endDate, daysOfWeek
      );
      generateRecurringSessions();
      showToast('Recurring sessions created ✓', 'success');
    } else {
      state.sessions.push({ id: genId(), name: sessionName, courtId, date, startTime, endTime, type, sport, maxPlayers, pricePerPlayer, skillLevel, instructor, description, recurring });
      showToast('Session added ✓', 'success');
    }
  } else if (modalMode === 'queue') {
    const sessionId  = document.getElementById('fQSession').value;
    const playerName = document.getElementById('fQName').value.trim();
    const groupSize  = parseInt(document.getElementById('fQSize').value);
    const rating     = parseFloat(document.getElementById('fQRating')?.value || '3.5');
    const phone      = document.getElementById('fQPhone')?.value.trim() || '';
    if (!playerName || !sessionId) { showToast('Fill all fields', 'error'); return; }
    joinWaitlist(sessionId, playerName, groupSize, phone, null, rating);
  } else if (modalMode === 'booking') {
    const sessionId  = document.getElementById('fBSession').value;
    const playerName = document.getElementById('fBName').value.trim();
    const groupSize  = parseInt(document.getElementById('fBSize').value);
    const rating     = parseFloat(document.getElementById('fBRating')?.value || '3.5');
    if (!playerName || !sessionId) { showToast('Fill all fields', 'error'); return; }
    state.bookings.push({ id: genId(), sessionId, playerName, groupSize, status: 'confirmed', bookedAt: new Date().toISOString(), rating });
    showToast(`${playerName} booked ✓`, 'success');
  } else if (modalMode === 'noShow') {
    const bookingId = document.getElementById('fNSBooking')?.value;
    const booking = state.bookings.find(b => b.id === bookingId);
    if (booking) { booking.status = 'no_show'; showToast(`${booking.playerName} marked no-show`, 'warning'); }
  }
  closeModal();
  render();
}

let bookingPlayerCount = 2;

function selectPlayerCount(n, price) {
  bookingPlayerCount = n;
  document.querySelectorAll('#playerCountSelector .player-count-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.textContent) === n);
  });
  const calcPlayers = document.getElementById('priceCalcPlayers');
  const calcTotal = document.getElementById('priceCalcTotal');
  if (calcPlayers) calcPlayers.textContent = `× ${n} player${n > 1 ? 's' : ''}`;
  if (calcTotal) calcTotal.textContent = `₱${(price * n).toFixed(2)}`;
}

function confirmBooking(sessionId) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s) return;
  const playerName = document.getElementById('fBDName')?.value.trim();
  const rating = parseFloat(document.getElementById('fBDRating')?.value || '3.5');
  const notes = document.getElementById('fBDNotes')?.value.trim() || '';
  if (!playerName) { showToast('Please enter a player name', 'error'); return; }
  const maxP = getSessionMaxPlayers(s);
  const booked = totalPlayers(s.id);
  const spotsLeft = Math.max(0, maxP - booked);
  const groupSize = Math.min(bookingPlayerCount, spotsLeft > 0 ? spotsLeft : bookingPlayerCount);
  if (spotsLeft === 0) {
    // Session is full — redirect to waitlist instead of creating a waitlisted booking
    joinWaitlist(sessionId, playerName, groupSize);
    closeModal();
    return;
  }
  state.bookings.push({
    id: genId(), sessionId, playerName, groupSize, status: 'confirmed',
    bookedAt: new Date().toISOString(), rating, notes
  });
  save();
  const booking = state.bookings[state.bookings.length - 1];

  // Check if player has an active package that covers this session
  const pkgEligibility = checkPackageEligibility(playerName, s.type);
  if (pkgEligibility.eligible) {
    // Auto-redeem package session (deduct 1 for session-count packages)
    redeemPackageSession(playerName);
    // Mark booking as covered by package
    booking.payment = {
      method: 'package',
      packageType: pkgEligibility.pkgType,
      amount: 0,
      tax: 0,
      total: 0,
      status: 'covered_by_package',
      paidAt: new Date().toISOString(),
      receiptId: 'PKG-' + genId().slice(0, 8).toUpperCase()
    };
    booking.paymentStatus = 'paid';
    save();
    // Show confirmation with package info
    const pkgLabel = pkgEligibility.label;
    const remaining = pkgEligibility.sessionsRemaining !== undefined
      ? ` (${pkgEligibility.sessionsRemaining - 1} sessions left)` : '';
    showBookingConfirmation(s, playerName, groupSize, 'confirmed', `✓ Covered by ${pkgLabel}${remaining}`);
  } else {
    // Show payment modal
    showPaymentModal(booking.id, s, playerName, groupSize);
  }

function showToast(msg, type = 'success') {
  const icons = { success:'✓', error:'✕', info:'⚡', warning:'⚠' };
  const container = document.getElementById('toastContainer');
  const id = 't' + Date.now();
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.id = id;
  el.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${escHtml(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('exit');
    setTimeout(() => el.remove(), 300);
  }, 2800);
}

// ══════════════════════════════════════════════════════
// PACKAGE PASS SYSTEM
// ══════════════════════════════════════════════════════

function getPlayerActivePackage(playerName) {
  const dir = state.playerDirectory || {};
  const p = dir[playerName];
  if (!p || !p.activePackage) return null;
  const pkg = p.activePackage;
  // Check expiry
  if (pkg.expiresAt && new Date() >= new Date(pkg.expiresAt)) {
    return null; // expired
  }
  // Check if sessions exhausted
  if (pkg.type !== 'monthly' && pkg.type !== 'annual') {
    if (pkg.sessionsRemaining !== undefined && pkg.sessionsRemaining <= 0) return null;
  }
  return pkg;
}

function getPlayerPackageStatus(playerName) {
  const dir = state.playerDirectory || {};
  const p = dir[playerName];
  if (!p || !p.activePackage) return { status: 'none' };
  const pkg = p.activePackage;
  const now = new Date();
  const expiresAt = new Date(pkg.expiresAt);
  if (now >= expiresAt) {
    const daysSince = Math.floor((now - expiresAt) / (1000 * 60 * 60 * 24));
    return { status: 'expired', package: pkg, daysSinceExpiry: daysSince };
  }
  const daysLeft = Math.ceil((expiresAt - now) / (1000 * 60 * 60 * 24));
  return { status: 'active', package: pkg, daysLeft };
}

function checkPackageEligibility(playerName, sessionType) {
  const pkg = getPlayerActivePackage(playerName);
  if (!pkg) return { eligible: false };
  // All session types are covered by any active package
  if (pkg.type === 'monthly' || pkg.type === 'annual') {
    return { eligible: true, pkgType: pkg.type, label: PACKAGE_DEFS[pkg.type]?.label || pkg.type };
  }
  // Session-count packages
  if (pkg.sessionsRemaining > 0) {
    const def = PACKAGE_DEFS[pkg.type];
    return { eligible: true, pkgType: pkg.type, label: def?.label || pkg.type, sessionsRemaining: pkg.sessionsRemaining };
  }
  return { eligible: false };
}

function redeemPackageSession(playerName) {
  const dir = state.playerDirectory || {};
  const p = dir[playerName];
  if (!p || !p.activePackage) return false;
  const pkg = p.activePackage;
  // Unlimited packages don't need session deduction
  if (pkg.type === 'monthly' || pkg.type === 'annual') {
    // Log redemption
    if (!state.packageRedemptions) state.packageRedemptions = [];
    state.packageRedemptions.push({
      id: genId(),
      playerName,
      packageType: pkg.type,
      sessionsRemaining: 'unlimited',
      redeemedAt: new Date().toISOString()
    });
    save();
    return true;
  }
  // Session-count packages
  if (pkg.sessionsRemaining > 0) {
    pkg.sessionsRemaining--;
    // Log redemption
    if (!state.packageRedemptions) state.packageRedemptions = [];
    state.packageRedemptions.push({
      id: genId(),
      playerName,
      packageType: pkg.type,
      sessionsRemaining: pkg.sessionsRemaining,
      redeemedAt: new Date().toISOString()
    });
    // Mark exhausted if 0
    if (pkg.sessionsRemaining <= 0) {
      pkg.status = 'exhausted';
    }
    save();
    return true;
  }
  return false;
}

function purchasePackage(playerName, packageType, purchaseDate, startDate, paymentMethod, refNumber) {
  const dir = state.playerDirectory || {};
  let p = dir[playerName];
  if (!p) {
    // Create player if not exists
    dir[playerName] = {
      name: playerName,
      rating: 3.5,
      sessionsPlayed: 0,
      wins: 0,
      losses: 0,
      lastPlayed: state.currentDate,
      memberSince: state.currentDate,
      memberType: 'guest'
    };
    p = dir[playerName];
  }

  const def = PACKAGE_DEFS[packageType];
  if (!def) { showToast('Invalid package type', 'error'); return false; }

  const start = new Date(startDate + 'T00:00:00');
  let expiresAt;
  if (packageType === 'day_pass') {
    // End of today
    expiresAt = new Date(start);
    expiresAt.setHours(23, 59, 59, 999);
  } else {
    expiresAt = new Date(start);
    expiresAt.setDate(expiresAt.getDate() + def.expiryDays);
    expiresAt.setHours(23, 59, 59, 999);
  }

  p.activePackage = {
    type: packageType,
    sessionsRemaining: def.sessions,
    purchasedAt: new Date().toISOString(),
    expiresAt: expiresAt.toISOString(),
    startDate: startDate,
    status: 'active'
  };

  // Update member type based on package
  if (packageType === 'monthly') {
    p.memberType = 'monthly';
    p.monthlyRenewalDate = expiresAt.toISOString().split('T')[0];
  } else if (packageType === 'annual') {
    p.memberType = 'annual';
    p.annualRenewalDate = expiresAt.toISOString().split('T')[0];
  } else if (packageType === 'day_pass') {
    p.memberType = 'day_pass';
  }
  // ten_pack and twenty_pack don't change memberType

  // Record transaction
  const txn = {
    id: genId(),
    type: 'package_purchase',
    packageType,
    playerName,
    amount: def.price,
    tax: 0,
    total: def.price,
    method: paymentMethod,
    refNumber: refNumber || '',
    status: 'paid',
    createdAt: new Date().toISOString(),
    receiptId: 'PKG-' + genId().slice(0, 8).toUpperCase()
  };
  if (!state.transactions) state.transactions = [];
  state.transactions.push(txn);

  save();
  showToast(`${def.label} purchased for ${playerName}!`, 'success');
  return true;
}

          ${isExpiring ? `<div style="font-size:10px;color:var(--amber);font-weight:600;">⚠️ ${status.daysLeft}d left</div>` : `<div style="font-size:10px;color:var(--text-muted);">${status.daysLeft}d left</div>`}

  } else {

}

let pkgPaymentMethod = 'gcash';

function selectPkgPayMethod(method, el) {
  pkgPaymentMethod = method;
  document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('active'));
  el.classList.add('active');
}

function updatePackagePriceDisplay() {
  const type = document.getElementById('pkgType')?.value;
  const def = PACKAGE_DEFS[type];
  if (!def) return;
  const priceEl = document.getElementById('pkgPriceValue');
  const descEl = document.getElementById('pkgPriceDesc');
  if (priceEl) priceEl.textContent = '₱' + def.price.toLocaleString();
  if (descEl) descEl.textContent = def.perSession;
}

function submitPurchasePackage() {
  const playerName = document.getElementById('pkgPlayerName')?.value?.trim();
  const packageType = document.getElementById('pkgType')?.value;
  const purchaseDate = document.getElementById('pkgPurchaseDate')?.value;
  const startDate = document.getElementById('pkgStartDate')?.value;
  const refNumber = document.getElementById('pkgRefNum')?.value?.trim() || '';

  if (!playerName) { showToast('Please select a player', 'error'); return; }
  if (!packageType) { showToast('Please select a package', 'error'); return; }
  if (!startDate) { showToast('Please select a start date', 'error'); return; }

  const success = purchasePackage(playerName, packageType, purchaseDate, startDate, pkgPaymentMethod, refNumber);
  if (success) {
    closeModal();
    // Refresh views
    if (currentView === 'players') renderPlayersView();
    else if (currentView === 'dashboard') renderDashboardView();
  }
}

function getPackageExpiringPlayers() {
  const dir = state.playerDirectory || {};
  const now = new Date();
  const sevenDays = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
  return Object.values(dir).filter(p => {
    const status = getPlayerPackageStatus(p.name);
    return status.status === 'active' && new Date(status.package.expiresAt) <= sevenDays;
  }).map(p => {
    const status = getPlayerPackageStatus(p.name);
    return { ...p, daysLeft: status.daysLeft, package: status.package };
  }).sort((a, b) => a.daysLeft - b.daysLeft);
}

function renderPlayersView(searchTerm, tab) {

  const dir = state.playerDirectory || {};

    container.innerHTML = html;
    return;
  }

  let players = Object.values(dir);

  // Filter by search
  if (playersSearchTerm) {
    const q = playersSearchTerm.toLowerCase();
    players = players.filter(p =>
      p.name.toLowerCase().includes(q) || (p.phone || '').includes(q)
    );
  }

  // Filter by tab
  if (playersTab === 'members') {
    players = players.filter(p => ['monthly', 'annual', 'package'].includes(p.memberType));

    players = players.filter(p => !p.memberType || p.memberType === 'guest' || p.memberType === 'day_pass');

    players = players.filter(p => (p.strikes || 0) > 0);
  }

  players.sort((a, b) => b.rating - a.rating);
  const totalCount = Object.values(dir).length;
  const memberCount = Object.values(dir).filter(p => ['monthly', 'annual', 'package'].includes(p.memberType)).length;
  const guestCount = totalCount - memberCount;
  const strikeCount = Object.values(dir).filter(p => (p.strikes || 0) > 0).length;

  let html = `<div class="players-view">

        <button class="player-tab-btn ${playersTab === 'all' ? 'active' : ''}" onclick="renderPlayersView(undefined,'all')">All (${totalCount})</button>
        <button class="player-tab-btn ${playersTab === 'members' ? 'active' : ''}" onclick="renderPlayersView(undefined,'members')">Members (${memberCount})</button>
        <button class="player-tab-btn ${playersTab === 'guests' ? 'active' : ''}" onclick="renderPlayersView(undefined,'guests')">Guests (${guestCount})</button>
        <button class="player-tab-btn ${playersTab === 'strikes' ? 'active' : ''}" onclick="renderPlayersView(undefined,'strikes')">On Strike (${strikeCount})</button>

      </div>
    </div>
    <div class="player-card-grid">`;

  if (players.length === 0) {
    html += `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">No players found</div>`;
  }

  players.forEach(p => {
    const badge = getPlayerBadge(p.name);

    const pkgStatus = getPlayerPackageStatus(p.name);
    let pkgBadge = '';
    if (pkgStatus.status === 'active') {
      const def = PACKAGE_DEFS[pkgStatus.package.type];
      const isExpiring = pkgStatus.daysLeft <= 7;
      const remaining = pkgStatus.package.sessionsRemaining >= 0
        ? `${pkgStatus.package.sessionsRemaining} left` : '∞';
      pkgBadge = `<span style="font-size:9px;background:${isExpiring ? 'rgba(245,158,11,0.2)' : 'var(--teal-subtle)'};color:${isExpiring ? 'var(--amber)' : 'var(--teal)'};padding:1px 6px;border-radius:4px;font-weight:600;">📦 ${def?.label || ''} · ${remaining}${isExpiring ? ' ⚠️' : ''}</span>`;

      </div>

  });

  html += `</div>
    <button class="add-player-fab" onclick="openAddPlayerModal()">+ Add Player</button>

  container.innerHTML = html;
}

function updateVenue(key, value) {
  if (!state.venue) state.venue = { ...DEFAULT_VENUE };
  state.venue[key] = value;
  save();

  const brandText = document.getElementById('brandText');
  if (brandText && key === 'name') {
    brandText.innerHTML = `${escHtml(value)} <span>Queue</span>`;
  }
}

function updateVenuePricing(key, value) {
  if (!state.venue) state.venue = { ...DEFAULT_VENUE };
  if (!state.venue.pricing) state.venue.pricing = {};
  state.venue.pricing[key] = value;
  save();
}

function updateSettings(key, value) {
  if (!state.settings) state.settings = {};
  state.settings[key] = value;
  save();
}

function removeCourt(courtId) {
  if (state.courts.length <= 1) { showToast('Need at least 1 court', 'error'); return; }
  state.courts = state.courts.filter(c => c.id !== courtId);
  state.sessions = state.sessions.filter(s => s.courtId !== courtId);
  save();
  renderCourtsView();
  renderSettingsView();
  showToast('Court removed', 'warning');
}

function renderAnalyticsView() {
  const container = document.getElementById('view-analytics');
  const today = state.currentDate;
  const todaySessions = state.sessions.filter(s => s.date === today);
  const todayBookings = state.bookings.filter(b => {
    const s = state.sessions.find(sess => sess.id === b.sessionId);
    return s && s.date === today;
  });
  const v = state.venue || DEFAULT_VENUE;
  
  // Calculate revenue
  let totalRevenue = 0;
  if (state.transactions && state.transactions.length > 0) {
    totalRevenue = state.transactions.filter(t => t.status === 'paid').reduce((sum, t) => sum + t.total, 0);
  } else {
    todayBookings.forEach(b => {
      const s = state.sessions.find(sess => sess.id === b.sessionId);
      if (!s) return;
      const pricePerPlayer = v.pricing?.[s.type] || 150;
      totalRevenue += pricePerPlayer * b.groupSize;
    });
  }
  
  // Utilization per court
  const courtUtil = state.courts.map(court => {
    const sessions = todaySessions.filter(s => s.courtId === court.id);
    const totalHours = sessions.reduce((sum, s) => {
      const [sh, sm] = s.startTime.split(':').map(Number);
      const [eh, em] = s.endTime.split(':').map(Number);
      return sum + ((eh * 60 + em) - (sh * 60 + sm)) / 60;
    }, 0);
    const availableHours = (v.closeHour - v.openHour);
    return { name: court.name, pct: availableHours > 0 ? Math.round((totalHours / availableHours) * 100) : 0 };
  });
  
  // Hourly distribution
  const hourCounts = {};
  for (let h = v.openHour; h < v.closeHour; h++) hourCounts[h] = 0;
  todaySessions.forEach(s => {
    const [sh] = s.startTime.split(':').map(Number);
    if (hourCounts[sh] !== undefined) hourCounts[sh]++;
  });
  const maxHourCount = Math.max(1, ...Object.values(hourCounts));
  
  function fmtHourLabel(h) {
    if (timeFormat === '24h') {
      return `${String(h).padStart(2,'0')}:00`;
    } else {
      const ampm = h < 12 ? 'AM' : 'PM';
      const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
      return `${h12} ${ampm}`;
    }
  }
  
  container.innerHTML = `
  <div class="analytics-view">
    <h2 style="font-size:20px;font-weight:800;margin-bottom:20px;">📊 Analytics</h2>
    
    <div class="analytics-grid">
      <div class="analytics-card">
        <div class="analytics-card-label">Revenue Today</div>
        <div class="analytics-card-value" style="color:var(--green);">₱${totalRevenue}</div>
        <div class="analytics-card-change up">↑ from bookings</div>
      </div>

let calendarMode = 'week'; // 'week' or 'month'
let calendarDate = new Date();

function getWeekStart(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day; // Monday as start
  date.setDate(date.getDate() + diff);
  return date;
}

function formatDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
